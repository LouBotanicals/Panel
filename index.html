<script id="lou-v52-clean-sheets-map-patch">
(function(){
  const FINAL_EXEC_URL = "https://script.google.com/macros/s/AKfycbxgcOJGsMQBUg6tlU82-VR4UVaEGatsTYZNn81KQCKjvNWyVfqlO3GyLvj_a6AV51LR4g/exec";
  const PUB_GVIZ = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSTeEH4jRtrA5JHsevTQTne2E8qOS7uvCsaRTPdLZrsskQDPLzNu-RCwrJTlL8H2QEsL_wcs1pNA0I4/gviz/tq";
  const DIRECT_GVIZ = "https://docs.google.com/spreadsheets/d/1ME1Xv7mRmWua-fzKkluq7QiVL2T9mgchE-4dERyjYbQ/gviz/tq";
  const GEOJSON_URLS = [
    "https://cdn.jsdelivr.net/gh/juaneladio/peru-geojson@master/peru_departamental_simple.geojson",
    "https://raw.githubusercontent.com/juaneladio/peru-geojson/refs/heads/master/peru_departamental_simple.geojson"
  ];

  function setEndpoint(){
    try{
      ["lou_api_exec_v45","lou_appscript_webapp_url_v36","lou_api_exec_v46","lou_api_exec_v50","lou_api_exec_v51"].forEach(k=>localStorage.setItem(k,FINAL_EXEC_URL));
    }catch(e){}
    window.LOU_FINAL_EXEC_URL = FINAL_EXEC_URL;
  }

  function normMap(s){
    return String(s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," ").trim().toUpperCase();
  }

  function numMap(v){
    if(v==null||v==="")return 0;
    if(typeof v==="number")return isFinite(v)?v:0;
    let s=String(v).replace(/S\/\.?/g,"").replace(/\s/g,"").trim();
    if(s.indexOf(",")>-1&&s.indexOf(".")>-1)s=s.replace(/,/g,"");
    else if(s.indexOf(",")>-1)s=s.replace(",",".");
    s=s.replace(/[^0-9.-]/g,"");
    const n=parseFloat(s);
    return isFinite(n)?n:0;
  }

  function moneyMap(v){
    return "S/ " + numMap(v).toLocaleString("es-PE",{minimumFractionDigits:2,maximumFractionDigits:2});
  }

  function cleanButtons(){
    const banned = [
      "descargar respaldo","exportar html","exportar html liviano","index github","index github liviano",
      "auditoria api","auditoría api","auditar sheets","auditar sheet","publicar en github","github"
    ];
    document.querySelectorAll("button,a.btn").forEach(el=>{
      const t=(el.textContent||"").trim().toLowerCase();
      const action=(el.getAttribute("onclick")||"").toLowerCase();
      if(banned.some(x=>t.includes(x)||action.includes("exportbackup")||action.includes("exportportable")||action.includes("exportgithub")||action.includes("abrirauditoria"))){
        el.setAttribute("data-v51-hide","1");
        el.classList.add("lb-clean-hidden");
      }
      if(t==="cargar datos" || t==="fuente directa" || t==="conexión directa"){
        el.textContent="Actualizar datos";
        el.onclick=()=>window.App&&App.cargarDesdeGoogleSheets&&App.cargarDesdeGoogleSheets();
      }
    });

    document.querySelectorAll('#nav button').forEach(b=>{
      const tab=b.dataset.tab;
      if(["cargar","cargas","config"].includes(tab)){
        b.classList.add("lb-clean-hidden");
      }
    });
    document.querySelectorAll(".lbl").forEach(lbl=>{
      const txt=(lbl.textContent||"").toLowerCase();
      if(txt.includes("datos")||txt.includes("sistema")) lbl.classList.add("lb-clean-hidden");
    });
  }

  function jsonp(url,params,cbName="callback"){
    return new Promise((resolve,reject)=>{
      const cb="LBV51_"+Date.now()+"_"+Math.random().toString(36).slice(2);
      const q=new URLSearchParams(params||{});
      q.set(cbName,cb); q.set("_",Date.now());
      const s=document.createElement("script");
      const timer=setTimeout(()=>{cleanup();reject(new Error("timeout"));},60000);
      function cleanup(){clearTimeout(timer);try{delete window[cb];s.remove();}catch(e){}}
      window[cb]=payload=>{cleanup();resolve(payload)};
      s.onerror=()=>{cleanup();reject(new Error("script error"))};
      s.src=url+(url.includes("?")?"&":"?")+q.toString();
      document.body.appendChild(s);
    });
  }

  async function readSheetGviz(sheet){
    const bases=[PUB_GVIZ,DIRECT_GVIZ];
    let lastErr=null;
    for(const base of bases){
      try{
        const cb="gviz_"+Date.now()+"_"+Math.random().toString(36).slice(2);
        const payload=await new Promise((resolve,reject)=>{
          const q=new URLSearchParams({sheet,tq:"select *",tqx:`out:json;responseHandler:${cb}`});
          const s=document.createElement("script");
          const timer=setTimeout(()=>{cleanup();reject(new Error("timeout gviz"));},60000);
          function cleanup(){clearTimeout(timer);try{delete window[cb];s.remove();}catch(e){}}
          window[cb]=p=>{cleanup();resolve(p)};
          s.onerror=()=>{cleanup();reject(new Error("gviz error"))};
          s.src=base+"?"+q.toString();
          document.body.appendChild(s);
        });
        if(payload.status&&payload.status!=="ok")throw new Error("gviz status");
        const headers=(payload.table.cols||[]).map(c=>String(c.label||c.id||"").trim());
        const rows=(payload.table.rows||[]).map(row=>{
          const o={};
          (row.c||[]).forEach((c,i)=>o[headers[i]||("col_"+i)]=c?(c.f??c.v??""):"");
          return o;
        }).filter(r=>Object.values(r).some(v=>String(v||"").trim()!==""));
        if(rows.length)return rows;
      }catch(e){lastErr=e;}
    }
    throw lastErr||new Error("No se pudo leer "+sheet);
  }

  async function readSheetApi(sheet){
    try{
      const payload=await jsonp(FINAL_EXEC_URL,{action:"sheet",name:sheet},"callback");
      if(payload&&payload.ok&&payload.headers){
        return (payload.rows||[]).map(row=>{
          const o={}; payload.headers.forEach((h,i)=>o[String(h||"col_"+i).trim()]=row[i]??""); return o;
        });
      }
    }catch(e){}
    return readSheetGviz(sheet);
  }

  async function loadDemografiaPresta(){
    if(App._demografiaPrestaV51 && App._demografiaPrestaV51.length)return App._demografiaPrestaV51;
    const rows=await readSheetApi("ventas_demograficas_v47");
    const mapped=rows.map(r=>{
      const dep=r.departamento||r.Departamento||r.shipping_state||r["shipping_state"]||r["Shipping State"]||"";
      const dist=r.distrito_ciudad||r.distrito||r.ciudad||r.shipping_city||r["shipping_city"]||"";
      const pedidos=numMap(r.pedidos||r["líneas/pedidos"]||r.lineas||r["lineas"]||r["count"]||r["count(B)"]);
      const venta=numMap(r.venta_sin_igv||r["venta_sin_igv"]||r["sum"]||r["sum(J)"]||r["Monto sin IGV"]);
      return {departamento:String(dep||"").trim(),distrito:String(dist||"").trim(),pedidos,venta};
    }).filter(r=>r.departamento||r.distrito);
    App._demografiaPrestaV51=mapped;
    return mapped;
  }

  function deptAgg(rows){
    const m=new Map();
    rows.forEach(r=>{
      const k=normMap(r.departamento||"SIN UBICACIÓN");
      const label=String(r.departamento||"SIN UBICACIÓN").trim().toUpperCase();
      const o=m.get(k)||{key:k,label,venta:0,pedidos:0};
      o.venta+=numMap(r.venta); o.pedidos+=numMap(r.pedidos);
      m.set(k,o);
    });
    return [...m.values()].sort((a,b)=>b.venta-a.venta);
  }

  function limaAgg(rows){
    const m=new Map();
    rows.filter(r=>normMap(r.departamento)==="LIMA").forEach(r=>{
      const k=normMap(r.distrito||"SIN DISTRITO");
      const label=String(r.distrito||"SIN DISTRITO").trim().toUpperCase();
      const o=m.get(k)||{key:k,label,venta:0,pedidos:0};
      o.venta+=numMap(r.venta); o.pedidos+=numMap(r.pedidos);
      m.set(k,o);
    });
    return [...m.values()].sort((a,b)=>b.venta-a.venta);
  }

  function bars(rows,maxRows=10){
    const max=Math.max(1,...rows.map(r=>r.venta));
    return `<div style="margin-top:10px">${rows.slice(0,maxRows).map(r=>`
      <div class="lb-map-bar">
        <b title="${r.label}">${r.label}</b>
        <div class="lb-map-track"><i style="width:${Math.max(3,(r.venta/max)*100)}%"></i></div>
        <div class="num">${moneyMap(r.venta)}</div>
      </div>`).join("")}</div>`;
  }

  function tableRows(rows){
    return `<div style="overflow:auto;max-height:520px"><table class="dt"><thead><tr>
      <th>Departamento</th><th>Distrito / ciudad</th><th class="num">Pedidos</th><th class="num">Venta sin IGV</th>
    </tr></thead><tbody>${rows.map(r=>`<tr>
      <td>${esc(r.departamento||"")}</td><td>${esc(r.distrito||"")}</td>
      <td class="num">${fmt.int(numMap(r.pedidos))}</td><td class="num">${fmt.money(numMap(r.venta),2)}</td>
    </tr>`).join("")}</tbody></table></div>`;
  }

  function renderDemoHTML(rows){
    const depts=deptAgg(rows), lima=limaAgg(rows);
    const totalVenta=depts.reduce((s,x)=>s+x.venta,0);
    const totalPedidos=depts.reduce((s,x)=>s+x.pedidos,0);
    return `
      ${App.filterBar ? App.filterBar() : ""}
      <div class="grid kpis">
        ${App.kpiCard({lbl:"Venta demográfica",val:fmt.money(totalVenta,2),sub:"PrestaShop · sin IGV",src:"der"})}
        ${App.kpiCard({lbl:"Pedidos/líneas",val:fmt.int(totalPedidos),sub:"PrestaShop demográfico",src:"der"})}
        ${App.kpiCard({lbl:"Departamentos",val:fmt.int(depts.length),sub:"con venta registrada",src:"der"})}
        ${App.kpiCard({lbl:"Distritos Lima",val:fmt.int(lima.length),sub:"con venta registrada",src:"der"})}
      </div>
      <div class="lb-map-grid">
        <div class="lb-map-card">
          <h3>Mapa Perú por departamento</h3>
          <div class="ch-sub">Fuente: PrestaShop. Métrica: venta sin IGV.</div>
          <div class="lb-map-wrap"><svg id="lbPeruMapSvg"></svg><div id="lbMapTip" class="lb-map-tip"></div></div>
        </div>
        <div class="lb-map-card">
          <h3>Top departamentos</h3>
          ${bars(depts,12)}
          <h3 style="margin-top:18px">Top distritos Lima</h3>
          ${bars(lima,12)}
        </div>
      </div>
      <div class="card" style="margin-top:16px">
        <h3>Detalle demográfico PrestaShop</h3>
        ${tableRows(rows)}
      </div>`;
  }

  async function ensureGeo(){
    if(App._geoPeruV51)return App._geoPeruV51;
    for(const url of GEOJSON_URLS){
      try{
        const res=await fetch(url,{cache:"force-cache"});
        if(!res.ok)throw new Error("HTTP "+res.status);
        App._geoPeruV51=await res.json();
        return App._geoPeruV51;
      }catch(e){}
    }
    throw new Error("GeoJSON Perú no disponible");
  }

  function getFeatureName(f){
    const p=f.properties||{};
    return p.NOMBDEP||p.NOMB_DPTO||p.DEPARTAMEN||p.DEPARTAMENTO||p.name||p.NAME||"";
  }

  async function drawPeruMapV51(rows){
    if(!window.d3)return;
    const svgNode=document.getElementById("lbPeruMapSvg");
    if(!svgNode)return;
    const svg=d3.select(svgNode);
    svg.selectAll("*").remove();
    const geo=await ensureGeo();
    const agg=deptAgg(rows);
    const byKey=new Map(agg.map(x=>[x.key,x]));
    const max=Math.max(1,...agg.map(x=>x.venta));
    const color=d3.scaleSequential().domain([0,max]).interpolator(d3.interpolateRgbBasis(["#f4e6eb","#d6a7b6","#9b6278","#5e3650"]));
    const w=svgNode.clientWidth||800,h=svgNode.clientHeight||560;
    svg.attr("viewBox",`0 0 ${w} ${h}`);
    const g=svg.append("g");
    const projection=d3.geoMercator().fitExtent([[35,35],[w-35,h-35]],geo);
    const path=d3.geoPath(projection);
    const tip=document.getElementById("lbMapTip");
    const zoom=d3.zoom().scaleExtent([1,7]).on("zoom",ev=>g.attr("transform",ev.transform));
    svg.call(zoom);
    g.selectAll("path").data(geo.features).join("path")
      .attr("class","lb-dept")
      .attr("d",path)
      .attr("fill",f=>{
        const d=byKey.get(normMap(getFeatureName(f)));
        return d?color(d.venta):"#f1e8e4";
      })
      .on("mouseenter",(ev,f)=>{
        const name=getFeatureName(f);
        const d=byKey.get(normMap(name))||{label:name,venta:0,pedidos:0};
        tip.innerHTML=`<h4>${esc(name)}</h4><div class="r"><span>Venta sin IGV</span><b>${moneyMap(d.venta)}</b></div><div class="r"><span>Pedidos/líneas</span><b>${fmt.int(d.pedidos)}</b></div>`;
        tip.style.left=ev.clientX+"px"; tip.style.top=ev.clientY+"px"; tip.classList.add("show");
      })
      .on("mousemove",ev=>{tip.style.left=ev.clientX+"px";tip.style.top=ev.clientY+"px";})
      .on("mouseleave",()=>tip.classList.remove("show"))
      .on("click",(ev,f)=>{
        const key=normMap(getFeatureName(f));
        d3.selectAll(".lb-dept").classed("active",false);
        d3.select(ev.currentTarget).classed("active",true);
        const sel=document.querySelector("[data-map-selected]");
        if(sel)sel.remove();
        const d=byKey.get(key)||{label:getFeatureName(f),venta:0,pedidos:0};
        const card=document.querySelector(".lb-map-card:nth-child(2)");
        if(card){
          const div=document.createElement("div");
          div.setAttribute("data-map-selected","1");
          div.className="note ok";
          div.style.marginTop="12px";
          div.innerHTML=`<b>${esc(d.label)}</b><br>Venta sin IGV: ${moneyMap(d.venta)} · Pedidos/líneas: ${fmt.int(d.pedidos)}`;
          card.prepend(div);
        }
      });
  }

  function enhanceV51(){
    if(!window.App || typeof TABS === "undefined" || !window.fmt || !window.esc) return setTimeout(enhanceV51,250);
    setEndpoint();

    // Remove upload/system tabs from navigation only; keep functions internally if old hashes exist.
    const blocked=new Set(["cargar","cargas","config"]);
    for(let i=TABS.length-1;i>=0;i--){
      if(blocked.has(TABS[i].id)) TABS.splice(i,1);
    }
    if(!TABS.some(t=>t.id==="ventas_demograficas")){
      const idx=TABS.findIndex(t=>t.id==="calor");
      TABS.splice(idx>=0?idx+1:TABS.length,0,{id:"ventas_demograficas",label:"Ventas demográficas",ico:"",grp:"tiempo"});
    }
    // Ensure the page subtitle dictionary can describe it without altering other views.
    try{ if(window.App) App._v52VentasDemograficasReady = true; }catch(e){}

    const oldBuild=App.buildNav;
    App.buildNav=function(){
      oldBuild.call(this);
      cleanButtons();
    };

    const oldGo=App.go;
    App.go=function(id){
      if(blocked.has(id)) id="resumen";
      oldGo.call(this,id);
      cleanButtons();
    };

    App.emptyState=function(){
      return `<div class="card"><div class="empty"><div class="e-ic">LB</div><div class="e-t">Sin datos sincronizados</div><div>Actualiza los datos desde Google Sheets.</div><div style="margin-top:16px"><button class="btn primary" onclick="App.cargarDesdeGoogleSheets()">Actualizar datos</button></div></div></div>`;
    };

    const oldRender=App.render;
    App.render=function(id){
      if(blocked.has(id)) id="resumen";
      try{
        return oldRender.call(this,id);
      }catch(e){
        console.error(e);
        const c=document.getElementById("content");
        if(c)c.innerHTML=`<div class="card"><div class="empty"><div class="e-ic">ERR</div><div class="e-t">No se pudo abrir esta vista</div><div class="muted">${esc(e&&e.message?e.message:e)}</div><div style="margin-top:14px"><button class="btn primary" onclick="App.cargarDesdeGoogleSheets()">Actualizar datos</button></div></div></div>`;
      }
    };

    const oldLoad=App.cargarDesdeGoogleSheets;
    App.cargarDesdeGoogleSheets=async function(){
      setEndpoint();
      const r=typeof oldLoad==="function" ? await oldLoad.call(this) : null;
      try{ await loadDemografiaPresta(); }catch(e){console.warn(e);}
      cleanButtons();
      if(this.curTab==="ventas_demograficas") this.render("ventas_demograficas");
      return r;
    };

    App.tab_ventas_demograficas=function(){
      const rows=this._demografiaPrestaV51||[];
      if(!rows.length){
        loadDemografiaPresta().then(()=>this.render("ventas_demograficas")).catch(e=>this.toast&&this.toast("No se pudo leer ventas_demograficas_v47","bad"));
        return `${this.filterBar?this.filterBar():""}<div class="card"><div class="empty">Sincronizando ventas demográficas desde PrestaShop.</div></div>`;
      }
      let filtered=rows.slice();
      const f=this.filters||{};
      if(f.search){
        const q=normMap(f.search);
        filtered=filtered.filter(r=>normMap(Object.values(r).join(" ")).includes(q));
      }
      return renderDemoHTML(filtered);
    };
    App.after_ventas_demograficas=function(){
      const rows=this._demografiaPrestaV51||[];
      drawPeruMapV51(rows).catch(e=>console.warn(e));
    };

    // Button labels / topbar cleanup.
    cleanButtons();
    document.title="Lou Botanicals · Panel Decisional v53";
    const brandSub=document.querySelector(".brand .t span");
    if(brandSub) brandSub.textContent="Panel decisional v53";
    if(location.hash==="#cargar"||location.hash==="#cargas"||location.hash==="#config") location.hash="#resumen";

    // Rebuild nav after TABS mutation.
    try{ App.buildNav(); App.go(App.curTab&& !blocked.has(App.curTab)?App.curTab:"resumen"); }catch(e){console.warn(e);}
    loadDemografiaPresta().then(()=>{ if(App.curTab==="ventas_demograficas")App.render("ventas_demograficas"); }).catch(()=>{});
    // Fallback: if the navigation did not include the tab for any prior rendering order, inject it visually.
    setTimeout(()=>{
      try{
        const nav=document.getElementById('nav');
        if(nav && !nav.querySelector('[data-tab="ventas_demograficas"]')){
          const after=nav.querySelector('[data-tab="calor"]');
          const btn=document.createElement('button');
          btn.dataset.tab='ventas_demograficas';
          btn.innerHTML='Ventas demográficas';
          btn.onclick=()=>App.go('ventas_demograficas');
          if(after) after.insertAdjacentElement('afterend',btn); else nav.appendChild(btn);
        }
      }catch(e){}
    },800);
  }

  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",()=>setTimeout(enhanceV51,500));
  else setTimeout(enhanceV51,500);
})();
</script>


<script id="lou-v53-demografia-productos-patch">
(function(){
  const FINAL_EXEC_URL = "https://script.google.com/macros/s/AKfycbxgcOJGsMQBUg6tlU82-VR4UVaEGatsTYZNn81KQCKjvNWyVfqlO3GyLvj_a6AV51LR4g/exec";
  const PUB_GVIZ = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSTeEH4jRtrA5JHsevTQTne2E8qOS7uvCsaRTPdLZrsskQDPLzNu-RCwrJTlL8H2QEsL_wcs1pNA0I4/gviz/tq";
  const DIRECT_GVIZ = "https://docs.google.com/spreadsheets/d/1ME1Xv7mRmWua-fzKkluq7QiVL2T9mgchE-4dERyjYbQ/gviz/tq";
  const GEOJSON_URLS = [
    "https://cdn.jsdelivr.net/gh/juaneladio/peru-geojson@master/peru_departamental_simple.geojson",
    "https://raw.githubusercontent.com/juaneladio/peru-geojson/refs/heads/master/peru_departamental_simple.geojson"
  ];

  function norm(s){return String(s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," ").trim().toUpperCase();}
  function num(v){if(v==null||v==="")return 0;if(typeof v==="number")return isFinite(v)?v:0;let s=String(v).replace(/S\/\.?/g,"").replace(/\s/g,"").trim();if(s.indexOf(",")>-1&&s.indexOf(".")>-1)s=s.replace(/,/g,"");else if(s.indexOf(",")>-1)s=s.replace(",",".");s=s.replace(/[^0-9.-]/g,"");const n=parseFloat(s);return isFinite(n)?n:0}
  function money(v){return "S/ "+num(v).toLocaleString("es-PE",{minimumFractionDigits:2,maximumFractionDigits:2})}
  function int(v){return num(v).toLocaleString("es-PE",{maximumFractionDigits:0})}
  function esc2(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
  function setEndpoint(){try{["lou_api_exec_v45","lou_appscript_webapp_url_v36","lou_api_exec_v46","lou_api_exec_v50","lou_api_exec_v51","lou_api_exec_v53"].forEach(k=>localStorage.setItem(k,FINAL_EXEC_URL));}catch(e){}}

  function cleanButtons(){
    const banned=["descargar respaldo","exportar html","index liviano","index github","auditoria api","auditoría api","auditar sheets","auditar sheet","exportar html liviano","github"];
    document.querySelectorAll("button,a.btn").forEach(el=>{
      const t=(el.textContent||"").trim().toLowerCase();
      const oc=(el.getAttribute("onclick")||"").toLowerCase();
      if(banned.some(b=>t.includes(b)) || /exportbackup|exportportable|exportgithub|abrirauditoria/.test(oc)){
        el.classList.add("lb-clean-hidden");
      }
      if(t==="cargar datos"){
        el.textContent="Actualizar datos";
        el.onclick=()=>{ if(window.App&&App.cargarDesdeGoogleSheets) App.cargarDesdeGoogleSheets(); else renderV53(); };
      }
    });
    document.querySelectorAll('#nav [data-tab="cargar"],#nav [data-tab="cargas"],#nav [data-tab="config"]').forEach(x=>x.classList.add("lb-clean-hidden"));
  }

  function jsonp(url,params,cbp="callback"){
    return new Promise((resolve,reject)=>{
      const cb="LBV53_"+Date.now()+"_"+Math.random().toString(36).slice(2);
      const q=new URLSearchParams(params||{}); q.set(cbp,cb); q.set("_",Date.now());
      const s=document.createElement("script"); const timer=setTimeout(()=>{cleanup();reject(new Error("timeout"));},65000);
      function cleanup(){clearTimeout(timer);try{delete window[cb];s.remove()}catch(e){}}
      window[cb]=p=>{cleanup();resolve(p)};
      s.onerror=()=>{cleanup();reject(new Error("script error"))};
      s.src=url+(url.includes("?")?"&":"?")+q.toString();
      document.body.appendChild(s);
    });
  }

  async function readApi(sheet){
    try{
      const p=await jsonp(FINAL_EXEC_URL,{action:"sheet",name:sheet},"callback");
      if(p&&p.ok&&p.headers){
        return (p.rows||[]).map(row=>{const o={};p.headers.forEach((h,i)=>o[String(h||"col_"+i).trim()]=row[i]??"");return o;});
      }
    }catch(e){}
    return readGviz(sheet);
  }

  async function readGviz(sheet){
    const bases=[PUB_GVIZ,DIRECT_GVIZ];
    let last=null;
    for(const base of bases){
      try{
        const cb="gvizV53_"+Date.now()+"_"+Math.random().toString(36).slice(2);
        const p=await new Promise((resolve,reject)=>{
          const q=new URLSearchParams({sheet,tq:"select *",tqx:`out:json;responseHandler:${cb}`});
          const s=document.createElement("script"); const timer=setTimeout(()=>{cleanup();reject(new Error("timeout gviz"));},65000);
          function cleanup(){clearTimeout(timer);try{delete window[cb];s.remove()}catch(e){}}
          window[cb]=x=>{cleanup();resolve(x)}; s.onerror=()=>{cleanup();reject(new Error("gviz error"))};
          s.src=base+"?"+q.toString(); document.body.appendChild(s);
        });
        if(p.status&&p.status!=="ok")throw new Error("gviz status");
        const headers=(p.table.cols||[]).map(c=>String(c.label||c.id||"").trim());
        const rows=(p.table.rows||[]).map(row=>{const o={};(row.c||[]).forEach((c,i)=>o[headers[i]||("col_"+i)]=c?(c.f??c.v??""):"");return o;}).filter(r=>Object.values(r).some(v=>String(v||"").trim()!==""));
        if(rows.length)return rows;
      }catch(e){last=e}
    }
    throw last||new Error("no se pudo leer "+sheet);
  }

  async function loadProductZones(){
    if(window.LB_V53_PRODUCT_ZONES && window.LB_V53_PRODUCT_ZONES.length) return window.LB_V53_PRODUCT_ZONES;

    const [prodRows, packRows] = await Promise.all([
      readApi("base_productos_norm_v47"),
      readApi("base_packs_dedup_v47")
    ]);

    const locByOrder = new Map();
    packRows.forEach(r=>{
      const order=String(r.id_order||r.ID_ORDER||r["id_order"]||"").trim();
      const dep=String(r.shipping_state||r.departamento||r.Department||r["shipping_state"]||"").trim().toUpperCase();
      const dist=String(r.shipping_city||r.distrito_ciudad||r.city||r["shipping_city"]||"").trim().toUpperCase();
      if(order && (dep||dist) && !locByOrder.has(order)) locByOrder.set(order,{dep,dist});
    });

    const out=[];
    prodRows.forEach(r=>{
      const sku=String(r.sku||r.SKU||"").trim();
      if(!sku || sku==="S0010") return;
      const order=String(r.id_order||r.ID_ORDER||r["id_order"]||"").trim();
      const loc=locByOrder.get(order);
      if(!loc || (!loc.dep && !loc.dist)) return;
      out.push({
        departamento: loc.dep || "SIN UBICACIÓN",
        distrito: loc.dist || "SIN DISTRITO",
        sku,
        producto: String(r.producto||r.product_name||r.Nombre||r["producto"]||"").trim(),
        unidades: num(r.unidades||r.qty||r.Cantidad),
        venta: num(r.venta_sin_igv||r.line_total_excl||r["venta_sin_igv"]),
        origen: String(r.origen||"").trim()
      });
    });
    window.LB_V53_PRODUCT_ZONES=out;
    return out;
  }

  function group(rows,keyFn,addFn){
    const m=new Map();
    rows.forEach(r=>{
      const key=keyFn(r);
      if(!key) return;
      const o=m.get(key)||addFn(null,r,key);
      addFn(o,r,key);
      m.set(key,o);
    });
    return [...m.values()];
  }

  function groupDept(rows){
    return group(rows,r=>norm(r.departamento),(o,r,key)=> o? (o.venta+=r.venta,o.unidades+=r.unidades,o.lineas++,o) : {key,label:r.departamento||"SIN UBICACIÓN",venta:0,unidades:0,lineas:0}).sort((a,b)=>b.venta-a.venta);
  }

  function groupDist(rows,dept="LIMA"){
    return group(rows.filter(r=>!dept||norm(r.departamento)===norm(dept)),r=>norm(r.distrito),(o,r,key)=> o? (o.venta+=r.venta,o.unidades+=r.unidades,o.lineas++,o) : {key,label:r.distrito||"SIN DISTRITO",venta:0,unidades:0,lineas:0}).sort((a,b)=>b.venta-a.venta);
  }

  function topProducts(rows,dept,dist,metric="venta"){
    let f=rows.slice();
    if(dept) f=f.filter(r=>norm(r.departamento)===norm(dept));
    if(dist) f=f.filter(r=>norm(r.distrito)===norm(dist));
    const g=group(f,r=>r.sku+"|"+r.producto,(o,r,key)=> o? (o.venta+=r.venta,o.unidades+=r.unidades,o.lineas++,o) : {key,sku:r.sku,producto:r.producto||r.sku,venta:0,unidades:0,lineas:0});
    return g.sort((a,b)=>metric==="unidades" ? b.unidades-a.unidades : b.venta-a.venta).slice(0,5);
  }

  function zoneOptions(rows){
    const depts=[...new Set(rows.map(r=>r.departamento).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"es"));
    const dists=[...new Set(rows.filter(r=>!window.LB_V53_DEPT || norm(r.departamento)===norm(window.LB_V53_DEPT)).map(r=>r.distrito).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"es"));
    return {depts,dists};
  }

  function bars(rows,metric="venta"){
    const max=Math.max(1,...rows.map(r=>metric==="unidades"?r.unidades:r.venta));
    return `<div class="lbv53-bars">${rows.map(r=>`
      <div class="lbv53-bar">
        <b title="${esc2(r.producto||r.label)}">${esc2(r.producto||r.label)}</b>
        <div class="lbv53-track"><i style="width:${Math.max(4,((metric==="unidades"?r.unidades:r.venta)/max)*100)}%"></i></div>
        <div class="num">${metric==="unidades"?int(r.unidades):money(r.venta)}</div>
      </div>`).join("")}</div>`;
  }

  function productsTable(rows){
    return `<div class="lbv53-scroll"><table class="lbv53-table"><thead><tr>
      <th>SKU</th><th>Producto</th><th class="num">Unidades</th><th class="num">Monto sin IGV</th><th class="num">Líneas</th>
    </tr></thead><tbody>${rows.map(r=>`<tr>
      <td>${esc2(r.sku)}</td><td>${esc2(r.producto)}</td><td class="num">${int(r.unidades)}</td><td class="num">${money(r.venta)}</td><td class="num">${int(r.lineas)}</td>
    </tr>`).join("")}</tbody></table></div>`;
  }

  function deptTable(rows){
    return `<div class="lbv53-scroll"><table class="lbv53-table"><thead><tr>
      <th>Departamento</th><th class="num">Monto sin IGV</th><th class="num">Unidades</th><th class="num">Líneas</th>
    </tr></thead><tbody>${rows.map(r=>`<tr>
      <td>${esc2(r.label)}</td><td class="num">${money(r.venta)}</td><td class="num">${int(r.unidades)}</td><td class="num">${int(r.lineas)}</td>
    </tr>`).join("")}</tbody></table></div>`;
  }

  function buildDemografiaHTML(rows){
    const dept=window.LB_V53_DEPT||"";
    const dist=window.LB_V53_DIST||"";
    const metric=window.LB_V53_METRIC||"venta";
    const opts=zoneOptions(rows);
    const filtered=rows.filter(r=>(!dept||norm(r.departamento)===norm(dept))&&(!dist||norm(r.distrito)===norm(dist)));
    const depts=groupDept(rows);
    const dists=groupDist(rows,dept||"LIMA");
    const topMonto=topProducts(rows,dept,dist,"venta");
    const topUnid=topProducts(rows,dept,dist,"unidades");
    const totalVenta=filtered.reduce((s,r)=>s+r.venta,0);
    const totalUnid=filtered.reduce((s,r)=>s+r.unidades,0);
    const zoneName=dist || dept || "Todas las zonas";

    return `
      <div class="lbv53-zone">
        <select id="lbv53Dept">
          <option value="">Todo Perú</option>${opts.depts.map(x=>`<option ${x===dept?"selected":""}>${esc2(x)}</option>`).join("")}
        </select>
        <select id="lbv53Dist">
          <option value="">Todos los distritos/ciudades</option>${opts.dists.map(x=>`<option ${x===dist?"selected":""}>${esc2(x)}</option>`).join("")}
        </select>
        <select id="lbv53Metric">
          <option value="venta" ${metric==="venta"?"selected":""}>Mapa por monto</option>
          <option value="unidades" ${metric==="unidades"?"selected":""}>Mapa por unidades</option>
        </select>
        <button class="btn sm" id="lbv53Clear">Limpiar zona</button>
      </div>

      <div class="grid kpis">
        ${App.kpiCard ? App.kpiCard({lbl:"Zona",val:esc2(zoneName),sub:"PrestaShop",src:"der"}) : ""}
        ${App.kpiCard ? App.kpiCard({lbl:"Monto sin IGV",val:money(totalVenta),sub:"solo PrestaShop",src:"der"}) : ""}
        ${App.kpiCard ? App.kpiCard({lbl:"Unidades",val:int(totalUnid),sub:"productos/componentes",src:"der"}) : ""}
        ${App.kpiCard ? App.kpiCard({lbl:"Productos únicos",val:int(new Set(filtered.map(r=>r.sku)).size),sub:"con ubicación",src:"der"}) : ""}
      </div>

      <div class="lbv53-grid">
        <div class="lbv53-card">
          <h3>Mapa Perú · ventas PrestaShop</h3>
          <div class="ch-sub">Se pinta por ${metric==="unidades"?"unidades":"monto sin IGV"}. Click en un departamento para ver sus Top 5 productos.</div>
          <div class="lbv53-map"><svg id="lbv53PeruSvg"></svg><div id="lbv53Tip" class="lbv53-tip"></div></div>
        </div>
        <div class="lbv53-card">
          <h3>Top 5 productos por monto</h3>
          ${topMonto.length?productsTable(topMonto):'<div class="empty">No hay productos para esta zona.</div>'}
          <h3 style="margin-top:16px">Top 5 productos por unidades</h3>
          ${topUnid.length?productsTable(topUnid):'<div class="empty">No hay productos para esta zona.</div>'}
        </div>
      </div>

      <div class="grid two" style="margin-top:16px">
        <div class="card">
          <h3>Ranking departamentos</h3>
          ${deptTable(depts)}
        </div>
        <div class="card">
          <h3>${dept ? "Ranking distritos/ciudades de "+esc2(dept) : "Ranking distritos/ciudades de Lima"}</h3>
          ${deptTable(dists.map(x=>({...x,label:x.label})))}
        </div>
      </div>
      <div class="lbv53-note">Esta vista usa solo PrestaShop normalizado: <b>base_productos_norm_v47</b> cruzado con ubicación de <b>base_packs_dedup_v47</b>. No usa ventas_general ni detalle_erp.</div>
    `;
  }

  async function ensureGeo(){
    if(window.LB_V53_GEO)return window.LB_V53_GEO;
    for(const url of GEOJSON_URLS){
      try{const r=await fetch(url,{cache:"force-cache"}); if(r.ok){window.LB_V53_GEO=await r.json(); return window.LB_V53_GEO;}}catch(e){}
    }
    throw new Error("GeoJSON no disponible");
  }
  function getName(f){const p=f.properties||{};return p.NOMBDEP||p.NOMB_DPTO||p.DEPARTAMEN||p.DEPARTAMENTO||p.name||p.NAME||"";}

  async function drawMap(rows){
    if(!window.d3)return;
    const svgNode=document.getElementById("lbv53PeruSvg");
    if(!svgNode)return;
    const geo=await ensureGeo();
    const svg=d3.select(svgNode); svg.selectAll("*").remove();
    const metric=window.LB_V53_METRIC||"venta";
    const agg=groupDept(rows);
    const byKey=new Map(agg.map(x=>[x.key,x]));
    const max=Math.max(1,...agg.map(x=>metric==="unidades"?x.unidades:x.venta));
    const color=d3.scaleSequential().domain([0,max]).interpolator(d3.interpolateRgbBasis(["#f4e6eb","#d6a7b6","#9b6278","#5e3650"]));
    const w=svgNode.clientWidth||820, h=svgNode.clientHeight||570;
    svg.attr("viewBox",`0 0 ${w} ${h}`);
    const g=svg.append("g");
    const projection=d3.geoMercator().fitExtent([[30,30],[w-30,h-30]],geo);
    const path=d3.geoPath(projection);
    const tip=document.getElementById("lbv53Tip");
    const zoom=d3.zoom().scaleExtent([1,7]).on("zoom",ev=>g.attr("transform",ev.transform));
    svg.call(zoom);
    g.selectAll("path").data(geo.features).join("path")
      .attr("class","lbv53-dept")
      .classed("active",f=>norm(getName(f))===norm(window.LB_V53_DEPT||""))
      .attr("d",path)
      .attr("fill",f=>{const d=byKey.get(norm(getName(f))); return d?color(metric==="unidades"?d.unidades:d.venta):"#f1e8e4";})
      .on("mouseenter",(ev,f)=>{
        const d=byKey.get(norm(getName(f)))||{label:getName(f),venta:0,unidades:0,lineas:0};
        const top=topProducts(rows,d.label,"","venta").slice(0,3);
        tip.innerHTML=`<h4>${esc2(getName(f))}</h4>
          <div class="r"><span>Monto sin IGV</span><b>${money(d.venta)}</b></div>
          <div class="r"><span>Unidades</span><b>${int(d.unidades)}</b></div>
          <div style="margin-top:8px;color:#756269">Top: ${top.map(x=>esc2(x.producto)).join(", ")||"sin ventas"}</div>`;
        tip.style.left=ev.clientX+"px"; tip.style.top=ev.clientY+"px"; tip.classList.add("show");
      })
      .on("mousemove",ev=>{tip.style.left=ev.clientX+"px";tip.style.top=ev.clientY+"px";})
      .on("mouseleave",()=>tip.classList.remove("show"))
      .on("click",(ev,f)=>{
        window.LB_V53_DEPT=getName(f).toUpperCase();
        window.LB_V53_DIST="";
        renderV53();
      });
  }

  async function renderV53(){
    const content=document.getElementById("content");
    if(!content)return;
    content.innerHTML=`<div class="card"><div class="empty">Cargando ventas demográficas de PrestaShop…</div></div>`;
    try{
      const rows=await loadProductZones();
      content.innerHTML=buildDemografiaHTML(rows);
      const title=document.getElementById("pageTitle"); if(title)title.textContent="Ventas demográficas";
      document.querySelectorAll("#nav button").forEach(b=>b.classList.toggle("active",b.dataset.tab==="ventas_demograficas_v53"));
      document.getElementById("lbv53Dept").onchange=e=>{window.LB_V53_DEPT=e.target.value; window.LB_V53_DIST=""; renderV53();};
      document.getElementById("lbv53Dist").onchange=e=>{window.LB_V53_DIST=e.target.value; renderV53();};
      document.getElementById("lbv53Metric").onchange=e=>{window.LB_V53_METRIC=e.target.value; renderV53();};
      document.getElementById("lbv53Clear").onclick=()=>{window.LB_V53_DEPT="";window.LB_V53_DIST="";renderV53();};
      await drawMap(rows);
    }catch(e){
      console.error(e);
      content.innerHTML=`<div class="card"><div class="empty"><div class="e-ic">ERR</div><div class="e-t">No se pudo cargar Ventas demográficas</div><div class="muted">${esc2(e.message||e)}</div><div style="margin-top:12px"><button class="btn primary" onclick="window.LB_RENDER_V53()">Reintentar</button></div></div></div>`;
    }
  }

  window.LB_RENDER_V53=renderV53;

  function injectTab(){
    cleanButtons();
    const nav=document.getElementById("nav");
    if(!nav)return setTimeout(injectTab,300);

    // Remove old failing demographic buttons if any.
    nav.querySelectorAll('[data-tab="ventas_demograficas"],[data-tab="ventas_demograficas_v53"]').forEach(x=>x.remove());

    const btn=document.createElement("button");
    btn.dataset.tab="ventas_demograficas_v53";
    btn.textContent="Ventas demográficas";
    btn.onclick=()=>{location.hash="ventas_demograficas_v53"; renderV53();};

    const after=nav.querySelector('[data-tab="calor"]') || nav.querySelector('[data-tab="timeline"]') || nav.lastElementChild;
    if(after) after.insertAdjacentElement("afterend",btn); else nav.appendChild(btn);

    if(location.hash==="#ventas_demograficas" || location.hash==="#ventas_demograficas_v53"){
      renderV53();
    }
  }

  function init(){
    setEndpoint();
    cleanButtons();

    // Patch App.go only for our tab, without relying on TABS.
    if(window.App && !App._v53Patched){
      App._v53Patched=true;
      const oldGo=App.go;
      App.go=function(id){
        if(id==="ventas_demograficas"||id==="ventas_demograficas_v53"){
          location.hash="ventas_demograficas_v53";
          renderV53();
          return;
        }
        return oldGo.call(this,id);
      };
      const oldBuild=App.buildNav;
      App.buildNav=function(){ const r=oldBuild.call(this); setTimeout(injectTab,50); return r; };
      const oldLoad=App.cargarDesdeGoogleSheets;
      App.cargarDesdeGoogleSheets=async function(){
        setEndpoint();
        const r=typeof oldLoad==="function"?await oldLoad.call(this):null;
        window.LB_V53_PRODUCT_ZONES=null;
        if(location.hash==="#ventas_demograficas_v53") renderV53();
        setTimeout(injectTab,100);
        return r;
      };
    }

    injectTab();
    setTimeout(injectTab,900);
    window.addEventListener("hashchange",()=>{if(location.hash==="#ventas_demograficas"||location.hash==="#ventas_demograficas_v53")renderV53();});
  }

  if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",()=>setTimeout(init,500));
  else setTimeout(init,500);
})();
</script>
