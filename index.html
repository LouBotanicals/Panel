<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lou Botanicals · Dashboard General Final v50</title>
<link rel="icon" type="image/jpeg" href="https://www.loubotanicals.pe/img/logo-17474148271.jpg">
<link rel="apple-touch-icon" href="https://www.loubotanicals.pe/img/logo-17474148271.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --rose:#c25b7e; --rose-deep:#9d3f60; --plum:#5e3650; --plum-deep:#43253b;
  --powder:#f3dde4; --nude:#e9d4c4; --blush:#fbeef1; --cream:#fdfaf7;
  --ink:#3a2531; --ink-soft:#6b5460; --line:#ecdbe1; --line-soft:#f4e7ec;
  --ok:#3f9d6e; --ok-bg:#e4f3ea; --warn:#c98a16; --warn-bg:#fbf0d8;
  --bad:#c0455a; --bad-bg:#f8e2e6; --gray:#9a8b92; --gray-bg:#efeaec;
  --shadow:0 1px 2px rgba(67,37,59,.06),0 8px 28px rgba(67,37,59,.07);
  --shadow-sm:0 1px 2px rgba(67,37,59,.08);
  --radius:16px; --radius-sm:10px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--cream);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:'Fraunces',Georgia,serif;font-weight:600;margin:0;color:var(--plum);letter-spacing:-.01em}
a{color:var(--rose-deep)}
button{font-family:inherit;cursor:pointer}
::selection{background:var(--powder)}
.hidden{display:none !important}

/* layout */
#app{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
#sidebar{background:linear-gradient(180deg,var(--plum-deep),var(--plum));color:#f7ecf0;padding:22px 14px;position:sticky;top:0;height:100vh;overflow-y:auto}
.brand{display:flex;align-items:center;gap:11px;padding:4px 8px 18px}
.brand .mark{width:34px;height:34px;border-radius:10px;background:radial-gradient(circle at 30% 25%,var(--powder),var(--rose));display:grid;place-items:center;font-family:'Fraunces';font-weight:700;color:var(--plum-deep);flex:none}
.brand .t{line-height:1.15}
.brand .t b{font-family:'Fraunces';font-weight:600;font-size:15px;color:#fff;display:block}
.brand .t span{font-size:11px;color:#d9bccb;letter-spacing:.04em}
.nav{display:flex;flex-direction:column;gap:1px;margin-top:6px}
.nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:0;color:#e4cdd8;padding:9px 11px;border-radius:9px;font-size:13px;font-weight:500;transition:.15s}
.nav button .ico{width:16px;text-align:center;opacity:.8;font-size:13px}
.nav button:hover{background:rgba(255,255,255,.07);color:#fff}
.nav button.active{background:rgba(255,255,255,.13);color:#fff}
.nav button.active .ico{opacity:1}
.nav .sep{height:1px;background:rgba(255,255,255,.1);margin:9px 8px}
.nav .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:#bf97aa;padding:4px 11px;margin-top:6px}
.side-foot{margin-top:14px;font-size:11px;color:#c19cae;padding:0 8px}
.side-foot .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--bad);margin-right:5px}
.side-foot .dot.on{background:#6fdca0}

/* main */
#main{display:flex;flex-direction:column;min-width:0}
#topbar{position:sticky;top:0;z-index:30;background:rgba(253,250,247,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:13px 26px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
#topbar .ttl{font-family:'Fraunces';font-size:19px;color:var(--plum);font-weight:600}
#topbar .sub{font-size:12px;color:var(--ink-soft);margin-top:1px}
.spacer{flex:1}
.btn{border:1px solid var(--line);background:#fff;color:var(--ink);padding:8px 13px;border-radius:9px;font-size:12.5px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:.15s}
.btn:hover{border-color:var(--rose);color:var(--rose-deep)}
.btn.primary{background:var(--rose);border-color:var(--rose);color:#fff}
.btn.primary:hover{background:var(--rose-deep);border-color:var(--rose-deep);color:#fff}
.btn.ghost{background:none;border-color:transparent}
.btn.sm{padding:5px 9px;font-size:11.5px}
.btn.danger{color:var(--bad);border-color:var(--bad-bg)}
.btn.danger:hover{background:var(--bad-bg)}

#content{padding:24px 26px 80px;max-width:1500px;width:100%}
.tab{display:none}
.tab.active{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* global filter bar */
#filterbar{display:flex;gap:9px;flex-wrap:wrap;align-items:flex-end;background:var(--blush);border:1px solid var(--line);border-radius:var(--radius);padding:13px 15px;margin-bottom:20px}
#filterbar .fg{display:flex;flex-direction:column;gap:3px}
#filterbar label{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);font-weight:600}
select,input[type=text],input[type=number],input[type=date],input[type=month],textarea{font-family:inherit;font-size:12.5px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:8px;padding:7px 9px;outline:none;transition:.15s}
select:focus,input:focus,textarea:focus{border-color:var(--rose);box-shadow:0 0 0 3px var(--blush)}
.chk{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-soft);font-weight:500}
/* multiselect */
.ms{position:relative;display:inline-block}
.ms>summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:8px;min-width:120px;max-width:200px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-size:12.5px;color:var(--ink)}
.ms>summary::-webkit-details-marker{display:none}
.ms[open]>summary{border-color:var(--rose);box-shadow:0 0 0 3px var(--blush)}
.ms-sum{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink-soft)}
.ms-sum.on{color:var(--rose);font-weight:600}
.ms-car{font-size:10px;color:var(--ink-soft)}
.ms-pan{position:absolute;z-index:60;top:calc(100% + 4px);left:0;min-width:220px;max-width:300px;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 12px 34px rgba(94,54,80,.16);padding:8px}
.ms-srch{width:100%;margin-bottom:6px}
.ms-acts{display:flex;gap:6px;margin-bottom:6px}
.ms-acts button{flex:1;border:1px solid var(--line);background:var(--cream);border-radius:6px;padding:4px 6px;font-size:11px;font-weight:600;color:var(--plum);cursor:pointer}
.ms-acts button:hover{background:var(--blush)}
.ms-list{max-height:260px;overflow:auto;display:flex;flex-direction:column;gap:1px}
.ms-o{display:flex;align-items:center;gap:8px;padding:5px 7px;border-radius:6px;font-size:12.5px;color:var(--ink);cursor:pointer}
.ms-o:hover{background:var(--blush)}
.ms-o input{accent-color:var(--rose)}
.ms-empty{padding:8px;color:var(--ink-soft);font-size:12px}
/* pivot / doble entrada */
.pvt-ctrl{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px}
.pvt-wrap{overflow:auto;border:1px solid var(--line);border-radius:10px;max-height:620px}
table.pvt{border-collapse:separate;border-spacing:0;font-size:12px;min-width:100%}
table.pvt th,table.pvt td{padding:7px 11px;border-bottom:1px solid var(--line);white-space:nowrap}
table.pvt thead th{position:sticky;top:0;z-index:3;background:var(--plum);color:#fff;font-weight:600;text-align:right}
table.pvt thead th:first-child{text-align:left;left:0;z-index:4}
table.pvt tbody td{text-align:right}
table.pvt tbody td:first-child,table.pvt tbody th:first-child{position:sticky;left:0;background:#fff;text-align:left;font-weight:600;color:var(--plum);z-index:2;box-shadow:1px 0 0 var(--line)}
table.pvt tbody tr:nth-child(even) td{background:var(--cream)}
table.pvt tbody tr:nth-child(even) td:first-child{background:var(--cream)}
table.pvt tbody tr:hover td{background:var(--blush)}
table.pvt tbody tr:hover td:first-child{background:var(--blush)}
table.pvt tfoot td{position:sticky;bottom:0;background:var(--nude);font-weight:700;color:var(--plum);text-align:right;border-top:2px solid var(--rose)}
table.pvt tfoot td:first-child{text-align:left;left:0;position:sticky;z-index:2}
.pvt-u{color:var(--ink-soft);font-size:10.5px;display:block}
.pvt-m{font-weight:600}
/* coincidence bars */
.cbar{height:24px;border-radius:7px;overflow:hidden;display:flex;background:var(--cream);border:1px solid var(--line);margin:6px 0}
.cbar>span{display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;transition:.2s}
.cbar .s-ok{background:#5a9d6b}.cbar .s-warn{background:#caa24e}.cbar .s-bad{background:#c25b7e}.cbar .s-mute{background:#c9b9c4;color:#6b5560}
.cb-leg{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--ink-soft);margin-top:4px}
.cb-leg span{display:inline-flex;align-items:center;gap:5px}
.cb-dot{width:9px;height:9px;border-radius:2px;display:inline-block}
.vbase{display:flex;flex-direction:column;gap:3px}
.vbase .vb-h{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--plum)}
.recon-row{display:grid;grid-template-columns:1.4fr 2.6fr auto;gap:14px;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}
.recon-row:last-child{border-bottom:none}
.recon-row .rr-t{font-weight:600;color:var(--ink)}
.recon-row .rr-s{font-size:11.5px;color:var(--ink-soft)}
/* heatmap */
.hm-ctrl{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;margin-bottom:6px}
.hm-cal{display:flex;gap:10px;align-items:flex-start}
.hm-wd{display:grid;grid-template-rows:18px repeat(7,22px);gap:4px;font-size:11px;color:var(--ink-soft);font-weight:600}
.hm-wd span{display:flex;align-items:center;height:22px}
.hm-scroll{overflow-x:auto;padding-bottom:8px;flex:1}
.hm-weeks{display:flex;gap:4px;min-width:min-content}
.hm-wcol{display:grid;grid-template-rows:18px repeat(7,22px);gap:4px}
.hm-ml{font-size:11px;color:var(--ink-soft);white-space:nowrap;font-weight:600;height:18px;overflow:visible}
.hm-cell{width:22px;height:22px;border-radius:4px;border:1px solid rgba(94,54,80,.05)}
.hm-cell.empty{background:#f4eef1}
.hm-mx{border-collapse:separate;border-spacing:4px}
.hm-mx td,.hm-mx th{font-size:12.5px}
.hm-mx th{color:var(--ink-soft);font-weight:600;padding:4px 10px;text-align:center}
.hm-mx th.rowh{text-align:right}
.hm-mx td{text-align:center;border-radius:7px;padding:11px 14px;font-weight:700;min-width:80px;font-variant-numeric:tabular-nums}
.hm-strip{display:flex;gap:8px;flex-wrap:wrap}
.hm-day{flex:1;min-width:110px;border-radius:12px;padding:16px 12px;text-align:center}
.hm-day .d-lbl{font-size:12px;font-weight:600;opacity:.85}
.hm-day .d-val{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:3px}
.hm-leg{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-soft);margin-top:10px}
.hm-leg .sc{display:flex;gap:3px}
.hm-leg .sc i{width:20px;height:20px;border-radius:4px;display:inline-block}
/* progress bars (presupuesto / cumplimiento) */
.pbar{height:10px;border-radius:6px;background:#efe3ea;overflow:hidden;min-width:90px}
.pbar-fill{height:100%;border-radius:6px;transition:.3s}
.pbar-lbl{font-size:10.5px;color:var(--ink-soft);margin-top:3px;white-space:nowrap}
.pbar-lg{height:16px}
.stage3{display:flex;gap:0;height:8px;border-radius:5px;overflow:hidden;min-width:120px}
.stage3 i{height:100%;flex:1}
.cmp-bar{position:relative;height:22px;border-radius:7px;background:#efe3ea;overflow:hidden;min-width:140px}
.cmp-bar .fill{position:absolute;left:0;top:0;height:100%;border-radius:7px}
.cmp-bar .txt{position:absolute;left:8px;top:0;height:100%;display:flex;align-items:center;font-size:11px;font-weight:700;color:var(--plum);z-index:2}
.cmp-bar .mk{position:absolute;top:-2px;width:2px;height:26px;background:var(--plum);opacity:.5}

/* cards */
.grid{display:grid;gap:14px}
.kpis{grid-template-columns:repeat(auto-fill,minmax(195px,1fr))}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:16px 17px}
.kpi{position:relative;overflow:hidden}
.kpi .k-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:600;display:flex;align-items:center;gap:5px}
.kpi .k-val{font-family:'Fraunces';font-size:25px;font-weight:600;color:var(--plum);margin-top:7px;line-height:1.05}
.kpi .k-val small{font-size:14px;color:var(--ink-soft);font-weight:500}
.kpi .k-sub{font-size:11.5px;color:var(--ink-soft);margin-top:5px;display:flex;align-items:center;gap:6px}
.kpi .src{position:absolute;top:13px;right:14px;font-size:9px;text-transform:uppercase;letter-spacing:.06em;padding:2px 6px;border-radius:20px;font-weight:700}
.src.erp{background:var(--ok-bg);color:var(--ok)} .src.man{background:var(--warn-bg);color:var(--warn)} .src.der{background:var(--gray-bg);color:var(--gray)} .src.meta{background:#e7eefb;color:#3b62b8}
.delta{font-weight:700;font-size:11.5px}
.delta.up{color:var(--ok)} .delta.down{color:var(--bad)} .delta.flat{color:var(--gray)}

/* badges & semaforo */
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.01em}
.pill.ok{background:var(--ok-bg);color:var(--ok)} .pill.warn{background:var(--warn-bg);color:var(--warn)}
.pill.bad{background:var(--bad-bg);color:var(--bad)} .pill.gray{background:var(--gray-bg);color:var(--gray)} .pill.meta{background:#e7eefb;color:#3b62b8}
.sem{width:11px;height:11px;border-radius:50%;display:inline-block}
.sem.ok{background:var(--ok)} .sem.warn{background:var(--warn)} .sem.bad{background:var(--bad)} .sem.gray{background:var(--gray)}
.face{font-size:18px}

/* sections */
.sec-h{display:flex;align-items:center;gap:10px;margin:26px 0 13px}
.sec-h h2{font-size:17px}
.sec-h .hint{font-size:12px;color:var(--ink-soft)}
.sec-h:first-child{margin-top:0}
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
@media(max-width:1100px){.two,.three{grid-template-columns:1fr}}
.chart-card{min-height:60px}
.chart-card h3{font-size:14px;margin-bottom:4px}
.chart-card .ch-sub{font-size:11.5px;color:var(--ink-soft);margin-bottom:10px}
.chwrap{position:relative;height:280px}
.chwrap.sm{height:210px}

/* tables */
.tbl-tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.tbl-tools .grow{flex:1}
table.dt{width:100%;border-collapse:collapse;font-size:12.5px}
table.dt th{text-align:left;font-weight:700;color:var(--ink-soft);font-size:11px;text-transform:uppercase;letter-spacing:.04em;padding:9px 10px;border-bottom:2px solid var(--line);cursor:pointer;white-space:nowrap;user-select:none}
table.dt th.no-sort{cursor:default}
table.dt th .ar{opacity:.35;font-size:9px}
table.dt td{padding:9px 10px;border-bottom:1px solid var(--line-soft);vertical-align:middle}
table.dt tbody tr:hover{background:var(--blush)}
table.dt td.num,table.dt th.num{text-align:right;font-variant-numeric:tabular-nums}
table.dt .muted{color:var(--gray)}
.pager{display:flex;gap:6px;align-items:center;justify-content:flex-end;margin-top:11px;font-size:12px;color:var(--ink-soft)}
.pager button{border:1px solid var(--line);background:#fff;border-radius:7px;padding:4px 9px;font-size:12px}
.pager button:disabled{opacity:.4;cursor:default}

/* upload */
.drop{border:2px dashed var(--nude);border-radius:var(--radius);background:var(--blush);padding:40px 22px;text-align:center;transition:.18s;cursor:pointer}
.drop.drag{border-color:var(--rose);background:var(--powder)}
.drop .big{font-family:'Fraunces';font-size:18px;color:var(--plum);margin-bottom:5px}
.drop .small{font-size:12.5px;color:var(--ink-soft)}
.filechips{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.filechip{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 11px;font-size:12px}
.filechip .x{cursor:pointer;color:var(--gray);font-weight:700}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(67,37,59,.42);backdrop-filter:blur(3px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:38px 18px;overflow-y:auto}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:18px;box-shadow:0 24px 70px rgba(67,37,59,.3);width:min(860px,100%);overflow:hidden;animation:pop .2s}
@keyframes pop{from{transform:scale(.97) translateY(6px);opacity:0}to{transform:none;opacity:1}}
.modal .m-h{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.modal .m-h h3{font-size:16px}
.modal .m-b{padding:18px 22px;max-height:64vh;overflow-y:auto}
.modal .m-f{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:9px;justify-content:flex-end;background:var(--cream)}

/* misc */
.note{font-size:12.5px;color:var(--ink-soft);background:var(--blush);border:1px solid var(--line);border-left:3px solid var(--rose);border-radius:10px;padding:11px 14px;margin:12px 0}
.note.warn{background:var(--warn-bg);border-left-color:var(--warn);border-color:#f0e2c2;color:#7d5a12}
.note.ok{background:var(--ok-bg);border-left-color:var(--ok);border-color:#cfe8da;color:#226347}
.banner{display:flex;gap:11px;align-items:flex-start;background:var(--warn-bg);border:1px solid #f0e2c2;color:#7d5a12;border-radius:12px;padding:12px 16px;margin-bottom:18px;font-size:12.5px}
.banner.ok{background:#eef5ee;border-color:#cfe3cd;color:#436b40}
.banner.warn{background:var(--warn-bg);border-color:#f0e2c2;color:#7d5a12}
.banner.danger{background:#fbeaee;border-color:#f0c9d2;color:#9d3145}
.banner .face{font-size:18px;line-height:1.1}
.banner b{color:#6b4d0f}
.empty{text-align:center;color:var(--ink-soft);padding:46px 20px}
.empty .e-ic{font-size:34px;opacity:.5;margin-bottom:8px}
.empty .e-t{font-family:'Fraunces';font-size:17px;color:var(--plum);margin-bottom:5px}
.tag{font-size:10px;padding:2px 7px;border-radius:6px;background:var(--gray-bg);color:var(--ink-soft);font-weight:600;letter-spacing:.03em}
.bar-meter{height:8px;border-radius:6px;background:var(--line-soft);overflow:hidden;min-width:80px}
.bar-meter > i{display:block;height:100%;border-radius:6px}
.kvs{display:grid;grid-template-columns:auto 1fr;gap:6px 16px;font-size:12.5px}
.kvs dt{color:var(--ink-soft)} .kvs dd{margin:0;font-weight:600;text-align:right;font-variant-numeric:tabular-nums}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--ink-soft);margin-top:8px}
.legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:-1px}
fieldset{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:0 0 16px}
fieldset legend{font-family:'Fraunces';font-weight:600;color:var(--plum);padding:0 8px;font-size:14px}
.frow{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px}
.frow .fg{display:flex;flex-direction:column;gap:3px}
.frow label{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:600}
.toast-wrap{position:fixed;bottom:22px;right:22px;z-index:200;display:flex;flex-direction:column;gap:8px}

<script>
"use strict";
/* ============================================================
   LOU BOTANICALS · Panel decisional v50 — motor de datos
   Único archivo, IndexedDB, sin build. KPI primario sin IGV.
   ============================================================ */
const IGV_FACTOR = 1.18;
const DB_NAME = "lou_dash_v4";
const DB_VER = 1;
const STORES = ["rawComprobantesERP","rawDetalleERP","rawPrestaShop","rawMetaAds","rawMetas",
  "rawSkuOverrides","rawPublicidadManual","rawKpiConfig","rawCanalMapping","rawClientesOverrides",
  "rawConciliacionesManuales","cargas","config","auditLog"];

/* ---------- helpers ---------- */
const $=(s,el=document)=>el.querySelector(s);
const $$=(s,el=document)=>[...el.querySelectorAll(s)];
const fmt={
  money:(n,dec=0)=> n==null||isNaN(n)?"N/D":"S/ "+Number(n).toLocaleString("es-PE",{minimumFractionDigits:dec,maximumFractionDigits:dec}),
  money2:(n)=>fmt.money(n,2),
  int:(n)=> n==null||isNaN(n)?"N/D":Number(Math.round(n)).toLocaleString("es-PE"),
  dec:(n,d=2)=> n==null||isNaN(n)?"N/D":Number(n).toLocaleString("es-PE",{minimumFractionDigits:d,maximumFractionDigits:d}),
  pct:(n,d=1)=> n==null||isNaN(n)?"N/D":Number(n).toLocaleString("es-PE",{minimumFractionDigits:d,maximumFractionDigits:d})+"%",
  x:(n,d=1)=> n==null||isNaN(n)||!isFinite(n)?"N/D":Number(n).toLocaleString("es-PE",{minimumFractionDigits:d,maximumFractionDigits:d})+"×",
  date:(d)=> !d?"":(d instanceof Date? d.toLocaleDateString("es-PE"):String(d)),
  ym:(d)=> !d?"":(d instanceof Date? d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"):String(d)),
};
const MESES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Setiembre","Octubre","Noviembre","Diciembre"];
function num(v){ if(v==null||v==="")return 0; if(typeof v==="number")return isFinite(v)?v:0;
  let s=String(v).replace(/\s/g,"").replace(/[^0-9.,\-]/g,""); 
  if(s.indexOf(",")>-1&&s.indexOf(".")>-1){ s=s.replace(/,/g,""); } else if(s.indexOf(",")>-1&&s.indexOf(".")===-1){ s=s.replace(/,/g,"."); }
  const n=parseFloat(s); return isNaN(n)?0:n; }
function nh(s){ if(s==null)return ""; s=String(s).trim().toLowerCase().replace(/ñ/g,"\u0001");
  s=s.normalize("NFD").replace(/[\u0300-\u036f]/g,""); s=s.replace(/\u0001/g,"ñ");
  s=s.replace(/[_\-]+/g," ").replace(/[.;:,]/g,"").replace(/\s+/g," ").trim(); return s; }
function normTxt(s){ return s==null?"":String(s).trim().replace(/\s+/g," "); }
function normKeyTxt(s){ return nh(s); }
function toDate(v){ if(v==null||v==="")return null; if(v instanceof Date)return isNaN(v)?null:v;
  if(typeof v==="number"){ const d=new Date(Math.round((v-25569)*86400*1000)); return isNaN(d)?null:d; }
  let s=String(v).trim(); let m=s.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/); if(m)return new Date(+m[1],+m[2]-1,+m[3]);
  m=s.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{4})/); if(m)return new Date(+m[3],+m[2]-1,+m[1]);
  const d=new Date(s); return isNaN(d)?null:d; }
function ymKey(d){ return d? d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0") : null; }
function round2(n){ return Math.round((n+Number.EPSILON)*100)/100; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function hashStr(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h<<5)-h+s.charCodeAt(i); h|=0; } return (h>>>0).toString(16); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
/* ---------- normalización de nombres de producto ---------- */
function fixMoji(s){ return String(s==null?"":s)
  .replace(/Ã¡/g,"á").replace(/Ã©/g,"é").replace(/Ã­/g,"í").replace(/Ã³/g,"ó").replace(/Ãº/g,"ú").replace(/Ã±/g,"ñ").replace(/Ã‘/g,"Ñ")
  .replace(/Ã(?=cido|CIDO)/gi,"á").replace(/Ã/g,""); }
function cleanName(s){ return fixMoji(s).replace(/\s+/g," ").trim(); }
function npn(s){ return cleanName(s).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""); }
function prodSize(s){ const m=npn(s).match(/(\d+(?:[.,]\d+)?)\s*(ml|gr|grs|g)\b/); if(!m)return""; let u=m[2]; if(u==="gr"||u==="grs")u="g"; return m[1].replace(",",".")+u; }
function titleName(s){ return cleanName(s).toLowerCase().replace(/(^|[\s:+\-\/(])(\p{L})/gu,(m,p,ch)=>p+ch.toUpperCase())
  .replace(/\bSpf\b/gi,"SPF").replace(/\bXl\b/g,"XL").replace(/\bMl\b/g,"ml").replace(/\bLb\b/g,"LB")
  .replace(/\bY\b/g,"y").replace(/\bDe\b/g,"de").replace(/\bPara\b/g,"para").replace(/\bCon\b/g,"con").replace(/\bEl\b/g,"el").replace(/\bLas\b/g,"las").replace(/\bLa\b/g,"la"); }
const PROD_RULES=[
  {c:"Blush Everyday Rose",t:["blush","everyday"],fixed:1},{c:"Blush Magnetic Rose",t:["blush","magnetic"],fixed:1},
  {c:"Blush Sunny Rose",t:["blush","sunny"],fixed:1},{c:"Blush Rubor Multipropósito",t:["blush"],fixed:1},
  {c:"Calypso Crema Hidratante",t:["calypso"]},{c:"Cybelle Ácido Hialurónico",t:["cybelle"]},
  {c:"Hera Retinol Vegetal",t:["hera"]},{c:"Athena Vitamina C",t:["athena"]},
  {c:"Theia Contorno de Ojos",t:["theia"],fixed:1},{c:"Prairie Elixir Humectante",t:["prairie"]},
  {c:"Hygeia Drops Limpiador",t:["hygeia"]},{c:"Double Cleanse Aceite Limpiador",t:["double cleanse"]},
  {c:"Bulgarian Rose Water",t:["bulgarian"]},{c:"Absolute Bliss Tónico",t:["absolute bliss"]},
  {c:"Mayu Tónico",t:["mayu"]},{c:"Lash Elixir Pestañas",t:["lash"],fixed:1},
  {c:"Brownie Bálsamo Cejas",t:["brownie"],fixed:1},{c:"Sunset Kiss Bálsamo Labios",t:["sunset kiss"],fixed:1},
  {c:"Vedette Labial",t:["vedette"],fixed:1},{c:"Healing Turmeric Bálsamo",t:["healing turmeric"],fixed:1},
  {c:"Super Strength Serum Capilar",t:["super strength"],fixed:1},{c:"Proteos Screen SPF50",t:["proteos"]},
  {c:"Fingercito Exfoliante",t:["fingercito"],fixed:1},{c:"Gua Sha Tulip",t:["gua sha"],fixed:1},
  {c:"Rose Quartz Roller",t:["rose quartz"],fixed:1},{c:"Honguito",t:["honguito"],fixed:1},
  {c:"Reusable Eyepads",t:["eyepads"],fixed:1},{c:"Kabuki Brush",t:["kabuki"],fixed:1},
  {c:"Tote Bag",t:["tote bag"],fixed:1},{c:"Vincha para Cabello",t:["vincha"],fixed:1},
  {c:"Neceser Lou Botanicals",t:["neceser"],fixed:1},{c:"Limpiador de Lengua",t:["limpiador de lengua"],fixed:1},
];
function isPackName(name,cat){ const t=npn(name),c=npn(cat); return /\bpack\b|\bkit\b|\bcombo\b/.test(t)||/\bkit\b|\bpack\b|\bcombo\b/.test(c)||/\+/.test(t); }
function normProduct(name,cat){
  const cleaned=cleanName(name);
  if(isPackName(name,cat))return titleName(cleaned);
  const t=npn(name);
  for(const r of PROD_RULES){ if(r.t.every(w=>t.includes(w))){ if(r.fixed)return r.c; const sz=prodSize(name); return sz? r.c+" "+sz : r.c; } }
  return titleName(cleaned);
}
/* ---------- sede (desde la serie) y tipo de cliente (desde el documento) ---------- */
const SEDE_MAP={1:"Sede Web/B2B",7:"Sede Dasso",8:"Sede Jockey Plaza",9:"Sede A. Fuentes",10:"Sede Masterclass"};
function sedeFromSerie(serie){ const s=String(serie==null?"":serie); const m=s.match(/(\d+)\s*$/); if(!m)return "Otra sede"; const n=parseInt(m[1],10); return SEDE_MAP[n]||("Serie "+s); }
function digitsOnly(s){ return String(s==null?"":s).replace(/\D/g,""); }
function tipoClienteDet(ruc){ const d=digitsOnly(ruc);
  if(!d)return "Sin identificación";
  if(d.length===11&&d.startsWith("20"))return "Empresa (RUC 20)";
  if(d.length===11&&d.startsWith("10"))return "Persona natural (RUC 10)";
  if(d.length===8)return "Persona natural (DNI)";
  if(d.length===9)return "Persona natural (CE)";
  return "Persona natural (otro)"; }
function tipoClienteBucket(ruc){ const d=digitsOnly(ruc);
  if(!d)return "Sin identificación";
  if(d.length===11&&d.startsWith("20"))return "Empresa";
  return "Persona natural"; }
function debounce(fn,ms){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; }

/* ---------- IndexedDB ---------- */
const DB={ db:null,
  open(){ return new Promise((res,rej)=>{ const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>{ const db=e.target.result; STORES.forEach(s=>{ if(!db.objectStoreNames.contains(s)) db.createObjectStore(s,{keyPath:"_k"}); }); };
    r.onsuccess=e=>{ this.db=e.target.result; res(this.db); }; r.onerror=()=>rej(r.error); }); },
  tx(store,mode="readonly"){ return this.db.transaction(store,mode).objectStore(store); },
  put(store,key,val){ return new Promise((res,rej)=>{ const o=this.tx(store,"readwrite"); const r=o.put({_k:key,v:val}); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); }); },
  get(store,key){ return new Promise((res,rej)=>{ const r=this.tx(store).get(key); r.onsuccess=()=>res(r.result?r.result.v:undefined); r.onerror=()=>rej(r.error); }); },
  all(store){ return new Promise((res,rej)=>{ const r=this.tx(store).getAll(); r.onsuccess=()=>res((r.result||[]).map(x=>x.v)); r.onerror=()=>rej(r.error); }); },
  clear(store){ return new Promise((res,rej)=>{ const r=this.tx(store,"readwrite").clear(); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); }); },
};

/* ---------- detección de fuente por firma ---------- */
const SIGN={
  comprobante:["sunat tipo comp","serie","correlativo","subtotal","igv","total","centro de ingresos"],
  detalle:["serie","correlativo","categoria","codigoint","cantidad","valor vta tot","centro de ingresos"],
  prestashop:["id order","order date","id order detail","line type","sku","product name","qty","line total incl"],
  metas:["canales redes","enero","febrero","marzo","abril","mayo"],
  metaads:["nombre de la campaña","objetivo","resultados","importe gastado (pen)","impresiones","alcance"],
  sku:["sku codigoint","sku lb","nombre principal","categoria","tipo de sku","incluir en analisis producto"],
};
const SRC_LABEL={comprobante:"Comprobantes ERP",detalle:"Detalle ERP",prestashop:"Detalle ecommerce PrestaShop",metas:"Metas comerciales",metaads:"Meta Ads",sku:"SKU normalizados"};
function detectHeaderRow(rows){ // returns header row index 0..7 maximizing keyword hits across all signatures
  const allkw=new Set([].concat(...Object.values(SIGN)));
  let best=0,bs=-1; const lim=Math.min(8,rows.length);
  for(let r=0;r<lim;r++){ const cells=(rows[r]||[]).map(nh); let sc=0; cells.forEach(c=>{ if(allkw.has(c))sc++; }); if(sc>bs){bs=sc;best=r;} }
  return best;
}
function classifySource(headerCells){
  const set=new Set(headerCells.map(nh));
  let best=null,bs=0;
  for(const k in SIGN){ const hit=SIGN[k].filter(x=>set.has(x)).length; const sc=hit/SIGN[k].length; if(sc>bs){bs=sc;best=k;} }
  return {type:best,conf:bs};
}
function rowsToObjects(rows,hr){
  const H=(rows[hr]||[]).map(x=>nh(x));
  const Hraw=(rows[hr]||[]).map(x=>normTxt(x));
  const out=[];
  for(let i=hr+1;i<rows.length;i++){ const r=rows[i]; if(!r||r.every(c=>c==null||c===""))continue;
    const o={}; H.forEach((h,j)=>{ if(h)o[h]=r[j]; }); out.push(o); }
  return {objects:out,header:Hraw};
}

/* ---------- mapeo de canales (editable) ---------- */
const DEFAULT_CANAL_MAP=[
  ["whatsapp","Digital","WHATSAPP",true,""],["web","Digital","WEB",true,""],
  ["instagram","Digital","INSTAGRAM",true,""],["messenger","Digital","MESSENGER",true,""],
  ["tik tok","Digital","TIKTOK",true,""],["tiktok","Digital","TIKTOK",true,""],
  ["facebook","Digital","FACEBOOK",true,""],
  ["jockey club","Presencial","JOCKEY",true,"Módulo Jockey"],["jockey","Presencial","JOCKEY",true,""],
  ["dasso","Presencial","DASSO",true,"Showroom Dasso"],["showroom","Presencial","SHOWROOM",true,"Showroom principal"],

function metaObjectiveCode(raw,camp){
  const obj=nh(raw), c=nh(camp);

    if(c.includes("masterclass")||c.includes("master class"))return "MENSAJES_MASTERCLASS";

}

/* ---------- parser CSV/TSV simple para SKU normalizados ---------- */
function parseDelimitedRows(text){
  text=String(text||"").replace(/^\uFEFF/,"");
  const first=(text.split(/\r?\n/).find(Boolean)||"");
  const counts={";":(first.match(/;/g)||[]).length,",":(first.match(/,/g)||[]).length,"\t":(first.match(/\t/g)||[]).length};
  const delim=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0]||",";
  const rows=[]; let row=[],cell="",q=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i], nx=text[i+1];
    if(ch==='"'){
      if(q&&nx==='"'){cell+='"';i++;}
      else q=!q;
    } else if(ch===delim&&!q){ row.push(cell); cell=""; }
    else if((ch==='\n'||ch==='\r')&&!q){
      if(ch==='\r'&&nx==='\n')i++;
      row.push(cell); if(row.some(x=>String(x).trim()!==""))rows.push(row); row=[]; cell="";
    } else cell+=ch;
  }
  row.push(cell); if(row.some(x=>String(x).trim()!==""))rows.push(row);
  return rows;
}

  const incluirAnalisis=!(["no","false","0","n"].includes(incluirRaw));

function parseMetasMatrix(rows,hr){
  // header row hr has months; subsequent rows: channel + 12 month metas
  const H=(rows[hr]||[]).map(nh);
  const mesIdx={}; MESES.forEach((m,i)=>{ const k=nh(m); const j=H.indexOf(k); if(j>-1)mesIdx[i]=j; });
  const canalCol=0; const out=[];
  for(let r=hr+1;r<rows.length;r++){ const row=rows[r]; if(!row)continue;
    const canalRaw=normTxt(row[canalCol]); if(!canalRaw||nh(canalRaw)==="total"||nh(canalRaw)==="meta mensual")continue;
    const canalN=mapMetaCanal(canalRaw);
    for(let m=0;m<12;m++){ if(mesIdx[m]==null)continue; const val=num(row[mesIdx[m]]); if(val<=0)continue;
      out.push({_k:(App.metasYear)+"|"+(m+1)+"|"+ (canalN.linea==="MASTERCLASS"?"MASTERCLASS":"VENTA") +"|"+canalN.canal,
        anio:App.metasYear, mes:m+1, canal:canalN.canal, linea:canalN.linea, tipoMeta:canalN.linea==="MASTERCLASS"?"CUPO_MONTO":"VENTA",
        meta:val, canalRaw }); } }
  return out;
}
function mapMetaCanal(raw){
  const k=nh(raw);
  if(k.includes("masterclass")) return {canal:"CUPO MASTERCLASS",linea:"MASTERCLASS"};
  if(k.includes("whatsapp")) return {canal:"WHATSAPP",linea:"PRODUCTOS"};
  if(k.includes("web")) return {canal:"WEB",linea:"PRODUCTOS"};
  if(k.includes("instagram")) return {canal:"INSTAGRAM",linea:"PRODUCTOS"};
  if(k.includes("jockey")) return {canal:"JOCKEY",linea:"PRODUCTOS"};
  if(k.includes("dasso")) return {canal:"DASSO",linea:"PRODUCTOS"};
  if(k.includes("showroom")) return {canal:"SHOWROOM",linea:"PRODUCTOS"};
  return {canal:raw.toUpperCase(),linea:"PRODUCTOS"};
}

    if(!m && k){ m=maps.find(x=>{ const mk=nh(x.centroIngresoERP); return mk && (k.includes(mk)||mk.includes(k)); }); }
    if(m){ const canal=normTxt(m.canalNormalizado||"SIN ASIGNAR").toUpperCase(); return {ambito:m.ambitoComercial||"Otros",canal,known:canal!=="SIN ASIGNAR",centroLabel:canal!=="SIN ASIGNAR"?canal:(centro||"(vacío)"),inferred:false,reason:"mapeo normalizado"}; }

    if(!k)return {ambito:"Otros",canal:"SIN ASIGNAR",known:false,centroLabel:"(vacío)",inferred:false,reason:"centro vacío sin evidencia"};
    return {ambito:"Otros",canal:"SIN ASIGNAR",known:false,centroLabel:centro||"(vacío)",inferred:false,reason:"sin mapeo"};
  },
  serieSuffix(serie){ const m=String(serie==null?"":serie).match(/(\d+)\s*$/); return m?parseInt(m[1],10):null; },
  isWebBlankRow(row,parent=null){
    const centro=nh(row&&row.centroIngresoERP); if(centro)return false;
    const serie=(row&&row.serie)||((row&&row.docKey)?String(row.docKey).split("|")[1]:"")||((parent&&parent.serie)||"");
    const suf=this.serieSuffix(serie);
    const txt=[row&&row.vendedor,row&&row.usuarioEmisor,row&&row.vendedorEmail,row&&row.descripcion,row&&row.memo,row&&row.correo,row&&row.correos,row&&row.telf,parent&&parent.vendedor,parent&&parent.usuarioEmisor,parent&&parent.descripcion,parent&&parent.memo,parent&&parent.correo,parent&&parent.correos,parent&&parent.telf].map(nh).join(" ");
    if(txt.includes("lb venta web") || txt.includes("venta web") || txt.includes("ventas loubotanicals pe"))return true;
    if(txt.includes("pedido") && (txt.includes("direccion de entrega") || txt.includes("dirección de entrega") || txt.includes("cel")))return true;
    if(suf===1)return true;
    return false;
  },
  classifyCentro(row,parent=null){
    const centro=normTxt(row&&row.centroIngresoERP);
    if(this.isWebBlankRow(row,parent))return {ambito:"Digital",canal:"WEB",known:true,centroLabel:"WEB",inferred:true,reason:"centro vacío inferido como WEB por vendedor/ecommerce/serie 001"};
    const base=this.canalLookup(centro);

    return base;
  },
  rowCenterKey(r){ return (r&&r._centroAgrupado) || normTxt(r&&r.centroIngresoERP) || "(vacío)"; },
  rowCenterMatch(r,acen){ if(!acen||!acen.length)return true; const grp=nh(this.rowCenterKey(r)); const orig=nh(r&&r.centroIngresoERP); return acen.includes(grp)||acen.includes(orig)||(acen.includes("web")&&r&&r._canal==="WEB"); },
  isMasterclass(d){
    const cat=nh(d.categoria), sku=nh(d.codigoInt||d.sku), nom=nh(d.nombre||d.productName);
    if(cat==="master")return true;
    if(sku.startsWith("mastc"))return true;
    if(nom.includes("masterclass"))return true;
    const ov=this.skuOverrides.find(o=>nh(o.codigoInt)===nh(d.codigoInt));
    if(ov && nh(ov.lineaNegocio)==="masterclass")return true;
    return false;
  },
  isExcludedProduct(nombre,categoria){
    const n=nh(nombre), c=nh(categoria);
    return this.config.excludeWords.some(w=>{ const wk=nh(w); return n.includes(wk)||c.includes(wk); });
  },
  /* canonical product name (standardization) */
  prodName(nombre,categoria,codigoInt){
    const skuKey=nh(codigoInt);
    if(skuKey){ const sku=this.skuOverrides.find(o=>nh(o.codigoInt)===skuKey||nh(o.skuLB)===skuKey); if(sku&&sku.nombrePrincipal) return titleName(sku.nombrePrincipal); }
    if(!this.config.normProductos) return cleanName(nombre);

  },

  /* ============ MODEL BUILD ============ */
  rebuild(){
    const t0=performance.now();
    this.dedupeRuntime&&this.dedupeRuntime();
    const m={ generated:Date.now() };
    // 1) comprobantes index
    m.compByKey={}; this.comprobantes.forEach(c=>{ m.compByKey[c.docKey]=c; });
    m.validComp=this.comprobantes.filter(c=>!c.anulado);
    // 2) financial totals from comprobantes (verdad financiera)
    // 3) reconciliation comp <-> detalle
    m.detByKey={}; this.detalle.forEach(d=>{ (m.detByKey[d.docKey]=m.detByKey[d.docKey]||[]).push(d); });
    // attach canal/ambito + masterclass flags with operational center inference
    this.comprobantes.forEach(c=>{ const cl=this.classifyCentro(c); c._canal=cl.canal; c._ambito=cl.ambito; c._known=cl.known; c._centroAgrupado=cl.centroLabel; c._centroInferido=!!cl.inferred; c._centroRazon=cl.reason; c._sede=sedeFromSerie(c.serie); c._tipoCli=tipoClienteBucket(c.ruc); c._tipoCliDet=tipoClienteDet(c.ruc); });
    this.detalle.forEach(d=>{ const parent=m.compByKey[d.docKey]||null; const cl=this.classifyCentro(d,parent); d._canal=cl.canal; d._ambito=cl.ambito; d._known=cl.known; d._centroAgrupado=cl.centroLabel; d._centroInferido=!!cl.inferred; d._centroRazon=cl.reason; d._mc=this.isMasterclass(d); d._prod=this.prodName(d.nombre,d.categoria,d.codigoInt); d._sede=sedeFromSerie(d.serie||(d.docKey||"").split("|")[1]); });
    this.presta.forEach(p=>{ if(p.lineType==="PACK") p._pack=this.config.normProductos? titleName(cleanName(p.productName)) : cleanName(p.productName); });
    // propagate tipo de cliente al detalle por documento
    const tipoByKey={}; this.comprobantes.forEach(c=>{ tipoByKey[c.docKey]=c._tipoCli; });
    this.detalle.forEach(d=>{ d._tipoCli=tipoByKey[d.docKey]||"Sin identificación"; });
    // 4) PrestaShop reconciliation against ERP
    m.recon=this.reconcilePresta();
    // 4b) WEB por reconciliación: un comprobante que casa con un pedido PrestaShop ES venta web.
    //     Rellena centros vacíos / sin asignar (no pisa WhatsApp, Instagram, etc. ya etiquetados).
    m.webReconCount=0; m.webReconMonto=0;
    if(this.config.webFromPresta!==false){
      const webKeys=m.recon.used||new Set();
      this.comprobantes.forEach(c=>{ const blank=!nh(c.centroIngresoERP); if(webKeys.has(c.docKey) && blank && (!c._known||!c._canal||c._canal==="SIN ASIGNAR")){ c._canal="WEB"; c._ambito="Digital"; c._centroAgrupado="WEB"; c._centroInferido=true; c._centroRazon="centro vacío recuperado por match PrestaShop"; c._webRecon=true; m.webReconCount++; m.webReconMonto+=c.montoSinIGV; } });
      this.detalle.forEach(d=>{ const blank=!nh(d.centroIngresoERP); if(webKeys.has(d.docKey) && blank && (!d._known||!d._canal||d._canal==="SIN ASIGNAR")){ d._canal="WEB"; d._ambito="Digital"; d._centroAgrupado="WEB"; d._centroInferido=true; d._centroRazon="centro vacío recuperado por match PrestaShop"; d._webRecon=true; } });
    }
    // 5) RFM clientes
    m.clientes=this.buildClientes();
    this.model=m;
    this.model._ms=Math.round(performance.now()-t0);
  },

  /* aggregate ERP detalle under current filters */
  filteredDetalle(){
    const f=this.filters;
    const arr=(k)=>Array.isArray(f[k])?f[k]:(f[k]!=null&&f[k]!==""?[f[k]]:[]);
    const ay=arr("y"),am=arr("m"),aamb=arr("ambito"),acan=arr("canal"),acen=arr("centro").map(nh),aven=arr("vendedor").map(nh),acat=arr("categoria").map(nh),apro=arr("producto").map(nh),alin=arr("linea"),ased=arr("sede"),atip=arr("tipocli");
    return this.detalle.filter(d=>{
      if(d.anulado && !f.incAnulados)return false;
      if(d.esNC && f.excNC)return false;
      if(ay.length && (!d.fecha||!ay.includes(d.fecha.getFullYear())))return false;
      if(am.length && (!d.fecha||!am.includes(d.fecha.getMonth()+1)))return false;
      if(f.d1 && d.fecha && d.fecha< f.d1)return false;
      if(f.d2 && d.fecha && d.fecha> f.d2)return false;
      if(aamb.length && !aamb.includes(d._ambito))return false;
      if(acan.length && !acan.includes(d._canal))return false;
      if(acen.length && !this.rowCenterMatch(d,acen))return false;
      if(aven.length && !aven.includes(nh(d.vendedor)))return false;
      if(acat.length && !acat.includes(nh(d.categoria)))return false;
      if(apro.length && !apro.includes(nh(d._prod)))return false;
      if(ased.length && !ased.includes(d._sede))return false;
      if(atip.length && !atip.includes(d._tipoCli))return false;
      if(alin.length){ const wMC=alin.includes("MASTERCLASS"), wP=alin.includes("PRODUCTOS"); if(d._mc&&!wMC)return false; if(!d._mc&&!wP)return false; }
      if(f.excMC && d._mc)return false;
      return true;
    });
  },
  filteredComprobantes(){
    const f=this.filters;
    const arr=(k)=>Array.isArray(f[k])?f[k]:(f[k]!=null&&f[k]!==""?[f[k]]:[]);
    const ay=arr("y"),am=arr("m"),aamb=arr("ambito"),acan=arr("canal"),acen=arr("centro").map(nh),aven=arr("vendedor").map(nh),ased=arr("sede"),atip=arr("tipocli");
    return this.comprobantes.filter(c=>{
      if(c.anulado && !f.incAnulados)return false;
      if(c.esNC && f.excNC)return false;
      if(ay.length && (!c.fecha||!ay.includes(c.fecha.getFullYear())))return false;
      if(am.length && (!c.fecha||!am.includes(c.fecha.getMonth()+1)))return false;
      if(f.d1 && c.fecha && c.fecha< f.d1)return false;
      if(f.d2 && c.fecha && c.fecha> f.d2)return false;
      if(aamb.length && !aamb.includes(c._ambito))return false;
      if(acan.length && !acan.includes(c._canal))return false;
      if(acen.length && !this.rowCenterMatch(c,acen))return false;
      if(aven.length && !aven.includes(nh(c.vendedor)))return false;
      if(ased.length && !ased.includes(c._sede))return false;
      if(atip.length && !atip.includes(c._tipoCli))return false;
      return true;
    });
  },
  /* single-value helpers for contexts that need one year/month */
  selYear(){ const a=this.filters.y; return (Array.isArray(a)&&a.length===1)?+a[0]:(a&&!Array.isArray(a)?+a:null); },
  selMonth(){ const a=this.filters.m; return (Array.isArray(a)&&a.length===1)?+a[0]:(a&&!Array.isArray(a)?+a:null); },
  selArr(k){ const v=this.filters[k]; return Array.isArray(v)?v:(v!=null&&v!==""?[v]:[]); },

  /* core financial summary (sin IGV primario, comprobantes válidos) */
  summary(){
    const comp=this.filteredComprobantes().filter(c=>!c.anulado);
    const det=this.filteredDetalle().filter(d=>!d.anulado);
    let netSin=0,netCon=0,grat=0,nc=0,ncCnt=0,pedidos=0; const cliSet=new Set();
    comp.forEach(c=>{ netSin+=c.montoSinIGV; netCon+=c.montoConIGV; grat+=c.gratuito;
      if(c.esNC){ nc+=c.montoSinIGV; ncCnt++; } else pedidos++;
      const id=this.clienteId(c); if(id)cliSet.add(id); });
    let unidades=0, ventaMC=0, cuposMC=0, mcBuyers=new Set();
    det.forEach(d=>{ if(d._mc){ ventaMC+=d.valorVtaTot; cuposMC+=d.cantidad; const id=this.clienteIdDet(d); if(id)mcBuyers.add(id); }
      else if(!this.isExcludedProduct(d.nombre,d.categoria)){ unidades+=d.cantidad; } });
    // digital vs presencial (comprobantes)
    let dig=0,pres=0,otro=0;
    comp.forEach(c=>{ if(c._ambito==="Digital")dig+=c.montoSinIGV; else if(c._ambito==="Presencial")pres+=c.montoSinIGV; else otro+=c.montoSinIGV; });
    return {netSin,netCon,grat,nc,ncCnt,pedidos,clientes:cliSet.size,unidades,
      ventaMC,cuposMC,mcBuyers:mcBuyers.size, dig,pres,otro,
      ticket: pedidos? netSin/pedidos : 0,
      mixDig: (dig+pres)? dig/(dig+pres)*100:0 };
  },
  clienteId(c){ return nh(c.ruc)||nh(c.correo)||nh(c.telf)||nh(c.cliente)||null; },
  clienteIdDet(d){ return nh(d.correo)||nh(d.telf)||nh(d.cliente)||null; },

  /* ============ RECONCILIATION PrestaShop <-> ERP ============ */
  reconcilePresta(){
    // dedup presta orders (header level) by idOrder
    const orders={};
    this.presta.forEach(p=>{ if(!orders[p.idOrder]){ orders[p.idOrder]={idOrder:p.idOrder,fecha:p.fecha,ym:p.ym,
      email:p.customerEmail,phone:nh(p.shippingPhone),name:p.customerName,total:round2(p.orderTotalIncl||0),matched:null,method:null,diff:null}; } });
    const ordArr=Object.values(orders);
    // index ERP comprobantes by rounded total, mark used
    const compAvail=this.comprobantes.filter(c=>!c.anulado && !c.esNC);
    const byTotal={}; compAvail.forEach(c=>{ const k=round2(c.montoConIGV).toFixed(2); (byTotal[k]=byTotal[k]||[]).push(c); });
    const used=new Set();
    // priority -1: EXACT match by serie+correlativo (formato PrestaShop nuevo)
    const byKey={}; compAvail.forEach(c=>{ const k=c.serie+"|"+String(c.correlativo).replace(/^0+/,""); if(k&&!byKey[k])byKey[k]=c; });
    let exactN=0;
    this.presta.forEach(p=>{ if(!p.matchKey)return; const o=orders[p.idOrder]; if(o&&!o.matched){ const c=byKey[p.matchKey]; if(c&&!used.has(c.docKey)){ o.matched=c.docKey; o.method="serie+correlativo"; o.diff=round2(o.total-c.montoConIGV); used.add(c.docKey); exactN++; } } });
    // priority 0: id_order found in ERP memo/descripcion
    const erpOrderRef={}; // pedido number -> comp
    compAvail.forEach(c=>{ const txt=(c.memo+" "+c.descripcion); const mm=txt.match(/pedido[:\s#]*([0-9]{4,})/i)||txt.match(/\b(30\d{5,})\b/); if(mm){ erpOrderRef[mm[1]]=erpOrderRef[mm[1]]||c; } });
    ordArr.forEach(o=>{ const c=erpOrderRef[o.idOrder]; if(c && !used.has(c.docKey)){ o.matched=c.docKey; o.method="ref_pedido"; o.diff=round2(o.total-c.montoConIGV); used.add(c.docKey); } });
    // greedy filters
    const within=(a,b,days)=> a&&b? Math.abs((a-b)/86400000)<=days : false;
    const tryMatch=(o,test,method)=>{ const k=round2(o.total).toFixed(2); const cands=(byTotal[k]||[]).filter(c=>!used.has(c.docKey)); 
      for(const c of cands){ if(test(o,c)){ o.matched=c.docKey;o.method=method;o.diff=round2(o.total-c.montoConIGV);used.add(c.docKey);return true; } } return false; };
    const unmatched=()=>ordArr.filter(o=>!o.matched && o.total>0);
    unmatched().forEach(o=> tryMatch(o,(o,c)=> nh(c.correo)===o.email && o.email && within(o.fecha,c.fecha,3),"total+correo+f3"));
    unmatched().forEach(o=> tryMatch(o,(o,c)=> nh(c.correo)===o.email && o.email,"total+correo"));
    unmatched().forEach(o=> tryMatch(o,(o,c)=> nh(c.telf)===o.phone && o.phone,"total+telf"));
    unmatched().forEach(o=> tryMatch(o,(o,c)=> within(o.fecha,c.fecha,5),"total+f5"));
    unmatched().forEach(o=>{ const k=round2(o.total).toFixed(2); const cands=(byTotal[k]||[]).filter(c=>!used.has(c.docKey)); if(cands.length===1){ const c=cands[0]; o.matched=c.docKey;o.method="total_unico";o.diff=round2(o.total-c.montoConIGV);used.add(c.docKey);} });
    // manual matches
    this.conciliacionesManuales.forEach(mm=>{ const o=orders[mm.idOrder]; if(o){o.matched=mm.docKey;o.method="manual";o.diff=mm.diff||0;} });
    const matched=ordArr.filter(o=>o.matched);
    const noComp=ordArr.filter(o=>!o.matched && o.total>0);
    const compNoOrder=compAvail.filter(c=>!used.has(c.docKey));
    const montoSinConciliar=noComp.reduce((s,o)=>s+(o.total||0),0); // con IGV
    return { orders:ordArr, matched, noComp, compNoOrder, used,
      tasa: ordArr.length? matched.length/ordArr.filter(o=>o.total>0).length*100:0,
      montoSinConciliar, ventaPotencialPrestaSinComp: round2(montoSinConciliar/IGV_FACTOR),
      totalOrders: ordArr.filter(o=>o.total>0).length };
  },

  /* ============ CLIENTES / RFM / CLV ============ */
  buildClientes(){
    const det=this.detalle.filter(d=>!d.anulado);
    const comp=this.comprobantes.filter(c=>!c.anulado);
    const map={};
    const keyComp=c=> nh(c.ruc)||nh(c.correo)||nh(c.telf)||nh(c.cliente);
    comp.forEach(c=>{ const id=keyComp(c); if(!id)return;
      const r=map[id]||(map[id]={id,nombre:c.cliente||id,correo:c.correo,telf:c.telf,ruc:c.ruc,
        first:c.fecha,last:c.fecha,freq:0,monetary:0,canales:{},centros:{},vendedoras:{},productos:{},mc:false,web:false,pres:false});
      if(c.esNC){ r.monetary+=c.montoSinIGV; return; }
      r.freq++; r.monetary+=c.montoSinIGV;
      if(c.fecha){ if(!r.first||c.fecha<r.first)r.first=c.fecha; if(!r.last||c.fecha>r.last)r.last=c.fecha; }
      r.canales[c._canal]=(r.canales[c._canal]||0)+c.montoSinIGV;
      r.centros[this.rowCenterKey(c)||"—"]=(r.centros[this.rowCenterKey(c)||"—"]||0)+c.montoSinIGV;
      r.vendedoras[c.vendedor||"—"]=(r.vendedoras[c.vendedor||"—"]||0)+c.montoSinIGV;
      if(c._ambito==="Digital")r.web=true; if(c._ambito==="Presencial")r.pres=true;
    });
    // enrich product & masterclass from detalle by client key
    det.forEach(d=>{ const id=nh(d.correo)||nh(d.telf)||nh(d.cliente); if(!id||!map[id])return;
      if(d._mc){map[id].mc=true;} else if(!this.isExcludedProduct(d.nombre,d.categoria)){ map[id].productos[d.nombre]=(map[id].productos[d.nombre]||0)+d.cantidad; } });
    const now=this.maxDate()||new Date();
    const arr=Object.values(map).map(r=>{
      const rec= r.last? Math.round((now-r.last)/86400000):9999;
      const ticket= r.freq? r.monetary/r.freq:0;
      const top=(o)=>{ let bk="—",bv=-1; for(const k in o){ if(o[k]>bv){bv=o[k];bk=k;} } return bk; };
      const mesesAct= (r.first&&r.last)? Math.max(1,Math.round((r.last-r.first)/2629800000)+1):1;
      r.recency=rec; r.ticket=ticket; r.canalPrincipal=top(r.canales); r.centroPrincipal=top(r.centros);
      r.vendedoraPrincipal=top(r.vendedoras); r.productoPrincipal=top(r.productos); r.mesesActivos=mesesAct;
      r.clv=r.monetary; r.segmento=this.segmentar(r); return r;
    });
    return arr;
  },
  maxDate(){ let mx=null; this.comprobantes.forEach(c=>{ if(c.fecha&&(!mx||c.fecha>mx))mx=c.fecha; }); return mx; },
  segmentar(r){ const c=this.config.rfm;
    if(r.recency<=c.feiR && r.freq>=c.feiF && r.monetary>=c.feiM)return "FEI";
    if(r.recency<=c.prospR && r.freq>=c.prospF)return "Prospecto FEI";
    if(r.recency<=c.regR)return "Regulares";
    if(r.recency<=c.segR)return "Seguimiento";
    return "Reactivación"; },

  /* ---- semáforo ---- */
  semaforo(idKPI,value){
    const k=this.kpiConfig.find(x=>x.idKPI===idKPI); if(!k||value==null||isNaN(value))return {cls:"gray",face:"N/D",txt:"N/D"};
    const {limiteRojo:R,limiteAmarillo:A,limiteVerde:V,direccion:dir}=k;
    let cls;
    if(dir==="MAYOR_ES_MEJOR"){ cls= value>=V?"ok": value>=A?"warn":"bad"; }
    else if(dir==="MENOR_ES_MEJOR"){ cls= value<=V?"ok": value<=A?"warn":"bad"; }
    else { const d=Math.abs(value-k.meta); cls= value>=A&&value<=V?"ok": (value>=R)?"warn":"bad"; }
    return {cls,face:cls==="ok"?"OK":cls==="warn"?"ALERTA":"CRÍTICO",txt:cls==="ok"?"En meta":cls==="warn"?"Atención":"Crítico"};
  },

  /* ---- meta lookup ---- */
  metaFor(canal,linea,year,month){
    return this.metas.filter(x=> (year?x.anio==year:true) && (month?x.mes==month:true) &&
      (canal? x.canal===canal:true) && (linea? x.linea===linea:true) )
      .reduce((s,x)=>s+x.meta,0);
  },
};

<script>

const TABS=[

App._filtersByTab={};
Object.defineProperty(App,"filters",{
  configurable:true,
  get(){ const t=this.curTab||"_g"; return this._filtersByTab[t]||(this._filtersByTab[t]={}); },
  set(v){ const t=this.curTab||"_g"; this._filtersByTab[t]=v||{}; }
});
App._cloneFilter=function(o){ const r={}; for(const k in o){ const v=o[k]; r[k]=Array.isArray(v)?v.slice():(v instanceof Date?new Date(v):v); } return r; };
App.copyFilterToAll=function(){
  const cur=this._cloneFilter(this.filters||{});
  (this.TABS||[]).forEach(t=>{ this._filtersByTab[t.id]=this._cloneFilter(cur); });
  this._filtersByTab["_g"]=this._cloneFilter(cur);
  this.toast&&this.toast("Filtro copiado a todas las pestañas");
  this.render(this.curTab);
};
App.filterActiveCount=function(f){ f=f||this.filters; let n=0; for(const k in f){ const v=f[k]; if(v==null)continue; if(Array.isArray(v)){ if(v.length)n++; } else if(v===true||v instanceof Date){ n++; } } return n; };

App.ms=function(key,label,options,opts={}){

  const num=opts.num?1:0;

    items.map(i=>`<label class="ms-o"><input type="checkbox" data-v="${esc(String(i.v))}" ${selSet.has(String(i.v))?"checked":""} onchange="App.msToggleEl(this)"><span>${esc(i.label)}</span></label>`).join("")||`<div class="ms-empty">Sin opciones</div>`;
  return `<div class="fg"><label>${label}</label>
    <details class="ms" data-key="${key}" data-num="${num}" data-lazy="${opts.lazy?1:0}" ontoggle="App.msOpenState(this)">

App.msFill=function(det){

/* ===================== EXCEL INGEST ===================== */
App.handleFiles=async function(fileList){
  this.pending=this.pending||[];
  for(const file of fileList){
    this.toast("Leyendo "+file.name+"…");
    try{
      let best=null;
      if(/\.csv$/i.test(file.name)){
        const rows=parseDelimitedRows(await file.text());
        const hr=detectHeaderRow(rows);
        const headerCells=(rows[hr]||[]).map(x=>normTxt(x));
        const cls=classifySource(headerCells);
        best={sheet:"CSV",rows,hr,headerCells,cls};
      }else{
        const buf=await file.arrayBuffer();
        const wb=XLSX.read(buf,{type:"array",cellDates:true});
        // try each sheet, pick the one that classifies best
        wb.SheetNames.forEach(sn=>{
          const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,raw:true,defval:null});
          if(!rows.length)return;
          const hr=detectHeaderRow(rows);
          const headerCells=(rows[hr]||[]).map(x=>normTxt(x));
          const cls=classifySource(headerCells);
          if(!best||cls.conf>best.cls.conf){ best={sheet:sn,rows,hr,headerCells,cls}; }
        });
      }
      if(!best||best.cls.conf<0.5){ this.toast("No se reconoció la fuente: "+file.name,"bad"); continue; }
      const prepared=this.prepareIngest(file.name,best);
      this.pending.push(prepared);
    }catch(e){ console.error(e); this.toast("Error leyendo "+file.name,"bad"); }
  }
  if(this.pending.length)this.showIngestModal();
};
App.prepareIngest=function(fileName,best){
  const {objects,header}=rowsToObjects(best.rows,best.hr);
  const type=best.cls.type;
  let records=[],store="",dateRange=[null,null],unknownCols=[],missing=[];
  const need={comprobante:SIGN.comprobante,detalle:SIGN.detalle,prestashop:SIGN.prestashop,metaads:SIGN.metaads,metas:SIGN.metas,sku:SIGN.sku}[type]||[];
  const haveSet=new Set(header.map(nh)); need.forEach(k=>{ if(!haveSet.has(k))missing.push(k); });
  if(type==="comprobante"){ store="rawComprobantesERP"; records=objects.map(parseComprobante); }
  else if(type==="detalle"){ store="rawDetalleERP"; records=objects.map((o,i)=>parseDetalle(o,i)); }
  else if(type==="prestashop"){ store="rawPrestaShop"; records=objects.map(parsePresta); }
  else if(type==="metaads"){ store="rawMetaAds"; records=objects.map(parseMetaAds).filter(Boolean); }
  else if(type==="metas"){ store="rawMetas"; records=parseMetasMatrix(best.rows,best.hr); }
  else if(type==="sku"){ store="rawSkuOverrides"; records=objects.map((o,i)=>parseSkuNormalized(o,i)).filter(r=>r.codigoInt||r.skuLB||r.nombrePrincipal); }
  const dates=records.map(r=>r.fecha||r.ini).filter(Boolean); if(dates.length){ dateRange=[new Date(Math.min(...dates)),new Date(Math.max(...dates))]; }
  // dedup vs existing
  const existing=new Set((this[ {rawComprobantesERP:"comprobantes",rawDetalleERP:"detalle",rawPrestaShop:"presta",rawMetaAds:"metaAds",rawMetas:"metas",rawSkuOverrides:"skuOverrides"}[store] ]||[]).map(x=>x._k));
  let nuevos=0,dup=0; const seen=new Set();
  records.forEach(r=>{ if(seen.has(r._k)){dup++;return;} seen.add(r._k); if(existing.has(r._k))dup++; else nuevos++; });
  return {fileName,type,store,records,header,hr:best.hr,sheet:best.sheet,conf:best.cls.conf,
    rowCount:records.length,nuevos,dup,dateRange,unknownCols,missing,hash:hashStr(fileName+records.length+(records[0]?records[0]._k:""))};
};
App.showIngestModal=function(){
  const valOK=(p)=>this.ingestValidation(p);
  const rows=this.pending.map((p,i)=>{
    const v=valOK(p);
    return `<tr>
      <td><b>${esc(p.fileName)}</b><div class="muted" style="font-size:11px">hoja: ${esc(p.sheet)} · encab. fila ${p.hr+1}</div></td>
      <td><span class="pill ${p.conf>=0.9?"ok":"warn"}">${SRC_LABEL[p.type]}</span><div class="muted" style="font-size:11px">conf ${(p.conf*100).toFixed(0)}%</div></td>
      <td class="num">${fmt.int(p.rowCount)}</td>
      <td class="num" style="color:var(--ok)">${fmt.int(p.nuevos)}</td>
      <td class="num muted">${fmt.int(p.dup)}</td>
      <td>${p.dateRange[0]?fmt.date(p.dateRange[0])+" → "+fmt.date(p.dateRange[1]):"—"}</td>
      <td>${v.length?v.map(x=>`<div class="muted" style="font-size:11px;color:${x.bad?'var(--bad)':'var(--warn)'}">${x.bad?'Error':'Advertencia'} ${esc(x.msg)}</div>`).join(""):'<span class="pill ok">OK</span>'}</td>
    </tr>`;
  }).join("");
  const body=`<p style="margin-top:0;color:var(--ink-soft)">Revisa la detección antes de integrar. Los duplicados se actualizan por su llave documental; los nuevos se agregan.</p>
    <div style="overflow:auto"><table class="dt"><thead><tr><th class="no-sort">Archivo</th><th class="no-sort">Fuente</th><th class="no-sort num">Filas</th><th class="no-sort num">Nuevos</th><th class="no-sort num">Duplic.</th><th class="no-sort">Rango fechas</th><th class="no-sort">Validación</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  const footer=`<button class="btn ghost" onclick="App.pending=[];App.closeModal()">Cancelar</button>
    <button class="btn primary" onclick="App.commitIngest()">Confirmar e integrar</button>`;
  this.modal("Confirmar carga de "+this.pending.length+" archivo(s)",body,footer);
};
App.ingestValidation=function(p){
  const out=[]; if(p.missing.length)out.push({bad:true,msg:"Faltan columnas: "+p.missing.slice(0,3).join(", ")});
  // initial known checks
  if(p.type==="metaads"){ const g=p.records.reduce((s,r)=>s+r.gasto,0); if(Math.abs(g-71358.63)>5) out.push({msg:"Gasto S/ "+g.toFixed(2)+" (esperado ~71,358.63)"}); if(p.records.length!==42)out.push({msg:p.records.length+" campañas (esperado 42)"}); }
  if(p.type==="comprobante" && p.records.length<100)out.push({msg:"Muy pocas filas para comprobantes"});
  if(!p.dateRange[0])out.push({msg:"No se detectaron fechas válidas"});
  return out;
};
App.commitIngest=async function(){
  this.closeModal();
  for(const p of this.pending){
    const stateKey={rawComprobantesERP:"comprobantes",rawDetalleERP:"detalle",rawPrestaShop:"presta",rawMetaAds:"metaAds",rawMetas:"metas",rawSkuOverrides:"skuOverrides"}[p.store];
    let arr=this[stateKey]; const idx={}; arr.forEach((x,i)=>idx[x._k]=i);
    p.records.forEach(r=>{ if(idx[r._k]!=null)arr[idx[r._k]]=r; else { arr.push(r); idx[r._k]=arr.length-1; } });
    await this.saveStore(p.store,arr);
    const carga={_k:uid(),fecha:Date.now(),archivo:p.fileName,tipo:p.type,store:p.store,hash:p.hash,nuevos:p.nuevos,
      actualizados:p.dup,ignorados:0,errores:p.missing.length,filas:p.rowCount,columnas:p.header,
      recordKeys:p.records.map(r=>r._k),esquema:DB_VER};
    this.cargas.push(carga); await DB.put("cargas",carga._k,carga);
    this.auditLog.push({_k:uid(),t:Date.now(),ev:"carga",detalle:p.fileName+" ("+p.type+") +"+p.nuevos}); 
  }
  await this.saveStore("auditLog",this.auditLog);
  const deduped=await this.persistDedupedCore();
  this.pending=[];
  this.rebuild(); this.updateMeta(); this.checkPersistence();
  if(deduped)this.toast("Duplicados exactos eliminados: "+fmt.int(deduped),"warn");
  this.toast("Datos integrados y cuadrados","ok");
  this.go("resumen");
};


/* ===================== CONTROL ANTI-DUPLICADOS DE CARGA ===================== */
App.recordFingerprint=function(store,r){
  const clean=v=>nh(v==null?"":v);
  const n2=v=>String(round2(num(v))).replace(/\.00$/,'');
  if(store==="rawComprobantesERP")return [r.docKey].join('|');
  if(store==="rawDetalleERP")return [r.docKey,clean(r.codigoInt),clean(r.nombre),clean(r.categoria),n2(r.cantidad),n2(r.valorVtaTot),n2(r.precioVtaTot)].join('|');
  if(store==="rawPrestaShop")return [r.idOrder,r.idDet,clean(r.lineType),clean(r.sku),clean(r.productName),clean(r.componentSku),clean(r.componentName),n2(r.qty),n2(r.componentQty),n2(r.lineTotalIncl)].join('|');
  if(store==="rawMetaAds")return [r.ym,clean(r.campania),clean(r.objetivo),n2(r.gasto),n2(r.resultados),n2(r.impresiones)].join('|');
  if(store==="rawMetas")return [r.anio,r.mes,clean(r.canal),clean(r.linea),clean(r.tipoMeta)].join('|');
  if(store==="rawSkuOverrides")return [clean(r.codigoInt),clean(r.skuLB),clean(r.nombrePrincipal)].join('|');
  return r._k||JSON.stringify(r);
};
App.dedupeArray=function(store,arr){
  const seen=new Set(), out=[]; let removed=0;
  (arr||[]).forEach(r=>{ const fp=this.recordFingerprint(store,r); if(seen.has(fp)){ removed++; return; } seen.add(fp); out.push(r); });
  return {arr:out,removed};
};
App.dedupeRuntime=function(){
  const map={rawComprobantesERP:'comprobantes',rawDetalleERP:'detalle',rawPrestaShop:'presta',rawMetaAds:'metaAds',rawMetas:'metas',rawSkuOverrides:'skuOverrides'};
  let removed=0;
  Object.entries(map).forEach(([store,key])=>{ const r=this.dedupeArray(store,this[key]||[]); if(r.removed){ this[key]=r.arr; removed+=r.removed; } });
  this._lastDedupeRemoved=removed;
  return removed;
};
App.persistDedupedCore=async function(){
  const map={rawComprobantesERP:'comprobantes',rawDetalleERP:'detalle',rawPrestaShop:'presta',rawMetaAds:'metaAds',rawMetas:'metas',rawSkuOverrides:'skuOverrides'};
  let removed=0;
  for(const [store,key] of Object.entries(map)){ const r=this.dedupeArray(store,this[key]||[]); if(r.removed){ this[key]=r.arr; await this.saveStore(store,this[key]); removed+=r.removed; } }
  if(removed){ this.auditLog.push({_k:uid(),t:Date.now(),ev:'dedupe',detalle:'Filas duplicadas exactas removidas: '+removed}); await this.saveStore('auditLog',this.auditLog); }
  return removed;
};

/* ===================== TABLE / CHART HELPERS ===================== */
App._tblState={};
App.table=function(id,cols,data,opts={}){
  // cols: [{k,label,num,fmt,html,sort}]  data: array of objects
  const st=this._tblState[id]||(this._tblState[id]={sort:opts.sort||null,dir:opts.dir||-1,page:0,per:opts.per||25,q:""});
  let rows=data.slice();
  if(st.q){ const q=nh(st.q); rows=rows.filter(r=>cols.some(c=>nh(r[c.k]).includes(q))); }
  if(st.sort){ const c=cols.find(x=>x.k===st.sort); rows.sort((a,b)=>{ let va=a[st.sort],vb=b[st.sort]; if(c&&c.num){va=+va||0;vb=+vb||0;return (va-vb)*st.dir;} return String(va||"").localeCompare(String(vb||""))*st.dir; }); }
  const total=rows.length, pages=Math.max(1,Math.ceil(total/st.per));
  if(st.page>=pages)st.page=pages-1; const start=st.page*st.per; const view=rows.slice(start,start+st.per);
  const head=cols.map(c=>`<th class="${c.num?'num':''}${c.sort===false?' no-sort':''}" ${c.sort===false?"":`onclick="App.sortTbl('${id}','${c.k}')"`}>${c.label}${c.sort===false?"":` <span class="ar">${st.sort===c.k?(st.dir>0?'▲':'▼'):'↕'}</span>`}</th>`).join("");
  const body=view.length? view.map(r=>`<tr>${cols.map(c=>{ let v=c.html?c.html(r):(c.fmt?c.fmt(r[c.k],r):esc(r[c.k]==null?"":r[c.k])); return `<td class="${c.num?'num':''}">${v}</td>`; }).join("")}</tr>`).join("")
    : `<tr><td colspan="${cols.length}" class="muted" style="text-align:center;padding:24px">Sin registros</td></tr>`;
  const tools=`<div class="tbl-tools">
      ${opts.search!==false?`<input type="text" placeholder="Buscar…" value="${esc(st.q)}" oninput="App.searchTbl('${id}',this.value)" style="width:220px">`:""}
      <span class="muted">${fmt.int(total)} registros</span>
      <div class="grow"></div>
      ${opts.csv!==false?`<button class="btn sm" onclick="App.exportTbl('${id}')">CSV</button>`:""}
    </div>`;
  const pager=pages>1?`<div class="pager">
      <button ${st.page<=0?"disabled":""} onclick="App.pageTbl('${id}',-1)">‹</button>
      <span>Página ${st.page+1} de ${pages}</span>
      <button ${st.page>=pages-1?"disabled":""} onclick="App.pageTbl('${id}',1)">›</button></div>`:"";
  this._tblCache=this._tblCache||{}; this._tblCache[id]={cols,rows};
  return `<div data-tbl="${id}">${tools}<div style="overflow:auto"><table class="dt"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>${pager}</div>`;
};
App.sortTbl=function(id,k){ const st=this._tblState[id]; if(st.sort===k)st.dir*=-1; else {st.sort=k;st.dir=-1;} this.render(this.curTab); };
App.searchTbl=debounce(function(id,v){ const st=App._tblState[id]; st.q=v; st.page=0; App.render(App.curTab); const inp=$(`[data-tbl="${id}"] input[type=text]`); },250);
App.pageTbl=function(id,d){ this._tblState[id].page+=d; this.render(this.curTab); };
App.exportTbl=function(id){ const c=this._tblCache[id]; if(!c)return; const cols=c.cols, rows=c.rows;
  const csv=[cols.map(x=>'"'+String(x.label||"").replace(/<[^>]+>/g,"").replace(/"/g,'""')+'"').join(",")].concat(rows.map(r=>cols.map(col=>{ let v=col.csv?col.csv(r):(col.html&&!col.k?"":r[col.k]); v=v==null?"":String(v).replace(/<[^>]+>/g,"").replace(/"/g,'""'); return '"'+v+'"'; }).join(","))).join("\n");
  this.downloadFile(id+".csv","\ufeff"+csv,"text/csv"); };
App.downloadFile=function(name,content,mime){
  const blob= content instanceof Blob?content:new Blob([content],{type:mime||"application/octet-stream"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=name; a.style.display="none";
  document.body.appendChild(a);
  try{ a.click(); }catch(e){ console.error("download click failed",e); }
  setTimeout(()=>{ try{ URL.revokeObjectURL(url); a.remove(); }catch(e){} },15000);
  return url;
};

/* ===== Inversión Meta Ads manual (matriz mensual editable) — primera página ===== */
App.INV_CAMPS=META_CAMPAIGN_TYPES.filter(x=>x[0]!=="OTRO");
App.invYears=function(){
  const set=new Set();
  const cur=new Date().getFullYear();
  [cur-1,cur,cur+1,cur+2].forEach(y=>set.add(y));
  (this.config.invYearsManual||[]).forEach(y=>{ y=+y; if(y>=2000&&y<=2100)set.add(y); });
  this.comprobantes.forEach(c=>{ if(c.fecha)set.add(c.fecha.getFullYear()); });
  this.detalle.forEach(d=>{ if(d.fecha)set.add(d.fecha.getFullYear()); });
  this.metaAds.forEach(m=>{ if(m.ini)set.add(m.ini.getFullYear()); if(m.fin)set.add(m.fin.getFullYear()); });
  this.metas.forEach(m=>{ if(m.anio)set.add(+m.anio); });
  this.publicidadManual.forEach(p=>{ if(p.anio)set.add(+p.anio); });
  const arr=[...set].filter(y=>Number.isFinite(y)&&y>=2000&&y<=2100).sort((a,b)=>a-b);
  return arr.length?arr:[cur];
};

App.invSet=async function(anio,mes,obj,val){
  const g=num(val); const _k=anio+"|"+mes+"|"+obj;
  const ex=this.publicidadManual.find(p=>p._k===_k);
  if(g>0){ if(ex)ex.gasto=g; else this.publicidadManual.push({_k,anio,mes,objetivo:obj,gasto:g}); }
  else if(ex){ this.publicidadManual=this.publicidadManual.filter(p=>p._k!==_k); }
  await this.saveStore("rawPublicidadManual",this.publicidadManual);
  this.invRefreshTotals(anio);
};
App.invRefreshTotals=function(anio){
  const camps=this.INV_CAMPS; const msgCamps=this.invMessageCamps();
  const colTot={}; const leadTot={}; camps.forEach(([o])=>{ colTot[o]=0; if(msgCamps.includes(o))leadTot[o]=0; });
  let grandInv=0,grandMetaInv=0,grandMasterInv=0,grandPresMeta=0,grandPresMaster=0,grandLeads=0,grandMsgOrders=0;
  for(let mes=1;mes<=12;mes++){ let mInv=0, mMetaInv=0, mMasterInv=0, mLeads=0;
    camps.forEach(([obj])=>{ const v=this.invVal(anio,mes,obj)||0; mInv+=v; colTot[obj]+=v; if(obj==="MENSAJES_MASTERCLASS")mMasterInv+=v; else mMetaInv+=v; if(msgCamps.includes(obj)){ const l=this.invLeadsVal(anio,mes,obj)||0; mLeads+=l; leadTot[obj]+=l; } });
    const presMeta=this.invBudgetMetaVal(anio,mes), presMaster=this.invBudgetMasterVal(anio,mes), presTotal=presMeta+presMaster;
    const msgOrders=this.invMessageOrders(anio,mes); const cierre=mLeads>0?msgOrders/mLeads*100:null;
    grandInv+=mInv; grandMetaInv+=mMetaInv; grandMasterInv+=mMasterInv; grandPresMeta+=presMeta; grandPresMaster+=presMaster; grandLeads+=mLeads; grandMsgOrders+=msgOrders;
    const pt=$("#invpt_"+mes); if(pt)pt.textContent=presTotal?fmt.money(presTotal):"—";
    const el=$("#invmt_"+mes); if(el)el.textContent=mInv?fmt.money(mInv):"—";
    const le=$("#invlt_"+mes); if(le)le.textContent=mLeads?fmt.int(mLeads):"—";
    const ce=$("#invco_"+mes); if(ce){ ce.textContent=cierre!=null?fmt.pct(cierre,1):"—"; ce.style.color=cierre!=null?(cierre>=8?'var(--ok)':cierre>=4?'var(--warn)':'var(--bad)'):'var(--gray)'; }
    this.invUpdateBar(mes,"meta",mMetaInv,presMeta); this.invUpdateBar(mes,"master",mMasterInv,presMaster); }
  camps.forEach(([obj])=>{ const el=$("#invct_"+obj); if(el)el.textContent=fmt.money(colTot[obj]); if(msgCamps.includes(obj)){ const le=$("#invct_"+this.invLeadKey(obj)); if(le)le.textContent=fmt.int(leadTot[obj]||0); } });
  const pm=$("#invctP_META"); if(pm)pm.textContent=fmt.money(grandPresMeta);
  const pma=$("#invctP_MASTER"); if(pma)pma.textContent=fmt.money(grandPresMaster);
  const pt=$("#invctP_TOTAL"); if(pt)pt.textContent=fmt.money(grandPresMeta+grandPresMaster);
  const gt=$("#invgt"); if(gt)gt.textContent=fmt.money(grandInv);
  const gl=$("#invgl"); if(gl)gl.textContent=fmt.int(grandLeads);
  const gc=$("#invgc"); if(gc)gc.textContent=grandLeads?fmt.pct(grandMsgOrders/grandLeads*100,1):"—";
  this.invUpdateBar("Y","meta",grandMetaInv,grandPresMeta); this.invUpdateBar("Y","master",grandMasterInv,grandPresMaster);
};
App.invUpdateBar=function(id,prefix,inv,pres){
  const bar=$("#invbar_"+prefix+"_"+id), lbl=$("#invbarlbl_"+prefix+"_"+id); if(!bar)return;
  const pct= pres>0? inv/pres*100 : (inv>0?101:0); const w=Math.max(0,Math.min(100,pct));
  bar.style.width=w+"%"; bar.style.background=this.invBarColor(pres>0?pct:0);
  if(lbl)lbl.textContent= pres>0? `${fmt.money(inv)} / ${fmt.money(pres)} · ${fmt.pct(pct)}${pct>100?" · excede":pct>85?" · queda poco":""}` : (inv>0?`${fmt.money(inv)} · sin presupuesto`:"—");
};

/* aggregation helpers */
App.salesByYm=function(comp){ const o={}; comp.forEach(c=>{ if(!c.ym)return; o[c.ym]=(o[c.ym]||0)+c.montoSinIGV; }); return o; };
App.salesByCanal=function(comp){ const o={}; comp.forEach(c=>{ o[c._canal]=(o[c._canal]||0)+c.montoSinIGV; }); return o; };
App.canalSales=function(canal){ return this.filteredComprobantes().filter(c=>!c.anulado&&c._canal===canal).reduce((s,c)=>s+c.montoSinIGV,0); };
App.canalOrders=function(canal){ return this.filteredComprobantes().filter(c=>!c.anulado&&!c.esNC&&c._canal===canal).length; };
App.totalMetaActual=function(){ const y=this.selYear(), m=this.selMonth();
  return this.metas.filter(x=>x.linea!=="MASTERCLASS"&&(y?x.anio==y:true)&&(m?x.mes==m:true)).reduce((s,x)=>s+x.meta,0); };
App.criticalAlerts=function(){
  const a=[]; const r=this.model.recon;
  if(r.noComp.length)a.push(`${fmt.int(r.noComp.length)} pedidos PrestaShop sin comprobante (${fmt.money(r.ventaPotencialPrestaSinComp)} sin IGV)`);
  const noCat=this.detalle.filter(d=>!d.anulado&&!d.categoria).length; if(noCat)a.push(`${fmt.int(noCat)} líneas sin categoría`);
  const noClass=this.comprobantes.filter(c=>!c.anulado&&!c._known).length; if(noClass>50)a.push(`${fmt.int(noClass)} comprobantes en centros sin clasificar`);
  const sinMeta=!this.metas.length; if(sinMeta)a.push("No hay metas cargadas");
  return a;
};


/* ---------- KPIs avanzados para canales digitales ---------- */
App._yearsForDigitalKpis=function(comp,det){
  const selected=this.selArr("y").map(Number).filter(Boolean).sort((a,b)=>a-b);
  if(selected.length)return selected;
  const ys=[...new Set([
    ...comp.map(c=>c.fecha?c.fecha.getFullYear():null),
    ...det.map(d=>d.fecha?d.fecha.getFullYear():null),
    ...this.metaAds.map(a=>a.ini?a.ini.getFullYear():null)
  ].filter(Boolean))].sort((a,b)=>a-b);
  return ys.slice(-2);
};
App._yearSub=function(years,fn,fmtFn){
  if(!years||years.length<2)return "Periodo visible";
  return years.map(y=>`Año ${y}: ${fmtFn(fn(y))}`).join(" | ");
};
App.digitalKpiSummary=function(){
  const comp=this.filteredComprobantes().filter(c=>!c.anulado&&!c.esNC&&c._ambito==="Digital");
  const det=this.filteredDetalle().filter(d=>!d.anulado&&!d.esNC&&d._ambito==="Digital"&&!d._mc&&!this.isExcludedProduct(d.nombre,d.categoria));
  const years=this._yearsForDigitalKpis(comp,det);
  const clientId=c=>this.clienteId(c);
  const byClient={};
  comp.forEach(c=>{ const id=clientId(c); if(!id)return; const x=byClient[id]||(byClient[id]={orders:0,venta:0}); x.orders++; x.venta+=c.montoSinIGV; });
  const clientes=Object.keys(byClient).length;
  const recurrentes=Object.values(byClient).filter(x=>x.orders>=2).length;
  const venta=comp.reduce((s,c)=>s+c.montoSinIGV,0);
  const ordenes=comp.length;
  const productos=new Set(det.map(d=>nh(d._prod||this.prodName(d.nombre,d.categoria))).filter(Boolean)).size;
  const months=this.selArr("m").map(Number).filter(Boolean);
  const cpaWebFor=(year)=>{
    const g=this.metaAds.filter(a=>a.objetivo==="VENTA_WEB" && (!year||(a.ini&&a.ini.getFullYear()===year)) && (!months.length||(a.ini&&months.includes(a.ini.getMonth()+1)))).reduce((s,a)=>s+(a.gasto||0),0);
    const p=comp.filter(c=>c._canal==="WEB" && (!year||(c.fecha&&c.fecha.getFullYear()===year))).length;
    return p>0?g/p:null;
  };
  const ordersFor=y=>comp.filter(c=>c.fecha&&c.fecha.getFullYear()===y).length;
  const clientsFor=y=>new Set(comp.filter(c=>c.fecha&&c.fecha.getFullYear()===y).map(c=>clientId(c)).filter(Boolean)).size;
  const ventaFor=y=>comp.filter(c=>c.fecha&&c.fecha.getFullYear()===y).reduce((s,c)=>s+c.montoSinIGV,0);
  const productsFor=y=>new Set(det.filter(d=>d.fecha&&d.fecha.getFullYear()===y).map(d=>nh(d._prod||this.prodName(d.nombre,d.categoria))).filter(Boolean)).size;
  const recurrentFor=y=>{
    const m={}; comp.filter(c=>c.fecha&&c.fecha.getFullYear()===y).forEach(c=>{ const id=clientId(c); if(id)m[id]=(m[id]||0)+1; });
    const total=Object.keys(m).length; if(!total)return null;
    return Object.values(m).filter(n=>n>=2).length/total*100;
  };
  const opcFor=y=>{ const cl=clientsFor(y), or=ordersFor(y); return cl?or/cl:null; };
  const arpuFor=y=>{ const cl=clientsFor(y), v=ventaFor(y); return cl?v/cl:null; };
  const ticketFor=y=>{ const or=ordersFor(y), v=ventaFor(y); return or?v/or:null; };
  return {
    comp,det,years,venta,ordenes,clientes,productos,recurrentes,
    ordenesCliente:clientes?ordenes/clientes:null,
    arpu:clientes?venta/clientes:null,
    ticket:ordenes?venta/ordenes:null,
    cpaWeb:cpaWebFor(null),
    recurrentPct:clientes?recurrentes/clientes*100:null,
    subOrders:this._yearSub(years,ordersFor,v=>fmt.int(v||0)),
    subClients:this._yearSub(years,clientsFor,v=>fmt.int(v||0)),
    subOpc:this._yearSub(years,opcFor,v=>v==null?"N/D":fmt.dec(v,2)),
    subArpu:this._yearSub(years,arpuFor,v=>v==null?"N/D":fmt.money(v,2)),
    subTicket:this._yearSub(years,ticketFor,v=>v==null?"N/D":fmt.money(v,2)),
    subProducts:this._yearSub(years,productsFor,v=>fmt.int(v||0)+" productos"),
    subCpa:this._yearSub(years,cpaWebFor,v=>v==null?"N/D":fmt.money(v,2)),
    subRecurrent:this._yearSub(years,recurrentFor,v=>v==null?"N/D":fmt.pct(v,2))
  };
};

    if(aven.length&&!aven.includes(nh(d.vendedor)))return false;
    if(ased.length&&!ased.includes(d._sede))return false;
    if(atip.length&&!atip.includes(d._tipoCli))return false;
    if(acat.length&&!acat.includes(nh(d.categoria)))return false;
    if(apro.length&&!apro.includes(nh(d._prod)))return false;
    if(alin.length){ const isMC=!!d._mc; if(isMC&&!alin.includes('MASTERCLASS'))return false; if(!isMC&&!alin.includes('PRODUCTOS'))return false; }
    if(f.excMC && d._mc)return false;
    return true;
  });
};

App.cmpMetricPack=function(year,ambitoMode){

  const finRows=useLineFinancial?det:comp;
  let venta=0, ventaCon=0, ordenes=0, clientes=0, ventaWeb=0, ordWeb=0, clienteIds=[], groupRows=[];
  const byCliDocs={};
  const addClientOrder=(id,docKey)=>{ if(!id)return; clienteIds.push(id); const dk=docKey||id; (byCliDocs[id]=byCliDocs[id]||new Set()).add(dk); };
  if(useLineFinancial){
    const docs=new Set(); const webDocs=new Set();
    det.forEach(d=>{
      venta+=d.valorVtaTot||0; ventaCon+=d.precioVtaTot||0; docs.add(d.docKey);

      addClientOrder(this.cmpLineToClientId(d),d.docKey);

      addClientOrder(this.clienteId(c),c.docKey);
      if(c._canal==='WEB'){ ventaWeb+=c.montoSinIGV||0; ordWeb++; }
      groupRows.push({_canal:c._canal||'Sin dato',centroIngresoERP:this.rowCenterKey(c),montoSinIGV:c.montoSinIGV||0,docKey:c.docKey});
    });
    ordenes=comp.length;
  }
  const cliSet=new Set(clienteIds); clientes=cliSet.size;
  const prodDet=det.filter(d=>!d._mc&&!this.isExcludedProduct(d.nombre,d.categoria));
  const mcDet=det.filter(d=>d._mc);
  const gastoWeb=this.cmpSpend(year,'VENTA_WEB'), gastoMsgProd=this.cmpSpend(year,'MENSAJES_PRODUCTOS'), gastoMsgMaster=this.cmpSpend(year,'MENSAJES_MASTERCLASS'), gastoMsgVB=this.cmpSpend(year,'MENSAJES_VISION_BOARD'), gastoTrafico=this.cmpSpend(year,'TRAFICO_ALCANCE');
  const gastoTotal=gastoWeb+gastoMsgProd+gastoMsgMaster+gastoMsgVB+gastoTrafico;
  const gastoMetaSinMaster=gastoTotal-gastoMsgMaster;
  const presMeta=this.cmpBudgetMeta(year), presMaster=this.cmpBudgetMaster(year);
  const productos=new Set(prodDet.map(d=>nh(d._prod||this.prodName(d.nombre,d.categoria))).filter(Boolean)).size;
  const unidades=prodDet.reduce((s,d)=>s+(d.cantidad||0),0);
  const recurrentes=Object.values(byCliDocs).filter(s=>s&&s.size>=2).length;
  const leadsProductos=this.cmpLeads(year,'MENSAJES_PRODUCTOS'), leadsMasterclass=this.cmpLeads(year,'MENSAJES_MASTERCLASS'), leadsVisionBoard=this.cmpLeads(year,'MENSAJES_VISION_BOARD');
  const leadsMensajes=leadsProductos+leadsMasterclass+leadsVisionBoard;
  const ordenesMensaje=this.cmpMessageOrders(year);

App.cmpMonthlyReconciliation=function(years,packs,mode){

  ];
