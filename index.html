    <div class="card kpi"><div class="vb-h"><span class="src erp">ERP</span> Detalle</div>
      <div class="k-val" style="margin-top:6px">${fmt.int(A.det.validas)}</div>
      <div class="k-sub">${fmt.int(A.det.docKeys)} documentos · ${fmt.int(A.det.uBrutas)} uds brutas<br>${fmt.int(A.det.nInd)} líneas producto · ${fmt.int(A.det.nPack)} packs</div></div>
    <div class="card kpi"><div class="vb-h"><span class="src der">WEB</span> PrestaShop</div>
      <div class="k-val" style="margin-top:6px">${fmt.int(A.presta.pedidos)}</div>
      <div class="k-sub">${fmt.int(A.presta.filas)} líneas · ${fmt.int(A.presta.simple)} simples · ${fmt.int(A.presta.pack)} packs</div></div>
  </div>`;

  // unit reconciliation
  const uc=A.det;
  const unitRows=[
    ["Unidades brutas (todas las líneas de detalle)",uc.uBrutas,"muted"],
    ["(−) Delivery / flete / envío excluidos",-uc.uExcl,"sub"],
    ["(−) Masterclass (línea transversal, aparte)",-uc.uMC,"sub"],
    ["(=) Unidades de productos cosméticos",uc.uCosm,"bold"],
    ["• Productos individuales ("+fmt.int(uc.nInd)+" líneas)",uc.uInd,"ind"],
    ["• Packs / kits ("+fmt.int(uc.nPack)+" líneas, cada pack = 1 unidad vendible)",uc.uPack,"ind"],
  ];
  const unitTable=`<div class="card">
    <h3>Cuadre de unidades</h3>
    <div class="ch-sub">La unidad oficial sale del <b>detalle ERP</b>. Un pack cuenta como <b>1 unidad vendible</b> (es un bundle), no como sus componentes. PrestaShop desglosa componentes, por eso sus ${fmt.int(A.presta.unidades)} "unidades" no son comparables 1 a 1.</div>
    <table class="dt" style="margin-top:12px"><tbody>
      ${unitRows.map(([l,v,cls])=>`<tr>
        <td style="${cls==='bold'?'font-weight:700;color:var(--plum)':cls==='ind'?'padding-left:22px;color:var(--ink-soft)':cls==='sub'?'color:var(--ink-soft)':''}">${l}</td>
        <td style="text-align:right;${cls==='bold'?'font-weight:700;color:var(--plum)':''}">${v<0?"−":""}${fmt.int(Math.abs(v))}</td></tr>`).join("")}
    </tbody></table>
    <div class="banner ${A.det.uCosm? 'ok':'warn'}" style="margin-top:14px"><div><b>Total verificado:</b> ${fmt.int(uc.uCosm)} unidades de productos cosméticos (este es el número que reportan el Resumen, la tabla de Productos y el Cruce). Coincide en las tres vistas porque todas leen el mismo detalle ERP normalizado.</div></div>
  </div>`;

  // coincidence bars
  const c=A.coin;
  const p1=pct(c.compConDet,c.compTot), p2=c.presTasa;
  const bar1=`<div class="cbar">
     <span class="${seg(p1)}" style="width:${Math.max(p1,6)}%">${p1.toFixed(1)}% con detalle</span>
     ${c.compSinDet?`<span class="s-bad" style="width:${100-p1}%">${pct(c.compSinDet,c.compTot).toFixed(1)}% sin detalle</span>`:""}
   </div>`;
  const bar2=`<div class="cbar">
     <span class="${seg(p2)}" style="width:${Math.max(p2,6)}%">${p2.toFixed(1)}% conciliado</span>
     ${c.presNo?`<span class="s-warn" style="width:${100-p2}%">${pct(c.presNo,c.presTot).toFixed(1)}% sin comprobante</span>`:""}
   </div>`;
  const montoOk=c.montoDiff<=50;
  const coincide=`<div class="card">
    <h3>Coincidencias entre las 3 bases</h3>
    <div class="ch-sub">Verifica que lo general (comprobantes) y lo desglosado (detalle, PrestaShop) cuadren.</div>
    <div class="recon-row">
      <div><div class="rr-t">Comprobantes ↔ Detalle ERP</div><div class="rr-s">¿cada documento de venta tiene su desglose por producto?</div></div>
      <div>${bar1}<div class="cb-leg"><span><i class="cb-dot" style="background:#5a9d6b"></i>${fmt.int(c.compConDet)} con detalle</span><span><i class="cb-dot" style="background:#c25b7e"></i>${fmt.int(c.compSinDet)} sin detalle</span><span>·  detalle huérfano: ${fmt.int(c.detSinComp)}</span></div></div>
      <div style="text-align:right"><span class="pill ${p1>=99?'ok':p1>=95?'warn':'bad'}">${p1.toFixed(1)}%</span></div>
    </div>
    <div class="recon-row">
      <div><div class="rr-t">Monto general ↔ desglosado</div><div class="rr-s">SubTotal de comprobantes vs suma de Valor Vta Tot del detalle (sin IGV)</div></div>
      <div><div class="m-b"><span>Comprobantes</span><b>${fmt.money(A.comp.netSin)}</b></div><div class="m-b"><span>Diferencia</span><b>${fmt.money(c.montoDiff,2)}</b></div></div>
      <div style="text-align:right"><span class="pill ${montoOk?'ok':'warn'}">${montoOk?'cuadra':'revisar'}</span></div>
    </div>
    <div class="recon-row">
      <div><div class="rr-t">ERP ↔ PrestaShop (web)</div><div class="rr-s">pedidos del ecommerce emparejados con un comprobante ERP</div></div>
      <div>${bar2}<div class="cb-leg"><span><i class="cb-dot" style="background:#5a9d6b"></i>${fmt.int(c.presMatch)} conciliados</span><span><i class="cb-dot" style="background:#caa24e"></i>${fmt.int(c.presNo)} sin comprobante</span></div></div>
      <div style="text-align:right"><span class="pill ${p2>=98?'ok':p2>=90?'warn':'bad'}">${p2.toFixed(1)}%</span></div>
    </div>
  </div>`;

  const note=`<div class="note">Esta vista revisa las <b>bases completas cargadas</b> (no aplica los filtros de arriba), porque su objetivo es auditar la integridad de lo que subes. Para los cruces filtrables (producto a producto, sin comprobante) usa la pestaña <b>Conciliaciones</b>.</div>`;
  // ---------- validación WEB y centros (match entre los 3 reportes) ----------
  const cv=this.comprobantes.filter(c=>!c.anulado&&!c.esNC);
  const wCentro=cv.filter(c=>nh(c.centroIngresoERP).includes("web")); const wCentroM=wCentro.reduce((s,c)=>s+c.montoSinIGV,0);
  const wTotal=cv.filter(c=>c._canal==="WEB"); const wTotalM=wTotal.reduce((s,c)=>s+c.montoSinIGV,0);
  const wRec=this.model.webReconCount||0, wRecM=this.model.webReconMonto||0;
  const webCard=`<div class="card">
    <h3>Clasificación WEB — match entre los 3 reportes</h3>
    <div class="ch-sub">El ERP suele dejar el <b>centro de ingresos vacío</b> en las ventas online. Cruzando comprobante + detalle + PrestaShop, un pedido que casa con el ecommerce se reconoce como WEB aunque su centro venga en blanco.</div>
    <div class="grid kpis" style="margin-top:12px">
      ${this.kpiCard({lbl:"WEB por centro ERP (literal)",val:fmt.money(wCentroM),sub:fmt.int(wCentro.length)+" comprobantes",src:"erp"})}
      ${this.kpiCard({lbl:"WEB recuperado por reconciliación",val:fmt.money(wRecM),sub:fmt.int(wRec)+" con centro vacío",sem:wRec?"warn":"ok",src:"der"})}
      ${this.kpiCard({lbl:"WEB total corregido",val:fmt.money(wTotalM),sub:fmt.int(wTotal.length)+" comprobantes",sem:"ok",src:"der"})}
    </div>
    <div class="banner ${this.config.webFromPresta!==false?'ok':'warn'}" style="margin-top:12px"><span class="face">${this.config.webFromPresta!==false?'Correcto':'Advertencia️'}</span><div>${this.config.webFromPresta!==false?`Recuperación WEB <b>activada</b>: se sumaron ${fmt.money(wRecM)} de ventas web que el ERP tenía sin centro. Puedes desactivarla en Configuración → Decisiones.`:`Recuperación WEB <b>desactivada</b>: WEB solo refleja el centro literal del ERP (${fmt.money(wCentroM)}), probablemente subestimado.`}</div></div>
  </div>`;
  // breakdowns
  const grp=(keyFn,labelFn)=>{ const m={}; cv.forEach(c=>{ const k=keyFn(c); const x=m[k]||(m[k]={k:labelFn?labelFn(k):k,n:0,monto:0}); x.n++; x.monto+=c.montoSinIGV; }); return Object.values(m).sort((a,b)=>b.monto-a.monto); };
  const tCentro=grp(c=>c.centroIngresoERP||"(vacío)");
  const tSede=grp(c=>c._sede||"Otra sede");
  const tTipo=grp(c=>c._tipoCliDet||"Sin identificación");
  const corpLbl=t=>t==="01"?"Factura (corporativo / RUC)":t==="03"?"Boleta (consumidor)":t==="07"?"Nota de crédito":t==="08"?"Nota de débito":("Tipo "+t);
  const tCorp=grp(c=>c.tipoComp,corpLbl);
  const colNM=[{k:"k",label:"Categoría"},{k:"n",label:"Comprobantes",num:true,fmt:v=>fmt.int(v)},{k:"monto",label:"Venta sin IGV",num:true,fmt:v=>fmt.money(v)}];
  const breakdowns=`<div class="card"><h3 style="margin-bottom:6px">Ventas × Centro de Ingresos</h3>
      <div class="ch-sub">Tal cual viene del ERP (sin corregir). El gran bloque «(vacío)» es lo que la reconciliación reasigna a WEB.</div>
      <div style="margin-top:8px">${this.table("tbl_vcentro",[{k:"k",label:"Centro de ingresos"},...colNM.slice(1)],tCentro,{search:true,per:10})}</div></div>
    <div class="two" style="margin-top:14px">
      <div class="card"><h3 style="margin-bottom:6px">Ventas × Sede (número de serie)</h3>
        <div class="ch-sub">Derivado del sufijo de la serie (fuente: detalle/comprobante). 001 = Web/B2B · 007 = Dasso · 008 = Jockey Plaza · 009 = A. Fuentes · 010 = Masterclass. Es el clasificador más confiable para cuadrar entre pestañas.</div>
        <div style="margin-top:8px">${this.table("tbl_vsede",[{k:"k",label:"Sede"},...colNM.slice(1)],tSede,{search:false,csv:true,per:12})}</div></div>
      <div class="card"><h3 style="margin-bottom:6px">Ventas × Tipo de cliente</h3>
        <div class="ch-sub">Por documento: RUC 20 = empresa · RUC 10 = persona natural c/negocio · DNI (8) y CE (9) = persona natural.</div>
        <div style="margin-top:8px">${this.table("tbl_vtipo",[{k:"k",label:"Tipo de cliente"},...colNM.slice(1)],tTipo,{search:false,csv:true,per:8})}</div></div>
    </div>
    <div class="card" style="margin-top:14px"><h3 style="margin-bottom:6px">Ventas × Corporativo (Factura vs Boleta)</h3>
      <div class="ch-sub">Factura (a empresa / RUC) vs Boleta (consumidor final).</div>
      <div style="margin-top:8px">${this.table("tbl_vcorp",colNM,tCorp,{search:false,csv:true,per:8})}</div></div>`;

  return note+bases+`<div style="height:14px"></div>`+coincide+`<div style="height:14px"></div>`+webCard+`<div style="height:14px"></div>`+breakdowns+`<div style="height:14px"></div>`+unitTable;
};

/* ===================== MAPA DE CALOR ===================== */
App.HM_WD=["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"]; // row order (Mon..Sun)
App.hmColor=function(t){ // t in [0,1] -> pale pink to deep rose
  t=Math.max(0,Math.min(1,t)); const g=Math.pow(t,0.62);
  const pale=[249,235,241], deep=[157,63,96];
  const r=Math.round(pale[0]+(deep[0]-pale[0])*g), gr=Math.round(pale[1]+(deep[1]-pale[1])*g), b=Math.round(pale[2]+(deep[2]-pale[2])*g);
  return { bg:`rgb(${r},${gr},${b})`, fg: g>0.52? "#ffffff" : "#5e3650" };
};
App.heatData=function(metric){
  const day={},my={},wd=[0,0,0,0,0,0,0]; let grand=0,minD=null,maxD=null;
  const bump=(f,v)=>{ if(!f)return; const k=f.toISOString().slice(0,10); day[k]=(day[k]||0)+v;
    const m=f.getFullYear()+"-"+String(f.getMonth()+1).padStart(2,"0"); my[m]=(my[m]||0)+v;
    wd[(f.getDay()+6)%7]+=v; grand+=v; if(!minD||f<minD)minD=new Date(f); if(!maxD||f>maxD)maxD=new Date(f); };
  if(metric==="unidades"){
    this.filteredDetalle().filter(d=>!d.anulado).forEach(d=>{ if(d._mc||this.isExcludedProduct(d.nombre,d.categoria))return; bump(d.fecha,d.cantidad||0); });
  } else {
    this.filteredComprobantes().filter(c=>!c.anulado).forEach(c=>{ if(metric==="pedidos"){ if(c.esNC)return; bump(c.fecha,1); } else bump(c.fecha,c.montoSinIGV); });
  }
  return {day,my,wd,grand,minD,maxD};
};
App.tab_calor=function(){
  const metric=this._hmMetric||"monto";
  const fmtH=(v)=> metric==="monto"? (Math.abs(v)>=1000? "S/ "+(v/1000).toFixed(1)+"k" : "S/ "+Math.round(v)) : fmt.int(Math.round(v));
  const fmtFull=(v)=> metric==="monto"? fmt.money(v) : fmt.int(Math.round(v))+(metric==="unidades"?" uds":" ped.");
  const sel=`<div class="hm-ctrl">
    <div class="fg"><label>Métrica</label><select onchange="App._hmMetric=this.value;App.render('calor')">
      ${[["monto","Monto vendido (sin IGV)"],["unidades","Unidades vendidas"],["pedidos","Pedidos"]].map(([v,l])=>`<option value="${v}" ${metric===v?"selected":""}>${l}</option>`).join("")}
    </select></div>
    <div class="muted" style="align-self:flex-end;font-size:12px">El total de los tres mapas coincide con ${metric==="monto"?"la venta neta sin IGV":metric==="unidades"?"las unidades de productos cosméticos":"los pedidos"} del Resumen, bajo los mismos filtros.</div>
  </div>`;
  const h=this.heatData(metric);
  if(!h.grand && !Object.keys(h.day).length) return this.filterBar()+sel+`<div class="card"><div class="empty">Sin datos para los filtros actuales.</div></div>`;
  // ---------- legend ----------
  const legend=(maxv)=>`<div class="hm-leg"><span>Menos</span><span class="sc">${[0,0.2,0.4,0.6,0.8,1].map(t=>{const c=this.hmColor(t);return `<i style="background:${c.bg}"></i>`;}).join("")}</span><span>Más</span><span style="margin-left:10px">· máx: ${fmtFull(maxv)}</span></div>`;

  // ---------- 1) calendar ----------
  const maxDay=Math.max(1,...Object.values(h.day));
  let calBody="";
  if(h.minD&&h.maxD){
    const start=new Date(h.minD); start.setDate(start.getDate()-((start.getDay()+6)%7)); // back to Monday
    const end=new Date(h.maxD); end.setDate(end.getDate()+(6-((end.getDay()+6)%7))); // fwd to Sunday
    const MES3=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
    const cur=new Date(start); let cols=""; let lastMonth=-1;
    while(cur<=end){
      let label=""; // month label if a day 1..7 of a new month falls in this week
      const probe=new Date(cur);
      for(let i=0;i<7;i++){ if(probe.getDate()<=7 && probe.getMonth()!==lastMonth){ label=MES3[probe.getMonth()]+(probe.getMonth()===0?" '"+String(probe.getFullYear()).slice(2):""); lastMonth=probe.getMonth(); break; } probe.setDate(probe.getDate()+1); }
      let cells="";
      for(let i=0;i<7;i++){
        const k=cur.toISOString().slice(0,10); const inR=cur>=h.minD&&cur<=h.maxD; const v=h.day[k]||0;
        if(!inR || v<=0){ cells+=`<div class="hm-cell empty" title="${k}: ${inR?fmtFull(0):"—"}"></div>`; }
        else { const c=this.hmColor(v/maxDay); cells+=`<div class="hm-cell" style="background:${c.bg}" title="${k} (${this.HM_WD[(cur.getDay()+6)%7]}): ${fmtFull(v)}"></div>`; }
        cur.setDate(cur.getDate()+1);
      }
      cols+=`<div class="hm-wcol"><div class="hm-ml">${label}</div>${cells}</div>`;
    }
    calBody=`<div class="hm-cal">
      <div class="hm-wd"><span></span>${this.HM_WD.map(d=>`<span>${d}</span>`).join("")}</div>
      <div class="hm-scroll"><div class="hm-weeks">${cols}</div></div>
    </div>${legend(maxDay)}`;
  }
  const calCard=`<div class="card"><h3>Calendario diario — días y semanas más calientes</h3>
    <div class="ch-sub">Cada celda es un día (filas: Lun→Dom · columnas: semanas). Una columna entera intensa = semana caliente. Pasa el cursor para ver la fecha y el valor.</div>
    <div style="margin-top:12px">${calBody}</div></div>`;

  // ---------- 2) Mes x Año ----------
  const years=[...new Set(Object.keys(h.my).map(k=>+k.split("-")[0]))].sort();
  const MESES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  const maxMy=Math.max(1,...Object.values(h.my));
  const head=`<tr><th class="rowh"></th>${years.map(y=>`<th>${y}</th>`).join("")}<th>Total</th></tr>`;
  const rowsHtml=MESES.map((mn,mi)=>{ let rowTot=0;
    const tds=years.map(y=>{ const v=h.my[y+"-"+String(mi+1).padStart(2,"0")]||0; rowTot+=v; if(v<=0)return `<td style="background:#f4eef1;color:#bba8b3">·</td>`; const c=this.hmColor(v/maxMy); return `<td style="background:${c.bg};color:${c.fg}" title="${mn} ${y}: ${fmtFull(v)}">${fmtH(v)}</td>`; }).join("");
    return `<tr><th class="rowh">${mn}</th>${tds}<td style="background:var(--nude);color:var(--plum)">${fmtH(rowTot)}</td></tr>`;
  }).join("");
  const colTot=`<tr><th class="rowh">Total</th>${years.map(y=>{ const v=Object.entries(h.my).filter(([k])=>k.startsWith(y+"-")).reduce((s,[,x])=>s+x,0); return `<td style="background:var(--nude);color:var(--plum)">${fmtH(v)}</td>`; }).join("")}<td style="background:var(--plum);color:#fff">${fmtH(h.grand)}</td></tr>`;
  const mxCard=`<div class="card"><h3>Meses más calientes (Mes × Año)</h3>
    <div class="ch-sub">Intensidad por mes. La fila/columna Total permite cuadrar contra el Resumen.</div>
    <div style="overflow:auto;margin-top:12px"><table class="hm-mx"><thead>${head}</thead><tbody>${rowsHtml}${colTot}</tbody></table></div></div>`;

  // ---------- 3) weekday ----------
  const maxWd=Math.max(1,...h.wd);
  const wdCard=`<div class="card"><h3>Día de la semana más caliente</h3>
    <div class="ch-sub">Suma por día de la semana en todo el periodo visible.</div>
    <div class="hm-strip" style="margin-top:12px">${this.HM_WD.map((d,i)=>{ const v=h.wd[i]; const c=this.hmColor(v/maxWd);
      return `<div class="hm-day" style="background:${c.bg};color:${c.fg}"><div class="d-lbl">${d}</div><div class="d-val">${fmtH(v)}</div></div>`; }).join("")}</div></div>`;

  return this.filterBar()+sel+calCard+`<div style="height:14px"></div>`+mxCard+`<div style="height:14px"></div>`+wdCard;
};

<script>
/* ===================== CARGAS & RESPALDO ===================== */

App.cargaStoreByTipo=function(tipo){
  return {comprobante:"rawComprobantesERP",detalle:"rawDetalleERP",prestashop:"rawPrestaShop",metaads:"rawMetaAds",metas:"rawMetas",sku:"rawSkuOverrides"}[tipo]||"";
};
App.cargaStateByStore=function(store){
  return {rawComprobantesERP:"comprobantes",rawDetalleERP:"detalle",rawPrestaShop:"presta",rawMetaAds:"metaAds",rawMetas:"metas",rawSkuOverrides:"skuOverrides",rawPublicidadManual:"publicidadManual",rawKpiConfig:"kpiConfig",rawCanalMapping:"canalMap",rawClientesOverrides:"clientesOverrides",rawConciliacionesManuales:"conciliacionesManuales"}[store]||null;
};
App.tipoByStore=function(store){
  return {rawComprobantesERP:"comprobante",rawDetalleERP:"detalle",rawPrestaShop:"prestashop",rawMetaAds:"metaads",rawMetas:"metas",rawSkuOverrides:"sku",rawPublicidadManual:"manual",rawKpiConfig:"kpi",rawCanalMapping:"canales",rawClientesOverrides:"clientes",rawConciliacionesManuales:"conciliacion"}[store]||"";
};
App.normalizeCargaObj=function(c){
  c=c||{};
  const store=c.store||this.cargaStoreByTipo(c.tipo||c.type||c.source)||"";
  const tipo=c.tipo||c.type||this.tipoByStore(store)||c.source||"";
  let fecha=c.fecha!=null?c.fecha:(c.ts!=null?c.ts:(c.date!=null?c.date:null));
  if(typeof fecha==="string"&&fecha){ const d=Date.parse(fecha); fecha=isNaN(d)?fecha:d; }
  const filas=c.filas!=null?c.filas:(c.rows!=null?c.rows:0);
  const recordKeys=Array.isArray(c.recordKeys)?c.recordKeys:(Array.isArray(c.keys)?c.keys:[]);
  const columnas=Array.isArray(c.columnas)?c.columnas:(Array.isArray(c.columns)?c.columns:(Array.isArray(c.headerRows)?c.headerRows:[]));
  return {
    ...c,
    _k:c._k||uid(),
    fecha:fecha||Date.now(),
    archivo:c.archivo||c.fileName||c.nombre||c.name||"Sin nombre",
    tipo,
    store,
    hash:c.hash||c.huella||"",
    nuevos:+(c.nuevos!=null?c.nuevos:(c.newRows!=null?c.newRows:0))||0,
    actualizados:+(c.actualizados!=null?c.actualizados:(c.updated!=null?c.updated:0))||0,
    ignorados:+(c.ignorados!=null?c.ignorados:(c.ignored!=null?c.ignored:0))||0,
    errores:+(c.errores!=null?c.errores:(c.errors!=null?c.errors:0))||0,
    filas:+filas||0,
    columnas,
    recordKeys,
    esquema:c.esquema||c.schema||DB_VER
  };
};
App.normalizeAuditObj=function(a){
  a=a||{};
  return {...a,_k:a._k||uid(),t:a.t!=null?a.t:(a.ts!=null?a.ts:Date.now()),ev:a.ev||a.action||"evento",detalle:a.detalle||a.detail||""};
};
App.cargaLabel=function(c){ return SRC_LABEL[(c&&c.tipo)||""]||((c&&c.tipo)||"Fuente"); };
App.cargaDeleteMode=function(c){ return (c.recordKeys&&c.recordKeys.length)?"exact":"source"; };
App.toggleCargaSel=function(k,checked){ this._cargaSel=this._cargaSel||new Set(); if(checked)this._cargaSel.add(k); else this._cargaSel.delete(k); this.render("cargas"); };
App.toggleAllCargas=function(checked){ this._cargaSel=this._cargaSel||new Set(); if(checked)this.cargas.forEach(c=>this._cargaSel.add(c._k)); else this._cargaSel.clear(); this.render("cargas"); };
App.clearCargaSelection=function(){ this._cargaSel=new Set(); this.render("cargas"); };
App.confirmDeleteSelectedCargas=function(){ this._cargaSel=this._cargaSel||new Set(); const ids=[...this._cargaSel]; if(!ids.length){ this.toast("Selecciona al menos una carga", "warn"); return; } this.confirmDeleteCargas(ids); };
App.confirmDeleteCargas=function(ids){
  const idSet=new Set(ids);
  const selected=this.cargas.filter(c=>idSet.has(c._k));
  if(!selected.length){ this.toast("No se encontraron las cargas seleccionadas", "warn"); return; }
  const rows=selected.map(c=>{
    const mode=this.cargaDeleteMode(c);
    const source=this.cargaLabel(c);
    const impact=mode==="exact"?"Borrado exacto por llaves internas":"Carga antigua: borra la fuente completa asociada";
    return `<div class="load-danger-row"><div><b>${esc(c.archivo||"Sin nombre")}</b><div class="muted">${new Date(c.fecha).toLocaleString("es-PE")}</div></div><div>${esc(source)}</div><div class="num">${fmt.int(c.filas||0)}</div><div><span class="load-mode ${mode}">${impact}</span></div></div>`;
  }).join("");
  const storesFull=[...new Set(selected.filter(c=>this.cargaDeleteMode(c)!=="exact").map(c=>this.cargaStoreByTipo(c.tipo)||c.store).filter(Boolean))];
  const fullWarn=storesFull.length?`<div class="note warn" style="margin-top:12px"><b>Importante:</b> algunas cargas fueron registradas por una versión anterior del tablero y no guardan las llaves internas por fila. Para eliminarlas de forma segura, el tablero borrará completa(s) esta(s) fuente(s): <b>${storesFull.map(s=>esc(this.cargaLabel({tipo:Object.entries({comprobante:"rawComprobantesERP",detalle:"rawDetalleERP",prestashop:"rawPrestaShop",metaads:"rawMetaAds",metas:"rawMetas",sku:"rawSkuOverrides"}).find(([_,v])=>v===s)?.[0]||s}))).join(", ")}</b>. Luego debes recargar únicamente los documentos correctos.</div>`:"";
  const body=`<p style="margin-top:0">Vas a borrar <b>${fmt.int(selected.length)}</b> carga(s) del historial y sus datos asociados en la base local del navegador.</p>
    <div class="load-danger-list"><div class="load-danger-row header"><div>Archivo</div><div>Fuente</div><div>Filas</div><div>Modo</div></div>${rows}</div>
    ${fullWarn}
    <div class="note warn" style="margin-top:12px">Esta acción no se puede deshacer desde el navegador. Descarga un respaldo antes de continuar si necesitas conservar el estado actual.</div>`;
  const footer=`<button class="btn" onclick="App.closeModal()">Cancelar</button><button class="btn danger" onclick="App.doDeleteCargas()">Borrar cargas seleccionadas</button>`;
  this._deleteCargaIds=ids; this.modal("Borrar cargas seleccionadas",body,footer);
};
App.doDeleteCargas=async function(){
  const ids=this._deleteCargaIds||[]; this.closeModal();
  const idSet=new Set(ids);
  const selected=this.cargas.filter(c=>idSet.has(c._k));
  if(!selected.length){ this.toast("No hay cargas seleccionadas", "warn"); return; }
  const storesToClear=new Set();
  const exactByStore={};
  selected.forEach(c=>{
    const store=c.store||this.cargaStoreByTipo(c.tipo);
    if(!store)return;
    if(c.recordKeys&&c.recordKeys.length){ (exactByStore[store]=exactByStore[store]||new Set()); c.recordKeys.forEach(k=>exactByStore[store].add(k)); }
    else storesToClear.add(store);
  });
  // Las cargas antiguas sin recordKeys obligan a limpiar la fuente completa y retirar todo su historial.
  let cargasToRemove=new Set(ids);
  if(storesToClear.size){ this.cargas.forEach(c=>{ const store=c.store||this.cargaStoreByTipo(c.tipo); if(storesToClear.has(store))cargasToRemove.add(c._k); }); }
  const remaining=this.cargas.filter(c=>!cargasToRemove.has(c._k));
  let removedRecords=0, protectedRecords=0, clearedSources=0;
  for(const store of storesToClear){
    const state=this.cargaStateByStore(store); if(!state)continue;
    removedRecords+=(this[state]||[]).length; this[state]=[]; await this.saveStore(store,this[state]); clearedSources++;
  }
  for(const [store,setKeys] of Object.entries(exactByStore)){
    if(storesToClear.has(store))continue;
    const state=this.cargaStateByStore(store); if(!state)continue;
    const protectedKeys=new Set();
    remaining.filter(c=>(c.store||this.cargaStoreByTipo(c.tipo))===store).forEach(c=>{ (c.recordKeys||[]).forEach(k=>protectedKeys.add(k)); });
    const before=(this[state]||[]).length;
    this[state]=(this[state]||[]).filter(r=>{ if(!setKeys.has(r._k))return true; if(protectedKeys.has(r._k)){ protectedRecords++; return true; } return false; });
    removedRecords+=before-this[state].length; await this.saveStore(store,this[state]);
  }
  this.cargas=remaining; await this.saveStore("cargas",this.cargas);
  this.auditLog.push({_k:uid(),t:Date.now(),ev:"borrado_cargas",detalle:`${ids.length} carga(s); ${removedRecords} registros; ${clearedSources} fuente(s) completas; ${protectedRecords} protegidos por otras cargas`});
  await this.saveStore("auditLog",this.auditLog);
  this._cargaSel=new Set(); this._deleteCargaIds=[];
  this.rebuild(); this.updateMeta(); this.checkPersistence(); this.render("cargas");
  const msg=clearedSources?`Cargas borradas. Se limpiaron ${clearedSources} fuente(s) completas y ${fmt.int(removedRecords)} registros.`:`Cargas borradas: ${fmt.int(removedRecords)} registros eliminados.`;
  this.toast(msg,clearedSources?"warn":"ok");
};


App.schemaSources=function(){
  return [
    {id:"comprobante",store:"rawComprobantesERP",fuente:"Ventas / comprobantes ERP",rows:this.comprobantes||[]},
    {id:"detalle",store:"rawDetalleERP",fuente:"Detalle ERP",rows:this.detalle||[]},
    {id:"prestashop",store:"rawPrestaShop",fuente:"GenerateDetailedSalesReport / PrestaShop",rows:this.presta||[]},
    {id:"metaads",store:"rawMetaAds",fuente:"Gastos Meta Ads",rows:this.metaAds||[]},
    {id:"metas",store:"rawMetas",fuente:"Cuadro de metas",rows:this.metas||[]},
    {id:"sku",store:"rawSkuOverrides",fuente:"SKU normalizados",rows:this.skuOverrides||[]},
    {id:"manual",store:"rawPublicidadManual",fuente:"Inversión / leads / presupuestos manuales",rows:this.publicidadManual||[]},
    {id:"kpi",store:"rawKpiConfig",fuente:"Configuración KPI",rows:this.kpiConfig||[]},
    {id:"canales",store:"rawCanalMapping",fuente:"Mapeo de canales",rows:this.canalMap||[]}
  ];
};
App.cargasByStore=function(store,id){ return (this.cargas||[]).filter(c=>c.store===store||c.tipo===id||c.tipo===store).sort((a,b)=>(b.fecha||0)-(a.fecha||0)); };

App.tab_cargas=function(){
  this._cargaSel=this._cargaSel||new Set();
  const cargasRows=this.cargas.slice().sort((a,b)=>b.fecha-a.fecha).map(c=>({
    ...c,
    seleccionado:this._cargaSel.has(c._k),
    modo:this.cargaDeleteMode(c),
    fuenteLabel:this.cargaLabel(c),
    fechaNum:c.fecha
  }));
  const allSelected=this.cargas.length>0 && this.cargas.every(c=>this._cargaSel.has(c._k));
  const selectedCount=this._cargaSel.size;
  const cols=[
    {k:"seleccionado",label:`<label class="load-sel"><input type="checkbox" ${allSelected?'checked':''} onchange="App.toggleAllCargas(this.checked)"> Seleccionar</label>`,sort:false,html:r=>`<input type="checkbox" ${r.seleccionado?'checked':''} onchange="App.toggleCargaSel('${r._k}',this.checked)" style="accent-color:var(--rose)">`,csv:r=>r.seleccionado?"Seleccionado":""},
    {k:"fechaNum",label:"Fecha",fmt:v=>{ const d=new Date(v); return isNaN(d)?"—":d.toLocaleString("es-PE"); },csv:r=>{ const d=new Date(r.fecha); return isNaN(d)?"—":d.toLocaleString("es-PE"); }},
    {k:"archivo",label:"Archivo",html:r=>`<b>${esc(r.archivo||"Sin nombre")}</b><div class="muted" style="font-size:11px">${r.store||this.cargaStoreByTipo(r.tipo)||"sin store"}</div>`},
    {k:"fuenteLabel",label:"Fuente"},
    {k:"filas",label:"Filas",num:true,fmt:v=>fmt.int(v)},
    {k:"nuevos",label:"Nuevos",num:true,fmt:v=>fmt.int(v)},
    {k:"actualizados",label:"Actualizados",num:true,fmt:v=>fmt.int(v)},
    {k:"modo",label:"Borrado",html:r=>`<span class="load-mode ${r.modo==='exact'?'exact':'source'}">${r.modo==='exact'?'Exacto':'Fuente completa'}</span>`,csv:r=>r.modo==='exact'?'Exacto':'Fuente completa'},
    {k:"hash",label:"Huella",fmt:v=>`<code class="kf">${esc((v||"").slice(0,10))}</code>`},
    {k:"acciones",label:"Acciones",sort:false,html:r=>`<button class="btn danger sm" onclick="App.confirmDeleteCargas(['${r._k}'])">Borrar</button>`,csv:r=>""}
  ];
  const sizeInfo=this._dbSize?`≈ ${this._dbSize}`:"";
  return `
  <div class="grid kpis">
    ${this.kpiCard({lbl:"Cargas registradas",val:fmt.int(this.cargas.length),src:"der"})}
    ${this.kpiCard({lbl:"Comprobantes en base",val:fmt.int(this.comprobantes.length),src:"erp"})}
    ${this.kpiCard({lbl:"Líneas de detalle",val:fmt.int(this.detalle.length),src:"erp"})}
    ${this.kpiCard({lbl:"Pedidos PrestaShop",val:fmt.int([...new Set(this.presta.map(p=>p.idOrder))].length),src:"der"})}
  </div>

  <div class="card" style="margin-top:16px">
    <h3 style="margin-bottom:10px">Diccionario de datos y estructura cargada</h3>
    <div class="ch-sub">Revisa filas, columnas normalizadas, columnas originales detectadas y una muestra de cada base. Esto permite auditar la estructura antes de analizar KPI.</div>
    ${this.schemaCard()}
  </div>

  <div class="two" style="margin-top:16px">
    <div class="card">
      <h3>Respaldo total (JSON)</h3>
      <div class="ch-sub">Exporta todos los datos crudos + configuración. Sirve para mover el tablero entre equipos sin recargar Excel.</div>
      <div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn primary" onclick="App.exportBackup()"></button>
        <label class="btn" style="cursor:pointer">Restaurar respaldo<input type="file" accept="application/json,.json" class="hidden" onchange="App.restoreBackupPicker(this.files[0])"></label>
      </div>
      <div class="note warn" style="margin-top:12px">Restaurar <b>reemplaza por completo</b> los datos actuales en este navegador. Descarga un respaldo antes si tienes dudas.</div>
    </div>
    <div class="card">
      <h3>Semilla publicable (seed)</h3>
      <div class="ch-sub">Genera un archivo <code class="kf">.html</code> con los datos ya incrustados. Sirve para enviarlo como documento y abrirlo sin volver a cargar Excel.</div>
      <div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn primary" onclick="App.exportPortableHTML()">Exportar HTML portable liviano</button>
        <button class="btn" onclick="App.exportGitHubIndexHTML()">Exportar index.html liviano para GitHub</button>
        <button class="btn" onclick="App.exportBackup()">Exportar JSON técnico</button>
      </div>
      <div class="note" style="margin-top:12px">El HTML portable <b>nunca</b> incluye el token de GitHub. Para GitHub usa <b>Exportar index.html liviano para GitHub</b> y sube ese archivo generado, no el archivo base del tablero. Cualquiera que abra ese archivo podrá ver los datos incrustados: compártelo solo con quien deba revisarlos.</div>
      <div class="note ok" style="margin-top:10px"><b>Corrección v29:</b> el exportador liviano conserva historial de cargas, encabezados, llaves por fila, centros operativos inferidos al reconstruir y series desde comprobantes/docKey. Esto evita cargas en blanco, centros mal distribuidos y sedes por serie incorrectas en GitHub Pages.</div>
    </div>
  </div>

  <div class="card" style="margin-top:16px">
    <h3 style="margin-bottom:6px">Historial de cargas</h3>
    <div class="ch-sub">Selecciona uno o varios documentos para borrar sus datos asociados de la base local. Las cargas nuevas se borran de forma exacta; las cargas antiguas sin llaves internas limpian la fuente completa asociada.</div>
    <div class="load-actions">
      <button class="btn danger" onclick="App.confirmDeleteSelectedCargas()" ${selectedCount?"":"disabled"}>Borrar seleccionados</button>
      <button class="btn" onclick="App.clearCargaSelection()" ${selectedCount?"":"disabled"}>Limpiar selección</button>
      <span class="muted"><b>${fmt.int(selectedCount)}</b> seleccionado(s)</span>
      <span class="spacer"></span>
      <button class="btn sm" onclick="App.cleanDuplicateRecords()">Limpiar duplicados exactos</button>
      <button class="btn sm" onclick="App.exportBackup()"> antes de borrar</button>
    </div>
    ${this.table("tbl_cargas",cols,cargasRows,{sort:"fechaNum",dir:-1,per:20})}
    <div class="note" style="margin-top:12px"><b>Lectura del modo de borrado:</b> “Exacto” elimina solo las filas que pertenecen a esa carga. “Fuente completa” aparece en cargas antiguas que no guardaban llaves por fila; al borrarlas se limpia toda la fuente vinculada para evitar bases partidas o duplicadas.</div>
  </div>

  <div class="card" style="margin-top:16px">
    <h3 style="margin-bottom:10px">Zona de mantenimiento</h3>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn danger" onclick="App.wipeAll()">Borrar todos los datos</button>
    </div>
    <div class="note warn" style="margin-top:12px">Usa esta opción solo si quieres reiniciar por completo. Para corregir un archivo puntual, usa el historial de cargas de arriba.</div>
  </div>`;

};
App.cleanDuplicateRecords=async function(){
  const removed=await this.persistDedupedCore();
  this.rebuild(); this.updateMeta(); this.checkPersistence();
  this.toast(removed?"Duplicados exactos eliminados: "+fmt.int(removed):"No se encontraron duplicados exactos","ok");
  this.render(this.curTab||"cargas");
};

App.schemaCard=function(){
  const rows=this.schemaSources().map(src=>{
    const sample=src.rows[0]||{}; const cols=Object.keys(sample).filter(k=>!k.startsWith("_"));
    const cargas=this.cargasByStore(src.store,src.id);
    const orig=(cargas[0]&&cargas[0].columnas)||[];
    return {fuente:src.fuente,filas:src.rows.length,columnas:cols.length,originales:orig.length,ultima:cargas[0]?new Date(cargas[0].fecha).toLocaleString("es-PE"):"—",id:src.id};
  });
  return this.table("tbl_schema",[
    {k:"fuente",label:"Fuente"},
    {k:"filas",label:"Filas",num:true,fmt:v=>fmt.int(v)},
    {k:"columnas",label:"Campos internos",num:true,fmt:v=>fmt.int(v)},
    {k:"originales",label:"Columnas originales",num:true,fmt:v=>fmt.int(v)},
    {k:"ultima",label:"Última carga"},
    {k:"acc",label:"",sort:false,html:r=>`<button class="btn sm" onclick="App.viewSchema('${r.id}')">Ver columnas</button>`}
  ],rows,{search:false,csv:false,per:10});
};
App.viewSchema=function(id){
  const src=this.schemaSources().find(x=>x.id===id); if(!src)return;
  const sample=src.rows[0]||{}; const cols=Object.keys(sample).filter(k=>!k.startsWith("_")).sort();
  const cargas=this.cargasByStore(src.store,src.id);
  const orig=(cargas[0]&&cargas[0].columnas)||[];
  const rows=cols.map(k=>({campo:k,ejemplo:sample[k] instanceof Date?fmt.date(sample[k]):String(sample[k]??"").slice(0,140)}));
  const body=`<div class="note"><b>${esc(src.fuente)}</b>: ${fmt.int(src.rows.length)} filas cargadas. Campos internos derivados del parser y columnas originales de la última carga disponible.</div>
    <h4 style="margin:10px 0 6px">Columnas originales detectadas</h4>
    <div style="max-height:160px;overflow:auto;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:12px">${orig.length?orig.map(x=>`<code class="kf">${esc(x)}</code>`).join(" "):"Sin encabezado original registrado en cargas previas."}</div>
    <h4 style="margin:14px 0 6px">Campos internos y muestra</h4>
    ${this.table("tbl_schema_modal_"+id,[{k:"campo",label:"Campo"},{k:"ejemplo",label:"Ejemplo"}],rows,{search:true,csv:false,per:40})}`;
  this.modal("Estructura de "+src.fuente,body);
};

App.BACKUP_STORES=["rawComprobantesERP","rawDetalleERP","rawPrestaShop","rawMetaAds","rawMetas",
  "rawSkuOverrides","rawPublicidadManual","rawKpiConfig","rawCanalMapping","rawClientesOverrides",
  "rawConciliacionesManuales","cargas","auditLog"];

App.buildBackupObject=function(){
  const cfg=JSON.parse(JSON.stringify(this.config)); if(cfg.github)cfg.github={...cfg.github,token:""}; // never persist token in backup
  return {
    meta:{app:"Lou Botanicals Dashboard v4",schema:DB_VER,generated:new Date().toISOString(),
      comprobantes:this.comprobantes.length,detalle:this.detalle.length,presta:this.presta.length},
    config:cfg,
    kpiConfig:this.kpiConfig, canalMap:this.canalMap,
    stores:{
      rawComprobantesERP:this.comprobantes, rawDetalleERP:this.detalle, rawPrestaShop:this.presta,
      rawMetaAds:this.metaAds, rawMetas:this.metas, rawSkuOverrides:this.skuOverrides,
      rawPublicidadManual:this.publicidadManual, rawClientesOverrides:this.clientesOverrides,
      rawConciliacionesManuales:this.conciliacionesManuales, cargas:this.cargas, auditLog:this.auditLog
    }
  };
};
App.exportBackup=function(){
  try{ const obj=this.buildBackupObject();
    const name="respaldo_lou_botanicals_"+new Date().toISOString().slice(0,10)+".json";
    this.downloadFile(name,JSON.stringify(obj),"application/json");
    this.toast("Respaldo descargado","ok");
  }catch(e){ this.toast("Error al generar respaldo","bad"); console.error(e); }
};
App.restoreBackupPicker=function(file){
  if(!file)return;
  const fr=new FileReader();
  fr.onload=()=>{ try{ const obj=JSON.parse(fr.result); this.confirmRestore(obj); }catch(e){ this.toast("Archivo JSON inválido","bad"); } };
  fr.readAsText(file);
};
App.confirmRestore=function(obj){
  if(!obj||!obj.stores){ this.toast("El archivo no parece un respaldo válido","bad"); return; }
  const m=obj.meta||{};
  const body=`<p>Vas a restaurar un respaldo generado el <b>${m.generated?new Date(m.generated).toLocaleString("es-PE"):"—"}</b>.</p>
    <div class="kvs" style="margin-top:10px">
      <div class="m-b"><span>Comprobantes</span><b>${fmt.int((obj.stores.rawComprobantesERP||[]).length)}</b></div>
      <div class="m-b"><span>Detalle</span><b>${fmt.int((obj.stores.rawDetalleERP||[]).length)}</b></div>
      <div class="m-b"><span>PrestaShop</span><b>${fmt.int((obj.stores.rawPrestaShop||[]).length)}</b></div>
      <div class="m-b"><span>Meta Ads</span><b>${fmt.int((obj.stores.rawMetaAds||[]).length)}</b></div>
    </div>
    <div class="note warn" style="margin-top:12px">Esto reemplaza todos los datos actuales de este navegador.</div>`;
  const footer=`<button class="btn" onclick="App.closeModal()">Cancelar</button>
    <button class="btn primary" onclick="App.doRestore()">Restaurar ahora</button>`;

App.seedEncode=function(str){
  const bytes=new TextEncoder().encode(str); let bin=""; const chunk=0x8000;
  for(let i=0;i<bytes.length;i+=chunk){ bin+=String.fromCharCode.apply(null, bytes.subarray(i,i+chunk)); }
  return btoa(bin);
};
App.seedDecode=function(b64){
  const bin=atob(b64); const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  return new TextDecoder().decode(bytes);
};
App.dateISO=function(v){
  if(!v)return "";
  const d=v instanceof Date?v:toDate(v);
  if(!d||isNaN(d))return "";
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
};

App.compactRows=function(rows,fields){
  const dateFields=new Set(["fecha","ini","fin"]);
  return (rows||[]).map(r=>fields.map(f=>{
    let v=r&&r[f];
    if(dateFields.has(f))v=this.dateISO(v);
    if(v===undefined||v===null)return "";
    if(typeof v==="number")return Number.isFinite(v)?round2(v):0;
    return v;
  }));
};
App.expandRows=function(vals,fields){
  const dateFields=new Set(["fecha","ini","fin"]);
  return (vals||[]).map(arr=>{ const o={}; fields.forEach((f,i)=>{ let v=arr[i]; if(v==="")v=""; if(dateFields.has(f)&&v)v=toDate(v); o[f]=v; }); return o; });
};
App.buildCompactBackupObject=function(){
  const raw=this.buildBackupObject();
  const st=raw.stores||{};
  const cs=this.compactSchema;
  const stores={};
  Object.keys(cs).forEach(k=>{
    if(k==="rawKpiConfig")stores[k]=this.compactRows(this.normalizeKpiConfig?this.normalizeKpiConfig(raw.kpiConfig||this.kpiConfig):(raw.kpiConfig||this.kpiConfig),cs[k]);
    else if(k==="rawCanalMapping")stores[k]=this.compactRows(this.normalizeCanalMap?this.normalizeCanalMap(raw.canalMap||this.canalMap):(raw.canalMap||this.canalMap),cs[k]);
    else stores[k]=this.compactRows(st[k]||[],cs[k]);
  });
  return {meta:{...raw.meta,format:"compact-v2",generated:new Date().toISOString(),note:"GitHub seed conserva cargas, centros operativos, series y llaves de borrado"},schema:cs,config:raw.config,stores};

    }

App.compressTextB64=async function(str){
  if(!("CompressionStream" in window))return {b64:this.seedEncode(str),compressed:false};
  const cs=new CompressionStream("gzip");
  const writer=cs.writable.getWriter();
  writer.write(new TextEncoder().encode(str)); writer.close();
  const buf=await new Response(cs.readable).arrayBuffer();
  const bytes=new Uint8Array(buf); let bin=""; const chunk=0x8000;
  for(let i=0;i<bytes.length;i+=chunk){ bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+chunk)); }
  return {b64:btoa(bin),compressed:true};
};
App.decompressTextB64=async function(b64,compressed){
  if(!compressed)return this.seedDecode(b64);
  const bin=atob(b64); const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  if(!("DecompressionStream" in window))throw new Error("Este navegador no soporta descompresión gzip para la semilla compactada. Abre el archivo en Chrome, Edge o Safari actualizado.");
  const ds=new DecompressionStream("gzip");
  const writer=ds.writable.getWriter(); writer.write(bytes); writer.close();
  const out=await new Response(ds.readable).arrayBuffer();
  return new TextDecoder().decode(new Uint8Array(out));
};
App.buildPortableHTML=async function(mode){
  const useCompact=mode!=="raw";
  const backup=useCompact?this.buildCompactBackupObject():this.buildBackupObject();
  const json=JSON.stringify(backup);
  const packed=useCompact?await this.compressTextB64(json):{b64:this.seedEncode(json),compressed:false};
  const doc=document.documentElement.cloneNode(true);
  const content=doc.querySelector("#content"); if(content)content.innerHTML="";
  doc.querySelectorAll("script[data-seed]").forEach(s=>s.remove());
  doc.querySelectorAll("#overlay .modal").forEach(m=>m.innerHTML="");
  const seedScript=document.createElement("script");
  seedScript.setAttribute("data-seed","1");
  seedScript.textContent="window.__SEED_B64__="+JSON.stringify(packed.b64)+";window.__SEED_FORCE__=true;window.__SEED_AT__="+JSON.stringify(new Date().toISOString())+";window.__SEED_COMPRESSED__="+JSON.stringify(!!packed.compressed)+";window.__SEED_FORMAT__="+JSON.stringify(useCompact?"compact-v2":"raw-v1")+";";
  const head=doc.querySelector("head")||doc.firstElementChild;
  head.appendChild(seedScript);
  return "<!doctype html>\n<html lang=\"es\">"+doc.innerHTML+"</html>";
};

  try{

<script>
/* ============================================================
   LOU BOTANICALS · CONECTOR APPS SCRIPT / GOOGLE SHEETS
   v36 · Reemplaza lectura CSV pública por API propia Apps Script.
   Motivo: un link CSV de Google normalmente publica UNA sola pestaña.
   Con Apps Script el panel puede leer ventas_general, detalle_erp,
   prestashop y demás pestañas con una sola URL /exec.
   ============================================================ */
(function(){
  const LS_KEY = 'lou_appscript_webapp_url_v36';

  const SHEETS_MAP = {
    ventas_general: 'rawComprobantesERP',
    detalle_erp: 'rawDetalleERP',
    prestashop: 'rawPrestaShop',
    meta_ads: 'rawMetaAds',
    metas_matriz: 'rawMetas',
    sku_normalizados: 'rawSkuOverrides',
    canales_mapeo: 'rawCanalMapping',
    presupuestos_mensuales: 'rawPublicidadManual'
  };

  const SHEETS_PARSE_ORDER = [
    'ventas_general',
    'detalle_erp',
    'prestashop',
    'meta_ads',
    'metas_matriz',
    'sku_normalizados',
    'canales_mapeo',
    'presupuestos_mensuales'
  ];

  const CRITICAL_SHEETS = ['ventas_general','detalle_erp','prestashop'];

  function toast(msg,type='warn'){
    if(typeof App !== 'undefined' && App.toast) App.toast(msg,type);
    else console.log(msg);
  }

  function getWebAppUrl(){ return localStorage.getItem(LS_KEY) || ''; }
  function setWebAppUrl(url){ localStorage.setItem(LS_KEY, String(url || '').trim()); }

  function normalizeExecUrl(url){
    url = String(url || '').trim();
    if(!url) return '';
    url = url.replace(/\?.*$/,'');
    if(url.includes('/dev')) return url.replace('/dev','/exec');
    return url;
  }

  function apiUrl(action, params={}){
    const base = normalizeExecUrl(getWebAppUrl());
    const q = new URLSearchParams({action, ...params});
    return base + '?' + q.toString();
  }

  function jsonp(url){
    return new Promise((resolve,reject)=>{
      const cb = 'LB_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
      const sep = url.includes('?') ? '&' : '?';
      const s = document.createElement('script');
      const timer = setTimeout(()=>{
        try{ delete window[cb]; s.remove(); }catch(e){}
        reject(new Error('Tiempo agotado conectando con Apps Script. Revisa que esté implementado como Aplicación web y con acceso Cualquier persona.'));
      }, 120000);

      window[cb] = function(payload){
        clearTimeout(timer);
        delete window[cb];
        s.remove();
        resolve(payload);
      };
      s.onerror = function(){
        clearTimeout(timer);
        delete window[cb];
        s.remove();
        reject(new Error('No se pudo cargar la URL de Apps Script. Revisa la URL /exec y permisos.'));
      };
      s.src = url + sep + 'callback=' + encodeURIComponent(cb) + '&_=' + Date.now();
      document.body.appendChild(s);
    });
  }

  function payloadToRows(payload){ return [payload.headers || [], ...(payload.rows || [])]; }

  function dedupeByKey(arr){
    const m = new Map();
    (arr || []).forEach((x,i)=>{
      const k = x && x._k ? String(x._k) : 'row_' + i;
      m.set(k, x);
    });
    return [...m.values()];
  }

  function objRows(payload){
    const rows = payloadToRows(payload);
    if(!rows.length || !rows[0] || !rows[0].length) return [];
    return rowsToObjects(rows,0).objects;
  }

  function pick(o,names,def=''){
    for(const n of names){
      if(o[n] != null && String(o[n]).trim() !== '') return o[n];
    }
    return def;
  }

  function parseSheet(sheetName,payload){
    if(!payload || !payload.ok) return [];
    const rows = payloadToRows(payload);
    if(!rows.length || !rows[0] || !rows[0].length) return [];

    if(sheetName === 'ventas_general') return dedupeByKey(objRows(payload).map(parseComprobante).filter(Boolean));
    if(sheetName === 'detalle_erp') return dedupeByKey(objRows(payload).map((o,i)=>parseDetalle(o,i)).filter(Boolean));
    if(sheetName === 'prestashop') return dedupeByKey(objRows(payload).map(parsePresta).filter(Boolean));
    if(sheetName === 'meta_ads') return dedupeByKey(objRows(payload).map(parseMetaAds).filter(Boolean));

    if(sheetName === 'metas_matriz'){
      App.metasYear = App.metasYear || new Date().getFullYear();
      return dedupeByKey(parseMetasMatrix(rows,0));
    }

    if(sheetName === 'canales_mapeo'){
      return dedupeByKey(objRows(payload).map((o,i)=>({
        _k:String(pick(o,['centro ingreso erp','centroingresoerp','centro','centro de ingresos'],i)),
        centroIngresoERP:normTxt(pick(o,['centro ingreso erp','centroingresoerp','centro','centro de ingresos'],'')),
        ambitoComercial:normTxt(pick(o,['ambito comercial','ambitocomercial','ambito'],'Otros')),
        canalNormalizado:normTxt(pick(o,['canal normalizado','canalnormalizado','canal'],'SIN ASIGNAR')),
        activo:String(pick(o,['activo'],'TRUE')).toLowerCase() !== 'false',
        observacion:normTxt(pick(o,['observacion','observación'],''))
      })).filter(x=>x.centroIngresoERP || x.canalNormalizado));
    }

    if(sheetName === 'presupuestos_mensuales'){
      return dedupeByKey(objRows(payload).map((o,i)=>{
        const anio = num(pick(o,['anio','año','year'],0));
        const mes = num(pick(o,['mes','month'],0));
        const objetivo = normTxt(pick(o,['objetivo','tipo campana','tipo campaña','campana','campaña'],'PRESUPUESTO_META'));
        return {
          _k:`${anio}|${mes}|${objetivo || i}`,
          anio,
          mes,
          objetivo,
          gasto:num(pick(o,['gasto','inversion','inversión'],0)),
          presupuestoMeta:num(pick(o,['presupuesto meta','presupuestometa'],0)),
          presupuestoMasterclass:num(pick(o,['presupuesto masterclass','presupuestomasterclass'],0)),
          leads:num(pick(o,['leads','resultados'],0))
        };
      }).filter(x=>x.anio && x.mes));
    }

    if(sheetName === 'sku_normalizados'){
      return dedupeByKey(objRows(payload).map((o,i)=>({
        _k:String(pick(o,['codigo','codigo int','codigoint','sku','sku codigoint','sku codigo int'],i)),
        codigoInt:normTxt(pick(o,['codigo','codigo int','codigoint','sku','sku codigoint','sku codigo int'],'')),
        productoNormalizado:normTxt(pick(o,['producto normalizado','productonormalizado','nombre normalizado','nombre','nombre principal'],'')),
        lineaNegocio:normTxt(pick(o,['linea negocio','lineanegocio','linea','línea','clase'],''))
      })).filter(x=>x.codigoInt || x.productoNormalizado));
    }
    return [];
  }

  async function saveParsed(sheetName,parsed){
    const store = SHEETS_MAP[sheetName];
    if(!store) return;

    if(store === 'rawComprobantesERP') App.comprobantes = parsed;
    if(store === 'rawDetalleERP') App.detalle = parsed;
    if(store === 'rawPrestaShop') App.presta = parsed;
    if(store === 'rawMetaAds') App.metaAds = parsed;
    if(store === 'rawMetas') App.metas = parsed;
    if(store === 'rawSkuOverrides') App.skuOverrides = parsed;
    if(store === 'rawCanalMapping') App.canalMap = parsed.length ? parsed : App.canalMap;
    if(store === 'rawPublicidadManual') App.publicidadManual = parsed;

    if(typeof App.saveStore === 'function') await App.saveStore(store, parsed);
  }

  App.configurarGoogleSheets = function(){
    const actual = getWebAppUrl();
    const msg = 'Pega la URL /exec del Apps Script publicado como Aplicación web.\n\nDebe tener este formato:\nhttps://script.google.com/macros/s/XXXXXXXX/exec';
    const u = prompt(msg, actual);
    if(u === null) return;
    const clean = normalizeExecUrl(u);
    if(!clean || !clean.includes('script.google.com/macros/s/') || !clean.endsWith('/exec')){
      alert('URL inválida. Debe ser la URL /exec de Apps Script, no el link pubhtml ni CSV del Google Sheets.');
      return;
    }
    setWebAppUrl(clean);
    toast('URL Apps Script guardada','ok');
  };

  App.verificarGoogleSheets = async function(){
    if(!getWebAppUrl()){
      App.configurarGoogleSheets();
      if(!getWebAppUrl()) return null;
    }

    try{
      toast('Verificando Apps Script...','warn');
      const health = await jsonp(apiUrl('health'));
      if(!health.ok) throw new Error(health.error || 'Health inválido');

      const manifest = await jsonp(apiUrl('manifest'));
      if(!manifest.ok) throw new Error(manifest.error || 'Manifest inválido');

      const rows = (manifest.sheets || []).map(s=>({
        pestana:s.name,
        filas:s.rows,
        columnas:s.cols,
        requerida:s.required ? 'SI' : '',

  App.cargarDesdeGoogleSheets = async function(){
    if(!getWebAppUrl()){

      toast('Conectando con Google Sheets vía Apps Script...','warn');

      });

      if(typeof App.saveStore === 'function') await App.saveStore('cargas',App.cargas);
      App.rebuild && App.rebuild();

      }
    }catch(e){
      console.error(e);
      alert('Error conectando Google Sheets vía Apps Script: ' + (e && e.message ? e.message : e));

  function gvizUrlFromSpec(spec, callback){

        cleanup();

      }, 45000);
      function cleanup(){
        clearTimeout(timer);
        try{ delete window[cb]; }catch(_){ window[cb]=undefined; }
        try{ script.remove(); }catch(_){ }

          reject(new Error(msg));

  function valFromCell(c){
    if(!c) return '';
    if(c.f !== undefined && c.f !== null) return String(c.f);
    if(c.v !== undefined && c.v !== null) return c.v;

  function rowsFromGvizPayload(payload){
    const table = payload && payload.table ? payload.table : {cols:[],rows:[]};
    const colCount = Math.max(
      table.cols ? table.cols.length : 0,
      ...(table.rows || []).map(r => (r.c || []).length),
      1
    );
    return (table.rows || []).map(r=>{
      const cells = r.c || [];
      const row=[];
      for(let i=0;i<colCount;i++) row.push(valFromCell(cells[i]));
      // recorte conservador de vacíos finales
      let last=row.length-1;
      while(last>0 && String(row[last] ?? '').trim()==='') last--;
      return row.slice(0,last+1);
    }).filter(r=>r.some(v=>String(v ?? '').trim()!==''));
  }

  function normLocal(v){
    return String(v ?? '')
      .trim().toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .replace(/ñ/g,'n')
      .replace(/[^a-z0-9]+/g,' ')
      .trim();

  function detectHeaderIndex(rows, sheetName){
    const signatures = {
      ventas_general: ['fecha de venta','serie','correlativo','subtotal','total','ruc documento','nombre cliente'],
      detalle_erp: ['fecha de venta','codigoint','nombre','cantidad','precio vta tot','valor vta tot','categoria'],

      canales_mapeo: ['centro ingreso erp','ambito comercial','canal normalizado'],
      presupuestos_mensuales: ['anio','mes','presupuesto meta','presupuesto masterclass']
    };
    const sig = signatures[sheetName] || [];
    let bestIdx = 0, bestScore = -1;
    rows.slice(0,10).forEach((row,idx)=>{
      const txt = normLocal(row.join(' | '));
      let score = 0;
      sig.forEach(s=>{ if(txt.includes(normLocal(s))) score++; });
      // penaliza filas de título/reportes
      if(txt.includes('reporte de ventas entre')) score -= 2;
      if(score > bestScore){ bestScore = score; bestIdx = idx; }

  }

<script>
/* Lou Botanicals v45 · Conexión real-time por Apps Script.
   Este bloque fuerza al dashboard a dejar de usar pubhtml/csv/GViz y usar una API /exec.
*/
(function(){
  const SHEETS_PARSE_ORDER = [
    'ventas_general',
    'detalle_erp',
    'prestashop',
    'meta_ads',
    'metas_matriz',
    'sku_normalizados',
    'canales_mapeo',
    'presupuestos_mensuales'
  ];
  const CRITICAL = new Set(['ventas_general','detalle_erp','prestashop']);
  const LS_KEY = 'lou_api_exec_v45';

  function LB45_toast(msg, type){
    try{
      if(window.App && typeof App.toast === 'function') return App.toast(msg, type || 'warn');
      if(typeof window.toast === 'function') return window.toast(msg, type || 'warn');
      console.log('[Lou Dashboard]', msg);
    }catch(e){
      console.log('[Lou Dashboard]', msg);
    }
  }

  function apiUrl(){
    return localStorage.getItem(LS_KEY) || '';
  }

  function setApiUrl(){
    const cur = apiUrl();
    const u = prompt(
      'Pega la URL /exec del Apps Script publicado como Aplicación Web.\n\nDebe tener este formato:\nhttps://script.google.com/macros/s/XXXXXXXX/exec',
      cur
    );
    if(!u) return '';
    if(!/^https:\/\/script\.google\.com\/macros\/s\/.+\/exec/.test(u.trim())){
      alert('URL inválida. Debe terminar en /exec y empezar con https://script.google.com/macros/s/');
      return '';
    }
    localStorage.setItem(LS_KEY, u.trim());
    alert('URL /exec guardada. Ahora presiona “Verificar API” y luego “Actualizar datos”.');
    return u.trim();
  }

  function jsonp(action, params = {}){
    const base = apiUrl();
    if(!base) throw new Error('Falta configurar la URL /exec de Apps Script.');
    return new Promise((resolve,reject)=>{
      const cb = 'LB45_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
      const q = new URLSearchParams({ action, ...params, callback: cb, _ts: Date.now() });
      const s = document.createElement('script');
      const timeout = setTimeout(()=>{
        try{ delete window[cb]; s.remove(); }catch(e){}
        reject(new Error('Timeout leyendo API Apps Script: ' + action + ' ' + (params.name || '')));
      }, 120000);

      window[cb] = function(payload){
        clearTimeout(timeout);
        delete window[cb];
        s.remove();
        if(!payload || payload.ok === false) reject(new Error((payload && payload.error) || 'Respuesta inválida de API'));
        else resolve(payload);
      };
      s.onerror = function(){
        clearTimeout(timeout);
        delete window[cb];
        s.remove();
        reject(new Error('No se pudo conectar con Apps Script. Revisa que la implementación web tenga acceso “Cualquier persona”.'));
      };
      s.src = base + '?' + q.toString();
      document.body.appendChild(s);
    });
  }

  function rowsFromApi(payload){
    return [payload.headers || [], ...(payload.rows || [])];
  }

  function uniqByKey(arr){
    const m=new Map();
    (arr||[]).forEach((x,i)=>m.set(x && x._k ? String(x._k) : 'row_' + i, x));
    return [...m.values()];
  }

  function parseSheetForDashboard(sheetName, apiPayload){
    const rows = rowsFromApi(apiPayload);
    if(!rows.length || !rows[0] || !rows[0].length) return [];

    if(sheetName === 'ventas_general'){
      const ro = rowsToObjects(rows,0).objects;
      return uniqByKey(ro.map(parseComprobante).filter(Boolean));
    }
    if(sheetName === 'detalle_erp'){
      const ro = rowsToObjects(rows,0).objects;
      return uniqByKey(ro.map((o,i)=>parseDetalle(o,i)).filter(Boolean));
    }
    if(sheetName === 'prestashop'){
      const ro = rowsToObjects(rows,0).objects;
      return uniqByKey(ro.map(parsePresta).filter(Boolean));
    }
    if(sheetName === 'meta_ads'){
      const ro = rowsToObjects(rows,0).objects;
      return uniqByKey(ro.map(parseMetaAds).filter(Boolean));
    }
    if(sheetName === 'metas_matriz'){
      App.metasYear = App.metasYear || new Date().getFullYear();
      return uniqByKey(parseMetasMatrix(rows,0));
    }
    if(sheetName === 'canales_mapeo'){
      const ro = rowsToObjects(rows,0).objects;
      return uniqByKey(ro.map((o,i)=>({
        _k: String(o['centro ingreso erp'] || o['centroingresoerp'] || o['centro'] || i),
        centroIngresoERP: normTxt(o['centro ingreso erp'] || o['centroingresoerp'] || o['centro'] || ''),
        ambitoComercial: normTxt(o['ambito comercial'] || o['ambitocomercial'] || o['ambito'] || 'Otros'),
        canalNormalizado: normTxt(o['canal normalizado'] || o['canalnormalizado'] || o['canal'] || 'SIN ASIGNAR'),
        activo: String(o['activo'] || 'TRUE').toLowerCase() !== 'false',
        observacion: normTxt(o['observacion'] || '')
      })).filter(x=>x.centroIngresoERP));
    }
    if(sheetName === 'presupuestos_mensuales'){
      const ro = rowsToObjects(rows,0).objects;
      return uniqByKey(ro.map((o,i)=>{
        const anio = num(o['anio'] || o['año']);
        const mes = num(o['mes']);
        const objetivo = normTxt(o['objetivo'] || o['tipo campana'] || o['tipo campaña'] || o['campana'] || o['campaña'] || 'PRESUPUESTO_META');
        return {
          _k:`${anio}|${mes}|${objetivo || i}`,
          anio, mes, objetivo,
          gasto:num(o['gasto'] || o['inversion'] || o['inversión'] || 0),
          presupuestoMeta:num(o['presupuesto meta'] || o['presupuestometa'] || 0),
          presupuestoMasterclass:num(o['presupuesto masterclass'] || o['presupuestomasterclass'] || 0),
          leads:num(o['leads'] || 0)
        };
      }).filter(x=>x.anio && x.mes));
    }
    if(sheetName === 'sku_normalizados'){
      const ro = rowsToObjects(rows,0).objects;
      return uniqByKey(ro.map((o,i)=>({
        _k:String(o['sku codigoint'] || o['codigo'] || o['codigo int'] || o['codigoint'] || o['sku'] || i),
        codigoInt:normTxt(o['sku codigoint'] || o['codigo'] || o['codigo int'] || o['codigoint'] || o['sku'] || ''),
        productoNormalizado:normTxt(o['nombre principal'] || o['producto normalizado'] || o['productonormalizado'] || o['nombre normalizado'] || ''),
        lineaNegocio:normTxt(o['linea negocio'] || o['lineanegocio'] || o['linea'] || o['clase'] || '')
      })).filter(x=>x.codigoInt));
    }
    return [];
  }

  App.configurarGoogleSheets = setApiUrl;

  App.verificarGoogleSheets = async function(){
    try{
      if(!apiUrl()) setApiUrl();
      if(!apiUrl()) return;
      const manifest = await jsonp('manifest');
      console.table(manifest.sheets || []);
      const criticalBad = (manifest.sheets || []).filter(s => s.critical && s.status !== 'OK');
      if(criticalBad.length){
        alert('API conectada, pero hay problemas en bases críticas: ' + criticalBad.map(x=>`${x.name}: ${x.status}`).join(' | '));
      }else{
        alert('API OK. Bases críticas accesibles. Revisa consola para filas/columnas por pestaña.');
      }
      return manifest;
    }catch(e){
      console.error(e);
      alert('Error verificando API: ' + (e.message || e));
    }
  };

  App.auditarSheets = async function(){
    try{
      if(!apiUrl()) setApiUrl();
      if(!apiUrl()) return;
      const audit = await jsonp('audit');
      console.table(audit.audit || []);
      const bad = (audit.audit || []).filter(x=>x.status !== 'OK');
      alert(bad.length ? 'Auditoría con observaciones. Revisa consola.' : 'Auditoría OK.');
      return audit;
    }catch(e){
      console.error(e);
      alert('Error auditando Sheets: ' + (e.message || e));
    }
  };

  App.limpiarCacheLou = async function(){
    try{
      const stores = ['rawComprobantesERP','rawDetalleERP','rawPrestaShop','rawMetaAds','rawMetas','rawSkuOverrides','rawCanalMapping','rawPublicidadManual','cargas'];
      if(typeof DB !== 'undefined' && DB.clear){
        for(const st of stores){
          try{ await DB.clear(st); }catch(e){}
        }
      }
      this.comprobantes=[]; this.detalle=[]; this.presta=[]; this.metaAds=[]; this.metas=[]; this.skuOverrides=[]; this.publicidadManual=[];
      if(typeof this.rebuild === 'function') this.rebuild();
      if(typeof this.render === 'function') this.render(this.curTab || 'resumen');
      alert('Cache local limpiado. Ahora presiona “Actualizar datos”.');
    }catch(e){
      console.error(e);
      alert('No se pudo limpiar cache: ' + (e.message || e));
    }
  };

  App.cargarDesdeGoogleSheets = async function(){
    try{
      if(!apiUrl()) setApiUrl();
      if(!apiUrl()) return;

      await App.limpiarCacheLou();

      const loaded = [];
      const failed = [];

      LB45_toast('Conectando con API Apps Script v45...', 'warn');

      this.comprobantes = [];
      this.detalle = [];
      this.presta = [];
      this.metaAds = [];
      this.metas = [];
      this.skuOverrides = [];
      this.publicidadManual = [];

      for(const sheetName of SHEETS_PARSE_ORDER){
        try{
          LB45_toast('Leyendo ' + sheetName + '...', 'warn');
          const payload = await jsonp('sheet', { name: sheetName });
          const parsed = parseSheetForDashboard(sheetName, payload);

          if(sheetName === 'ventas_general') this.comprobantes = parsed;
          if(sheetName === 'detalle_erp') this.detalle = parsed;
          if(sheetName === 'prestashop') this.presta = parsed;
          if(sheetName === 'meta_ads') this.metaAds = parsed;
          if(sheetName === 'metas_matriz') this.metas = parsed;
          if(sheetName === 'sku_normalizados') this.skuOverrides = parsed;
          if(sheetName === 'canales_mapeo') this.canalMap = parsed.length ? parsed : this.canalMap;
          if(sheetName === 'presupuestos_mensuales') this.publicidadManual = parsed;

          loaded.push({
            sheet: sheetName,
            apiRows: payload.rowsCount,
            parsedRows: parsed.length,
            cols: payload.colsCount,
            generatedAt: payload.generatedAt
          });
        }catch(e){
          failed.push({ sheet: sheetName, error: e.message || String(e) });
          console.warn('[LB v45]', sheetName, e);
          if(CRITICAL.has(sheetName)) throw e;
        }
      }

      console.table(loaded);
      if(failed.length) console.table(failed);

      this.cargas = this.cargas || [];
      this.cargas.push({
        _k:'apps_script_v45_' + Date.now(),
        fuente:'Apps Script API v45',
        nombre:'Carga sincronizada desde Google Sheets principal por API v45',
        fechaCarga:new Date().toISOString(),
        filas:loaded.reduce((s,x)=>s + (x.parsedRows||0),0),
        detalle:loaded.map(x=>`${x.sheet}: ${x.parsedRows}/${x.apiRows}`).join(' | ')
      });

      if(typeof this.saveStore === 'function'){
        await this.saveStore('rawComprobantesERP', this.comprobantes || []);
        await this.saveStore('rawDetalleERP', this.detalle || []);
        await this.saveStore('rawPrestaShop', this.presta || []);
        await this.saveStore('rawMetaAds', this.metaAds || []);
        await this.saveStore('rawMetas', this.metas || []);
        await this.saveStore('rawSkuOverrides', this.skuOverrides || []);
        await this.saveStore('rawCanalMapping', this.canalMap || []);
        await this.saveStore('rawPublicidadManual', this.publicidadManual || []);
        await this.saveStore('cargas', this.cargas || []);
      }

      if(typeof this.rebuild === 'function') this.rebuild();
      if(typeof this.render === 'function') this.render(this.curTab || 'resumen');

      LB45_toast('Datos sincronizados por Apps Script v45.', 'ok');
      alert('Datos actualizados desde API v45. Filas parseadas: ' + loaded.reduce((s,x)=>s + (x.parsedRows||0),0));
    }catch(e){
      console.error(e);
      alert('Error actualizando desde API v45: ' + (e.message || e));
    }
  };

  function relabelButtons(){
    const topbar = document.getElementById('topbar');
    const pill = document.querySelector('.sheet-source-pill');
    if(pill) pill.textContent = 'API tiempo real v45';

    const cfg = document.getElementById('btnGoogleSheetsCfg');
    if(cfg) cfg.textContent = 'Configurar API /exec';

    const upd = document.getElementById('btnGoogleSheetsUpdate');
    if(upd) upd.textContent = 'Actualizar datos';

    const chk = document.getElementById('btnGoogleSheetsCheck');
    if(chk) chk.textContent = 'Verificar API';

    if(topbar && !document.getElementById('btnAuditV44')){
      const b = document.createElement('button');
      b.className = 'btn sm';
      b.id = 'btnAuditV44';
      b.textContent = '';
      b.onclick = () => App.auditarSheets();
      topbar.insertBefore(b, topbar.querySelector('button.primary') || null);
    }

    if(topbar && !document.getElementById('btnClearLouCache')){
      const b = document.createElement('button');
      b.className='btn sm';
      b.id='btnClearLouCache';
      b.textContent='Limpiar cache';
      b.onclick=()=>App.limpiarCacheLou();
      topbar.insertBefore(b, topbar.querySelector('button.primary') || null);
    }
  }

  window.addEventListener('DOMContentLoaded',()=>setTimeout(relabelButtons,700));
})();
</script>

  const API_KEYS = ["lou_api_exec_v45","lou_appscript_webapp_url_v36","lou_api_exec_v46","lou_api_exec_v50"];

    App.verificarGoogleSheets = async function(){
      setEndpoint();
      if(typeof originalVerify === "function") return originalVerify.call(App);
      alert("Endpoint configurado: " + FINAL_EXEC_URL);
    };

    const originalTabCargar = App.tab_cargar;
    App.tab_cargar = function(){

    const originalVerificacion = App.tab_verificacion;
    App.tab_verificacion = function(){
      const old = typeof originalVerificacion === "function" ? originalVerificacion.call(App) : "";
      const qa = App.qaPedidosMontosV49 || [];
      const qaHtml = qa.length ? `
        <div class="card" style="margin-bottom:16px">

          <div class="ch-sub">Control directo desde la pestaña qa_pedidos_montos_v49. Ventas generales es la fuente financiera oficial; PrestaShop y componentes son auditoría operativa.</div>
          <div style="overflow:auto"><table class="dt"><thead><tr>
            <th>Fuente</th><th class="num">Pedidos únicos</th><th class="num">Líneas</th><th class="num">Monto sin IGV</th><th class="num">Dif. vs ventas_general</th><th>Estado</th><th>Regla</th>
          </tr></thead><tbody>${qa.map(r=>`<tr>
            <td><b>${esc(r.Fuente||"")}</b></td>
            <td class="num">${fmt.int(num(r["Pedidos únicos"]))}</td>
            <td class="num">${fmt.int(num(r["Líneas"]))}</td>
            <td class="num">${fmt.money(num(r["Monto sin IGV"]),2)}</td>
            <td class="num">${fmt.money(num(r["Diferencia vs ventas_general"]),2)}</td>
            <td><span class="pill ${(String(r.Estado||"").includes("OK")||String(r.Estado||"").includes("OFICIAL"))?"ok":String(r.Estado||"").includes("REVISAR")?"warn":"bad"}">${esc(r.Estado||"")}</span></td>
            <td>${esc(r.Regla||"")}</td>
          </tr>`).join("")}</tbody></table></div>
        </div>` : "";
      return qaHtml + old;

    // Ajustes visuales y de etiqueta.
    document.title = "Lou Botanicals · Dashboard General Final v50";
    const brandSub = document.querySelector(".brand .t span");
    if(brandSub) brandSub.textContent = "Panel decisional v50";
    const title = document.getElementById("pageTitle");
    if(title && title.textContent.trim()==="Resumen ejecutivo") title.textContent = "Resumen ejecutivo";

    hideLegacyExports();

    // Carga automática: una vez la UI esté lista, trae Google Sheets sin pedir URL.
    setTimeout(async ()=>{
      try{
        setEndpoint();
        hideLegacyExports();
        if(App.comprobantes && App.comprobantes.length){
          await loadQaV49();
          if(App.render) App.render(App.curTab || "resumen");
          return;
        }
        if(App.cargarDesdeGoogleSheets) await App.cargarDesdeGoogleSheets();
      }catch(e){
        console.error("Autocarga v50 falló",e);
        if(App.toast) App.toast("Autocarga falló. Presiona Actualizar datos desde Sheets.","warn");

    },1300);

  if(document.readyState==="loading"){

})();
